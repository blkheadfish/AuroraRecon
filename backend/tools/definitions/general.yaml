# ============================================
# 通用工具（无状态，直接执行）
# ============================================

- name: curl
  executor: container
  command: "curl"
  category: general
  timeout: 30
  description: "HTTP 客户端"

- name: wget
  executor: container
  command: "wget"
  category: general
  timeout: 30
  description: "文件下载"

- name: python3
  executor: container
  command: "python3"
  category: general
  timeout: 60
  description: "Python 脚本执行"

- name: java
  executor: container
  command: "java"
  category: general
  timeout: 60
  description: "Java 程序执行"

- name: socat
  executor: container
  command: "socat"
  category: general
  timeout: 30
  description: "网络连接工具"

- name: netcat
  executor: container
  command: "nc"
  category: general
  timeout: 30
  description: "网络瑞士军刀"

# ============================================
# 后渗透工具
# ============================================

- name: enum4linux
  executor: container
  command: "enum4linux"
  category: post_exploit
  timeout: 60
  description: "SMB/LDAP 枚举"

- name: smbclient
  executor: container
  command: "smbclient"
  category: post_exploit
  timeout: 30
  description: "SMB 客户端"

- name: tcpdump
  executor: container
  command: "tcpdump"
  category: post_exploit
  timeout: 60
  description: "网络抓包"

- name: hping3
  executor: container
  command: "hping3"
  category: general
  timeout: 30
  description: "TCP/IP 数据包组装工具"

- name: ncat
  executor: container
  command: "ncat"
  category: general
  timeout: 30
  description: "Nmap 版 netcat，支持 SSL/代理"

- name: rlwrap
  executor: container
  command: "rlwrap"
  category: general
  timeout: 30
  description: "为交互式 shell 补充 readline 历史/补全"

- name: tmux
  executor: container
  command: "tmux"
  category: general
  timeout: 30
  description: "终端复用器，用于保持会话"

- name: proxychains4
  executor: container
  command: "proxychains4"
  category: general
  timeout: 60
  description: "代理链工具，流量转发过 SOCKS/HTTP 代理"

- name: sshpass
  executor: container
  command: "sshpass"
  category: general
  timeout: 30
  description: "非交互式 SSH 密码认证（供 SSH 爆破/日志注入/凭据复用使用）"

- name: ssh
  executor: container
  command: "ssh"
  category: general
  timeout: 60
  description: "SSH 客户端（密钥登录/凭据复用）"

- name: apache2ctl
  executor: container
  command: "apache2ctl"
  category: general
  timeout: 30
  description: "Apache HTTP 服务器控制（攻击机侧，用于向靶机提供 exp/payload）"

# ---------- NFS ----------

- name: mount.nfs
  executor: container
  command: "mount.nfs"
  category: general
  timeout: 30
  description: "挂载 NFS 共享（需 --privileged 容器）"
