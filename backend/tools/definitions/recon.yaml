# ============================================
# 侦察类工具
# 所有工具安装在 toolbox 镜像中，走 docker run --rm 执行
# 超时策略：端口/子域名枚举类工具默认放宽，避免扫大目标时提前 kill
# ============================================

- name: nmap
  executor: container
  command: "nmap"
  category: recon
  timeout: 900
  description: "网络端口扫描与服务识别（全端口+版本探测可能 10 分钟以上）"

- name: masscan
  executor: container
  command: "masscan"
  category: recon
  timeout: 300
  description: "高速端口扫描"

- name: gobuster
  executor: container
  command: "gobuster"
  category: recon
  timeout: 600
  description: "Web 目录爆破"

- name: ffuf
  executor: container
  command: "ffuf"
  category: recon
  timeout: 600
  description: "Web Fuzzer"

- name: subfinder
  executor: container
  command: "subfinder"
  category: recon
  timeout: 180
  description: "子域名枚举"

- name: whatweb
  executor: container
  command: "whatweb"
  category: recon
  timeout: 60
  description: "Web 指纹识别"

- name: httpx
  executor: container
  command: "httpx"
  category: recon
  timeout: 60
  description: "HTTP 探测与技术检测"

- name: wafw00f
  executor: container
  command: "wafw00f"
  category: recon
  timeout: 60
  description: "WAF 检测"

- name: dirb
  executor: container
  command: "dirb"
  category: recon
  timeout: 600
  description: "Web 目录扫描"

- name: sslscan
  executor: container
  command: "sslscan"
  category: recon
  timeout: 60
  description: "SSL/TLS 扫描"

- name: rustscan
  executor: container
  command: "rustscan"
  category: recon
  timeout: 600
  description: "超快端口扫描器（自动调用 nmap 深扫，需为 nmap 阶段预留时间）"

- name: amass
  executor: container
  command: "amass"
  category: recon
  timeout: 900
  description: "攻击面发现与子域名枚举（主动枚举可能 15 分钟以上）"

- name: nbtscan
  executor: container
  command: "nbtscan"
  category: recon
  timeout: 60
  description: "NetBIOS 名称扫描"

- name: arp-scan
  executor: container
  command: "arp-scan"
  category: recon
  timeout: 60
  description: "局域网主机发现（ARP）"

- name: naabu
  executor: container
  command: "naabu"
  category: recon
  timeout: 300
  description: "快速端口扫描（ProjectDiscovery）"

- name: dnsx
  executor: container
  command: "dnsx"
  category: recon
  timeout: 120
  description: "高速 DNS 解析与枚举"

- name: uncover
  executor: container
  command: "uncover"
  category: recon
  timeout: 120
  description: "多引擎资产发现（Shodan/Fofa/Hunter）"

# ---------- SNMP ----------

- name: snmpwalk
  executor: container
  command: "snmpwalk"
  category: recon
  timeout: 120
  description: "SNMP MIB 树遍历枚举"

- name: snmp-check
  executor: container
  command: "snmp-check"
  category: recon
  timeout: 120
  description: "SNMP 综合性枚举（用户/进程/网络接口）"

- name: onesixtyone
  executor: container
  command: "onesixtyone"
  category: recon
  timeout: 120
  description: "SNMP 社区字符串暴力枚举"

# ---------- DNS ----------

- name: dig
  executor: container
  command: "dig"
  category: recon
  timeout: 30
  description: "DNS 查询工具（A/AAAA/MX/NS/ANY/axfr 域传送）"

- name: dnsenum
  executor: container
  command: "dnsenum"
  category: recon
  timeout: 300
  description: "DNS 综合性枚举（域传送/反向解析/子域爆破/google搜索）"

# ---------- NFS ----------

- name: showmount
  executor: container
  command: "showmount"
  category: recon
  timeout: 30
  description: "NFS 导出列表查询"

- name: rpcinfo
  executor: container
  command: "rpcinfo"
  category: recon
  timeout: 30
  description: "RPC 服务端口映射查询（NFS 依赖 RPC）"
