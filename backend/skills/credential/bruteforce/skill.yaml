skill_id: credential_bruteforce
name: "凭据暴力破解 (SSH/FTP/RDP/HTTP)"
category: credential
phase: foothold
version: "1.0"

match:
  rules:
    - service_is: "ssh"
      port_is: [22, 2222, 2211]
    - service_is: "ftp"
      port_is: [21]
    - service_is: "rdp"
      port_is: [3389]
    - evidence_contains: ["弱口令"]
    - evidence_contains: ["weak password"]
    - evidence_contains: ["default credential"]
    - fingerprint_contains: ["login"]
      evidence_contains: ["http-auth"]
    # 跨 Skill 事件触发：LFI 提取凭据后自动激活
    - variable_present: ["has_known_creds"]
    - variable_present: ["shadow_readable"]

probes:
  - id: detect_services
    description: "检测目标认证服务类型"
    skip_if:
      lfi_confirmed: true
    command: "bash {skill_dir}/scripts/detect_services.sh {TARGET_IP}"
    timeout: 30
    parse_rules:
      - if_contains: ["ssh"]
        set: { has_ssh: true }
      - if_contains: ["ftp"]
        set: { has_ftp: true }
      - if_contains: ["3389/tcp"]
        set: { has_rdp: true }

  - id: check_ftp_anon
    description: "检测 FTP 匿名登录"
    depends_on: { has_ftp: true }
    command: "bash {skill_dir}/scripts/check_ftp_anon.sh {TARGET_IP}"
    timeout: 15
    parse_rules:
      - if_contains: ["FTP_ANON_OK"]
        set: { ftp_anon: true }

exploit_paths:
  - path_id: ssh_default_creds
    name: "SSH 默认凭据测试"
    priority: 1
    conditions:
      has_ssh: true
    skip_if:
      lfi_confirmed: true
    steps:
      - id: ssh_hydra
        description: "hydra SSH 默认凭据 + 小字典"
        command: "bash {skill_dir}/scripts/ssh_default_creds.sh {TARGET_IP} {TARGET_PORT}"
        timeout: 120
        success_criteria:
          stdout_contains_any: ["SSH_CRED_FOUND", "login:", "[22]"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "ssh_login"

  - path_id: ftp_default_creds
    name: "FTP 凭据测试"
    priority: 2
    conditions:
      has_ftp: true
    skip_if:
      ftp_anon: true
    steps:
      - id: ftp_hydra
        description: "hydra FTP 默认凭据"
        command: "bash {skill_dir}/scripts/ftp_default_creds.sh {TARGET_IP}"
        timeout: 90
        success_criteria:
          stdout_contains_any: ["login:", "[21]"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "ftp_login"

  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5

remediation: |
  1. 禁用默认凭据，强制使用强密码策略
  2. 启用账户锁定机制（fail2ban 等）
  3. 使用 SSH 密钥认证替代密码
  4. 限制认证服务的访问 IP
