skill_id: flask_ssti_rce
name: "Flask/Jinja2 服务端模板注入 RCE"
category: web_rce
phase: foothold
version: "2.0"

match:
  rules:
    - fingerprint_contains: ["flask"]
    - fingerprint_contains: ["jinja2", "jinja"]
    - fingerprint_contains: ["werkzeug"]
    - evidence_contains: ["ssti", "template injection"]
    - evidence_contains: ["49"]

probes:
  - id: find_ssti_param
    description: "在常见参数中探测 SSTI 注入点"
    command: "bash {skill_dir}/scripts/probe_ssti.sh {ENDPOINT}"
    timeout: 60
    parse_rules:
      - if_regex: "SSTI_FOUND:(GET|POST|PATH):(.+)"
        set: { ssti_confirmed: true, ssti_method: "detected" }
      - if_regex: "SSTI_POST_FOUND:(.+)"
        set: { ssti_confirmed: true, ssti_post_param: "detected" }

  - id: confirm_jinja2
    description: "确认是 Jinja2 引擎"
    depends_on: { ssti_confirmed: true }
    steps:
      - command: "bash {skill_dir}/scripts/confirm_jinja2.sh {ENDPOINT}"
        parse_rules:
          - if_contains: ["7777777"]
            set: { engine_jinja2: true }

      - command: "bash {skill_dir}/scripts/confirm_jinja2_config.sh {ENDPOINT}"
        parse_rules:
          - if_contains: ["SECRET_KEY", "DEBUG"]
            set: { engine_jinja2: true, config_leaked: true }

exploit_paths:
  # Path A: os._wrap_close / subprocess.Popen MRO chain
  - path_id: mro_popen
    name: "MRO 链 subprocess.Popen RCE"
    priority: 1
    principle: |
      遍历 object 的所有子类，找到可以执行命令的类。
      不同 Python 版本子类索引不同，需要自动定位。
    conditions:
      ssti_confirmed: true
    steps:
      - id: find_popen_index
        description: "自动查找 Popen 在子类列表中的索引"
        command: "bash {skill_dir}/scripts/find_popen_index.sh {ENDPOINT}"
        timeout: 20
        success_criteria:
          stdout_contains_any: ["POPEN_INDEX", "WRAP_CLOSE_INDEX", "CATCH_WARNINGS_INDEX"]
        on_success: mro_rce_auto
        on_fail: mro_rce_bruteforce

      - id: mro_rce_auto
        description: "用找到的索引执行命令"
        command: "bash {skill_dir}/scripts/mro_rce_auto.sh {ENDPOINT} {POPEN_IDX}"
        timeout: 15
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: conclude_success
        on_fail: mro_rce_bruteforce
        evidence_capture:
          shell_type: "rce_ssti_popen"

      - id: mro_rce_bruteforce
        description: "暴力尝试常见的子类索引"
        command: "bash {skill_dir}/scripts/bruteforce_mro.sh {ENDPOINT}"
        timeout: 120
        success_criteria:
          stdout_regex: "(uid=\\d+\\(\\w+\\)|SUCCESS)"
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_ssti_bruteforce"

  # Path B: POST param SSTI
  - path_id: post_ssti
    name: "POST 参数 SSTI RCE"
    priority: 2
    conditions:
      ssti_confirmed: true
    steps:
      - id: post_lipsum
        description: "通过 POST 参数 + lipsum 全局对象执行命令"
        command: "bash {skill_dir}/scripts/post_ssti_rce.sh {ENDPOINT}"
        timeout: 15
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_ssti_post"

  # Path C: LLM freeform fallback
  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      ssti_confirmed: true

remediation: |
  1. 永远不要将用户输入直接拼接到模板字符串中
  2. 使用 render_template() 并通过参数传递变量
  3. 启用 Jinja2 沙箱模式: jinja2.sandbox.SandboxedEnvironment
  4. 对用户输入做严格的白名单过滤
