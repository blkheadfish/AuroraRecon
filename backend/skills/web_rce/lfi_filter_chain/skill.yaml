skill_id: lfi_filter_chain
name: "LFI PHP Filter 链源码读取"
category: web_rce
phase: foothold
version: "1.0"

match:
  rules:
    - evidence_contains: ["php_filter", "filter chain", "php://filter"]
    - variable_present: ["lfi_style"]
      evidence_contains: ["php_filter"]

probes: []

exploit_paths:
  - path_id: php_filter_chain
    name: "PHP Filter 链源码读取"
    priority: 1
    conditions:
      any_of:
        - lfi_style: "php_filter"
        - lfi_confirmed: true
    steps:
      - id: php_filter
        description: "用 php://filter 读取源码（base64 decode + 链式解码）"
        command: "bash {skill_dir}/scripts/exploit_php_filter.sh {ENDPOINT}"
        timeout: 30
        success_criteria:
          stdout_contains_any: ["PHP_FILTER_OK", "<?php"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "source_read"

  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 3

remediation: |
  禁用 php://filter 协议或限制 open_basedir
