skill_id: wordpress_exploit
name: "WordPress Vulnerability Exploitation"
category: web_rce
phase: foothold
version: "2.0"

match:
  rules:
    - fingerprint_contains: ["wordpress"]
    - fingerprint_contains: ["wp-content"]
    - fingerprint_contains: ["wp-login"]
    - evidence_contains: ["wordpress"]
    - evidence_contains: ["wp-"]

probes:
  - id: wpscan_enum
    description: "wpscan full enumeration"
    command: "bash {skill_dir}/scripts/wpscan_enum.sh {ENDPOINT}"
    timeout: 180
    parse_rules:
      - if_contains: ["[!] Title:"]
        set: { wp_vuln_found: true }
      - if_contains: ["identified"]
        set: { wp_users_found: true }
      - if_contains: ["Upload directory"]
        set: { wp_upload_accessible: true }
      - if_contains: ["XML-RPC"]
        set: { wp_xmlrpc: true }

  - id: check_xmlrpc
    description: "Check XML-RPC availability"
    command: "bash {skill_dir}/scripts/check_xmlrpc.sh {ENDPOINT}"
    timeout: 15
    parse_rules:
      - if_contains: ["XMLRPC_AVAILABLE"]
        set: { wp_xmlrpc: true }

exploit_paths:
  - path_id: wp_admin_bruteforce
    name: "WordPress Admin Brute-force"
    priority: 1
    conditions:
      wp_xmlrpc: true
    steps:
      - id: xmlrpc_brute
        description: "XML-RPC multicall brute-force"
        command: "bash {skill_dir}/scripts/xmlrpc_brute.sh {ENDPOINT}"
        timeout: 120
        success_criteria:
          stdout_contains_any: ["Valid Combinations Found", "Password:"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "wp_admin"

  - path_id: wp_plugin_exploit
    name: "WordPress Plugin Vulnerability"
    priority: 2
    conditions:
      wp_vuln_found: true
    steps:
      - id: exploit_plugin
        description: "Exploit identified plugin vulnerability via nuclei"
        command: "bash {skill_dir}/scripts/plugin_exploit.sh {ENDPOINT}"
        timeout: 120
        success_criteria:
          stdout_contains_any: ["[critical]", "[high]"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "wp_plugin_vuln"

  - path_id: llm_freeform
    name: "LLM freeform reasoning"
    priority: 99
    mode: react_freeform
    max_rounds: 6

remediation: |
  1. Keep WordPress core, plugins, and themes updated
  2. Use strong admin passwords and 2FA
  3. Disable XML-RPC if not needed
  4. Use security plugins (Wordfence, Sucuri)
  5. Restrict wp-admin access by IP
