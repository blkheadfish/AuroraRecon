skill_id: xss_detection
name: "XSS (Cross-Site Scripting) Detection"
category: web_inject
phase: foothold
version: "1.0"

match:
  rules:
    - evidence_contains: ["xss"]
    - evidence_contains: ["cross-site scripting"]
    - evidence_contains: ["reflected"]
    - fingerprint_contains: ["php"]
      evidence_contains: ["parameter"]
    - fingerprint_contains: ["asp"]
      evidence_contains: ["parameter"]

probes:
  - id: crawl_urls
    description: "Crawl target for URLs with parameters"
    command: "bash {skill_dir}/scripts/crawl_urls.sh {ENDPOINT}"
    timeout: 60
    parse_rules:
      - if_contains: ["?"]
        set: { urls_with_params: true }

exploit_paths:
  - path_id: dalfox_scan
    name: "dalfox Automated XSS Scan"
    priority: 1
    steps:
      - id: dalfox_test
        description: "dalfox XSS detection on target"
        command: "bash {skill_dir}/scripts/dalfox_scan.sh {ENDPOINT}"
        timeout: 120
        success_criteria:
          stdout_contains_any: ["[POC]", "[V]", "Verified"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "xss"

  - path_id: manual_xss
    name: "Manual XSS Parameter Testing"
    priority: 2
    conditions:
      urls_with_params: true
    steps:
      - id: param_test
        description: "Test common parameters for XSS"
        command: "bash {skill_dir}/scripts/manual_xss_test.sh {ENDPOINT}"
        timeout: 60
        success_criteria:
          stdout_contains_any: ["XSS_REFLECTED"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "xss_reflected"

  - path_id: llm_freeform
    name: "LLM freeform reasoning"
    priority: 99
    mode: react_freeform
    max_rounds: 5

remediation: |
  1. Implement input validation and output encoding
  2. Use Content-Security-Policy headers
  3. Use HttpOnly and Secure cookie flags
  4. Sanitize user input with established libraries
